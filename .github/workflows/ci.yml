name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Install package
        run: pip install -e .[ai]

      - name: Run unit tests (no data dependency)
        run: pytest tests/ -v --tb=short -m "not requires_data" --cov=dartlab --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint check
        run: ruff check src/dartlab/ tests/

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import smoke test
        run: |
          python -c "
          import dartlab
          from dartlab import Company, KRCompany, USCompany, Compare
          from dartlab.core.registry import getEntries
          from dartlab.engines.common.finance.ratios import calcRatios
          from dartlab.engines.insight.grading import analyzePerformance
          from dartlab.engines.dart.finance.mapper import AccountMapper
          entries = getEntries()
          print(f'dartlab imported OK, {len(entries)} registry entries')
          "
