name: Deploy to HuggingFace Spaces

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone --depth 1 https://user:${HF_TOKEN}@huggingface.co/spaces/eddmpython/dartlab hf-space

          # Gradio SDK 파일 복사
          cp spaces/app.py hf-space/
          cp spaces/requirements.txt hf-space/

          # HF Spaces README (Gradio SDK 설정)
          cat > hf-space/README.md << 'HFEOF'
---
title: DartLab
emoji: 📊
colorFrom: red
colorTo: yellow
sdk: gradio
sdk_version: "6.10.0"
app_file: app.py
pinned: true
license: mit
short_description: DART + EDGAR disclosure analysis — try without install
---
HFEOF

          # Docker 잔재 제거
          rm -f hf-space/Dockerfile hf-space/.dockerignore
          rm -rf hf-space/scripts

          cd hf-space
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "sync from $(git -C .. describe --tags --always 2>/dev/null || echo 'latest')" && git push)
