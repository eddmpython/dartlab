[project]
name = "dartlab"
version = "0.7.3"
description = "공시 문서에서 하나의 회사 맵을 만든다 — DART + EDGAR"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.12"
authors = [
    {name = "eddmpython"}
]
keywords = [
    "dart",
    "edgar",
    "sec",
    "financial-statements",
    "korea",
    "disclosure",
    "accounting",
    "polars",
    "sections",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]
dependencies = [
    "alive-progress>=3.3.0",
    "beautifulsoup4>=4.14.3",
    "lxml>=6.0.2",
    "marimo>=0.20.4",
    "openpyxl>=3.1.5",
    "diff-match-patch>=20230430",
    "orjson>=3.10.0",
    "polars>=1.0.0",
    "requests>=2.32.5",
    "rich>=14.3.3",
]

[project.optional-dependencies]
llm = [
    "openai>=1.0.0",
]
llm-anthropic = [
    "openai>=1.0.0",
    "anthropic>=0.30.0",
]
charts = [
    "networkx>=3.6.1",
    "plotly>=5.0.0",
    "scipy>=1.17.1",
]
ai = [
    "fastapi>=0.135.1",
    "httpx>=0.28.1",
    "msgpack>=1.1.0",
    "uvicorn[standard]>=0.30.0",
    "sse-starlette>=2.0.0",
]
mcp = [
    "mcp[cli]>=1.0",
]
ui = [
    "dartlab[ai]",
]
all = [
    "openai>=1.0.0",
    "anthropic>=0.30.0",
    "plotly>=5.0.0",
    "fastapi>=0.135.1",
    "httpx>=0.28.1",
    "msgpack>=1.1.0",
    "uvicorn[standard]>=0.30.0",
    "sse-starlette>=2.0.0",
]

[project.scripts]
dartlab = "dartlab.cli.main:main"

[project.urls]
Homepage = "https://github.com/eddmpython/dartlab"
Repository = "https://github.com/eddmpython/dartlab"
Issues = "https://github.com/eddmpython/dartlab/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dartlab"]

[tool.hatch.build.targets.sdist]
include = [
    "src/dartlab/**/*.py",
    "src/dartlab/**/*.json",
    "src/dartlab/**/*.parquet",
    "README.md",
    "LICENSE",
]

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["experiments"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E402", "E501", "E741", "F841"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "requires_data: 로컬 parquet 데이터 필요 (CI에서 skip)",
    "unit: 순수 로직/mock만 — 데이터 로드 없음, 병렬 안전",
    "heavy: 대량 데이터 로드 — 단독 실행 필수",
]

[tool.coverage.run]
source = ["dartlab"]
omit = [
    "src/dartlab/ui/*",
    "src/dartlab/engines/ai/providers/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "if __name__",
    "raise NotImplementedError",
]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "basic"
include = ["src/dartlab"]
exclude = [
    "src/dartlab/engines/ai/providers/**",
    "src/dartlab/ui/**",
    "experiments/**",
]
reportMissingTypeStubs = false
reportUnknownParameterType = false
reportUnknownMemberType = false
reportUnknownVariableType = false

[dependency-groups]
dev = [
    "build>=1.4.0",
    "dartlab[all]",
    "hatchling>=1.29.0",
    "pillow>=12.1.1",
    "pre-commit>=4.0.0",
    "pyright>=1.1.0",
    "pytest>=9.0.2",
    "pytest-cov>=6.0.0",
]
