<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" rx="16" fill="url(#bgGrad)"/>
  <text x="40" y="48" fill="#94a3b8" font-size="14" font-weight="600">삼성SDI 수익 구조 한눈에</text>

  <!-- 매출 구성 바 -->
  <rect x="40" y="70" width="560" height="36" rx="6" fill="#3b82f6" opacity="0.85"/>
  <rect x="600" y="70" width="42" height="36" rx="6" fill="#10b981" opacity="0.85"/>
  <text x="300" y="94" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">에너지솔루션 93%</text>
  <text x="621" y="94" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">7%</text>
  <text x="660" y="93" fill="#94a3b8" font-size="11">전자재료</text>

  <!-- HHI 시계열 -->
  <text x="40" y="140" fill="#e2e8f0" font-size="13" font-weight="600">HHI 집중도 추이</text>
  <g transform="translate(40,155)">
    <!-- 축 -->
    <line x1="0" y1="100" x2="320" y2="100" stroke="#334155" stroke-width="1"/>
    <!-- 바 -->
    <rect x="10" y="74" width="44" height="26" rx="3" fill="#475569"/>
    <text x="32" y="89" fill="#cbd5e1" font-size="10" text-anchor="middle">2,648</text>
    <text x="32" y="114" fill="#64748b" font-size="10" text-anchor="middle">2021</text>

    <rect x="74" y="68" width="44" height="32" rx="3" fill="#475569"/>
    <text x="96" y="88" fill="#cbd5e1" font-size="10" text-anchor="middle">2,862</text>
    <text x="96" y="114" fill="#64748b" font-size="10" text-anchor="middle">2022</text>

    <rect x="138" y="18" width="44" height="82" rx="3" fill="#f59e0b"/>
    <text x="160" y="55" fill="#1e293b" font-size="10" text-anchor="middle" font-weight="600">8,178</text>
    <text x="160" y="114" fill="#64748b" font-size="10" text-anchor="middle">2023</text>

    <rect x="202" y="10" width="44" height="90" rx="3" fill="#ef4444"/>
    <text x="224" y="50" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">8,973</text>
    <text x="224" y="114" fill="#64748b" font-size="10" text-anchor="middle">2024</text>

    <rect x="266" y="13" width="44" height="87" rx="3" fill="#ef4444"/>
    <text x="288" y="52" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">8,758</text>
    <text x="288" y="114" fill="#64748b" font-size="10" text-anchor="middle">2025</text>
  </g>
  <text x="380" y="195" fill="#fbbf24" font-size="12" font-weight="600">→ 집중 심화</text>
  <text x="380" y="215" fill="#94a3b8" font-size="11">2021 분산 → 2025 고집중</text>

  <!-- 지역별 -->
  <text x="40" y="300" fill="#e2e8f0" font-size="13" font-weight="600">지역별 매출</text>
  <g transform="translate(40,310)">
    <rect x="0" y="0" width="218" height="22" rx="4" fill="#3b82f6" opacity="0.7"/>
    <text x="6" y="16" fill="#fff" font-size="11" font-weight="600">중국 55%</text>
    <rect x="0" y="28" width="112" height="22" rx="4" fill="#6366f1" opacity="0.7"/>
    <text x="6" y="44" fill="#fff" font-size="11" font-weight="600">유럽 28%</text>
    <rect x="0" y="56" width="47" height="22" rx="4" fill="#8b5cf6" opacity="0.6"/>
    <text x="6" y="72" fill="#fff" font-size="10">동남아 12%</text>
    <rect x="52" y="56" width="22" height="22" rx="4" fill="#a78bfa" opacity="0.5"/>
    <text x="58" y="72" fill="#fff" font-size="9">6%</text>
  </g>

  <!-- 핵심 지표 카드 -->
  <g transform="translate(420,290)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="12" y="20" fill="#94a3b8" font-size="10">에너지솔루션 이익률</text>
    <text x="12" y="40" fill="#ef4444" font-size="18" font-weight="700">-15.0%</text>
  </g>
  <g transform="translate(600,290)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="12" y="20" fill="#94a3b8" font-size="10">전자재료 이익률</text>
    <text x="12" y="40" fill="#10b981" font-size="18" font-weight="700">+14.7%</text>
  </g>
  <g transform="translate(420,350)">
    <rect x="0" y="0" width="340" height="50" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
    <text x="12" y="20" fill="#fbbf24" font-size="10" font-weight="600">경고</text>
    <text x="12" y="38" fill="#e2e8f0" font-size="12">매출 93%인 부문이 적자 — 수익 구조 편중</text>
  </g>
</svg>