<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" rx="16" fill="url(#bg5)"/>
  <text x="40" y="40" fill="#e2e8f0" font-size="15" font-weight="700">수익 구조 진단 요약</text>

  <!-- 카드 1: 집중도 -->
  <rect x="40" y="65" width="230" height="120" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="60" y="90" fill="#ef4444" font-size="12" font-weight="700">위험</text>
  <text x="60" y="112" fill="#e2e8f0" font-size="14" font-weight="600">매출 고집중</text>
  <text x="60" y="132" fill="#94a3b8" font-size="11">HHI 8,758 (고집중)</text>
  <text x="60" y="150" fill="#94a3b8" font-size="11">1위 부문 비중 93%</text>
  <text x="60" y="170" fill="#64748b" font-size="10">사실상 단일 사업 의존</text>

  <!-- 카드 2: 이익 편중 -->
  <rect x="285" y="65" width="230" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="305" y="90" fill="#f59e0b" font-size="12" font-weight="700">경고</text>
  <text x="305" y="112" fill="#e2e8f0" font-size="14" font-weight="600">매출-이익 역전</text>
  <text x="305" y="132" fill="#94a3b8" font-size="11">매출 1위 = 에너지솔루션 (93%)</text>
  <text x="305" y="150" fill="#94a3b8" font-size="11">이익 1위 = 전자재료 (14.7%)</text>
  <text x="305" y="170" fill="#64748b" font-size="10">매출 주력이 적자 구간</text>

  <!-- 카드 3: 지역 집중 -->
  <rect x="530" y="65" width="230" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="550" y="90" fill="#f59e0b" font-size="12" font-weight="700">경고</text>
  <text x="550" y="112" fill="#e2e8f0" font-size="14" font-weight="600">지역 편중</text>
  <text x="550" y="132" fill="#94a3b8" font-size="11">중국 55% + 유럽 28%</text>
  <text x="550" y="150" fill="#94a3b8" font-size="11">두 지역이 매출의 83%</text>
  <text x="550" y="170" fill="#64748b" font-size="10">지정학·규제 리스크 노출</text>

  <!-- 카드 4: 긍정 -->
  <rect x="40" y="200" width="230" height="120" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="60" y="225" fill="#10b981" font-size="12" font-weight="700">기회</text>
  <text x="60" y="247" fill="#e2e8f0" font-size="14" font-weight="600">전자재료 안정 수익</text>
  <text x="60" y="267" fill="#94a3b8" font-size="11">이익률 14.7% 유지</text>
  <text x="60" y="285" fill="#94a3b8" font-size="11">매출 축소에도 흑자</text>
  <text x="60" y="305" fill="#64748b" font-size="10">사이클 하락기 방어 역할</text>

  <!-- 카드 5: CAGR -->
  <rect x="285" y="200" width="230" height="120" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="305" y="225" fill="#94a3b8" font-size="12" font-weight="700">참고</text>
  <text x="305" y="247" fill="#e2e8f0" font-size="14" font-weight="600">3Y CAGR +6.7%</text>
  <text x="305" y="267" fill="#94a3b8" font-size="11">2021 기저 효과 포함</text>
  <text x="305" y="285" fill="#94a3b8" font-size="11">YoY는 -21%</text>
  <text x="305" y="305" fill="#64748b" font-size="10">방향 전환 신호</text>

  <!-- 카드 6: 다음 단계 -->
  <rect x="530" y="200" width="230" height="120" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="225" fill="#3b82f6" font-size="12" font-weight="700">다음 질문</text>
  <text x="550" y="247" fill="#e2e8f0" font-size="14" font-weight="600">자금 구조는?</text>
  <text x="550" y="267" fill="#94a3b8" font-size="11">적자 부문 자금 어디서 조달?</text>
  <text x="550" y="285" fill="#94a3b8" font-size="11">부채 증가? 유상증자?</text>
  <text x="550" y="305" fill="#64748b" font-size="10">→ 1-2 자금구조에서 확인</text>
</svg>