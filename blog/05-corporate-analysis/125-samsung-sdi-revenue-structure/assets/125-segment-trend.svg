<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" rx="16" fill="url(#bg2)"/>
  <text x="40" y="40" fill="#e2e8f0" font-size="15" font-weight="700">부문별 매출 추이 (5년)</text>
  <text x="40" y="60" fill="#64748b" font-size="11">단위: 조 원</text>

  <!-- Y축 가이드 -->
  <line x1="100" y1="85" x2="740" y2="85" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="135" x2="740" y2="135" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="185" x2="740" y2="185" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="235" x2="740" y2="235" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="285" x2="740" y2="285" stroke="#334155" stroke-width="1"/>
  <text x="90" y="90" fill="#64748b" font-size="10" text-anchor="end">20조</text>
  <text x="90" y="140" fill="#64748b" font-size="10" text-anchor="end">15조</text>
  <text x="90" y="190" fill="#64748b" font-size="10" text-anchor="end">10조</text>
  <text x="90" y="240" fill="#64748b" font-size="10" text-anchor="end">5조</text>
  <text x="90" y="290" fill="#64748b" font-size="10" text-anchor="end">0</text>

  <!-- 에너지솔루션 (파란) -->
  <!-- 2021: 10.9조 → y=195, 2022: 17.6조 → y=110, 2023: 20.4조 → y=83, 2024: 15.7조 → y=128, 2025: 12.4조 → y=161 -->
  <polyline points="160,195 290,110 420,83 550,128 680,161" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="160" cy="195" r="5" fill="#3b82f6"/>
  <circle cx="290" cy="110" r="5" fill="#3b82f6"/>
  <circle cx="420" cy="83" r="5" fill="#3b82f6"/>
  <circle cx="550" cy="128" r="5" fill="#3b82f6"/>
  <circle cx="680" cy="161" r="5" fill="#3b82f6"/>
  <text x="160" y="215" fill="#93c5fd" font-size="10" text-anchor="middle">10.9조</text>
  <text x="420" y="73" fill="#93c5fd" font-size="10" text-anchor="middle" font-weight="600">20.4조 ▲</text>
  <text x="680" y="155" fill="#93c5fd" font-size="10" text-anchor="middle">12.4조</text>

  <!-- 전자재료 (초록) -->
  <!-- 2021: 2.6조 → y=259, 2022: 2.6조 → y=259, 2023: 2.3조 → y=262, 2024: 0.9조 → y=276, 2025: 0.9조 → y=276 -->
  <polyline points="160,259 290,259 420,262 550,276 680,276" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="160" cy="259" r="4" fill="#10b981"/>
  <circle cx="290" cy="259" r="4" fill="#10b981"/>
  <circle cx="420" cy="262" r="4" fill="#10b981"/>
  <circle cx="550" cy="276" r="4" fill="#10b981"/>
  <circle cx="680" cy="276" r="4" fill="#10b981"/>
  <text x="160" y="252" fill="#6ee7b7" font-size="10" text-anchor="middle">2.6조</text>
  <text x="680" y="270" fill="#6ee7b7" font-size="10" text-anchor="middle">0.9조</text>

  <!-- X축 레이블 -->
  <text x="160" y="308" fill="#94a3b8" font-size="12" text-anchor="middle">2021</text>
  <text x="290" y="308" fill="#94a3b8" font-size="12" text-anchor="middle">2022</text>
  <text x="420" y="308" fill="#94a3b8" font-size="12" text-anchor="middle">2023</text>
  <text x="550" y="308" fill="#94a3b8" font-size="12" text-anchor="middle">2024</text>
  <text x="680" y="308" fill="#94a3b8" font-size="12" text-anchor="middle">2025</text>

  <!-- 범례 -->
  <rect x="40" y="330" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="60" y="342" fill="#e2e8f0" font-size="12">에너지솔루션</text>
  <rect x="170" y="330" width="14" height="14" rx="3" fill="#10b981"/>
  <text x="190" y="342" fill="#e2e8f0" font-size="12">전자재료</text>

  <!-- 주석 -->
  <text x="430" y="342" fill="#f59e0b" font-size="11" font-weight="600">2023 정점 → 2025 -39% 하락</text>
</svg>