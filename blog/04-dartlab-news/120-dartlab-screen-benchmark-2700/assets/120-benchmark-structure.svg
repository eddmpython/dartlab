<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 10px; font-weight: 600; fill: #f8fafc; }
    .val { font-size: 10px; fill: #94a3b8; }
    .pct { font-size: 9px; font-weight: 600; }
  </style>

  <rect width="700" height="200" rx="12" fill="#0f172a"/>
  <text x="350" y="28" text-anchor="middle" class="title">benchmark() — 섹터별 비율 분포</text>

  <!-- Header -->
  <text x="30" y="58" class="label">섹터</text>
  <text x="160" y="58" text-anchor="middle" class="pct" fill="#ef4444">P10</text>
  <text x="260" y="58" text-anchor="middle" class="pct" fill="#f59e0b">P25</text>
  <text x="360" y="58" text-anchor="middle" class="pct" fill="#10b981">median</text>
  <text x="460" y="58" text-anchor="middle" class="pct" fill="#f59e0b">P75</text>
  <text x="560" y="58" text-anchor="middle" class="pct" fill="#ef4444">P90</text>
  <text x="650" y="58" text-anchor="middle" class="label">비율</text>

  <line x1="20" y1="65" x2="680" y2="65" stroke="#334155" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="30" y="85" class="val">반도체</text>
  <text x="160" y="85" text-anchor="middle" class="val">2.1</text>
  <text x="260" y="85" text-anchor="middle" class="val">5.8</text>
  <text x="360" y="85" text-anchor="middle" class="val" fill="#10b981">12.4</text>
  <text x="460" y="85" text-anchor="middle" class="val">18.7</text>
  <text x="560" y="85" text-anchor="middle" class="val">28.3</text>
  <text x="650" y="85" text-anchor="middle" class="val">ROE</text>

  <!-- Row 2 -->
  <text x="30" y="105" class="val">자동차</text>
  <text x="160" y="105" text-anchor="middle" class="val">-3.2</text>
  <text x="260" y="105" text-anchor="middle" class="val">2.1</text>
  <text x="360" y="105" text-anchor="middle" class="val" fill="#10b981">8.5</text>
  <text x="460" y="105" text-anchor="middle" class="val">14.2</text>
  <text x="560" y="105" text-anchor="middle" class="val">22.1</text>
  <text x="650" y="105" text-anchor="middle" class="val">ROE</text>

  <!-- Row 3 -->
  <text x="30" y="125" class="val">바이오</text>
  <text x="160" y="125" text-anchor="middle" class="val">-18.5</text>
  <text x="260" y="125" text-anchor="middle" class="val">-5.2</text>
  <text x="360" y="125" text-anchor="middle" class="val" fill="#10b981">1.3</text>
  <text x="460" y="125" text-anchor="middle" class="val">8.9</text>
  <text x="560" y="125" text-anchor="middle" class="val">19.4</text>
  <text x="650" y="125" text-anchor="middle" class="val">ROE</text>

  <text x="350" y="150" text-anchor="middle" class="val">... (전체 섹터 × 6개 비율)</text>

  <!-- Footer -->
  <rect x="20" y="160" width="660" height="28" rx="4" fill="#1e293b"/>
  <text x="350" y="179" text-anchor="middle" class="val">6개 비율: ROE, 부채비율, 영업이익률, 유동비율, 총자산회전율, 매출총이익률</text>
</svg>
