<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .name { font-size: 11px; font-weight: 700; }
    .cond { font-size: 9px; fill: #94a3b8; }
    .box { rx: 6; ry: 6; stroke-width: 1.5; }
  </style>

  <rect width="700" height="320" rx="12" fill="#0f172a"/>
  <text x="350" y="28" text-anchor="middle" class="title">8가지 프리셋 — 조건 비교</text>

  <rect x="20" y="45" width="155" height="60" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="30" y="65" class="name" fill="#10b981">가치주</text>
  <text x="30" y="80" class="cond">ROE≥10, 부채≤100</text>
  <text x="30" y="93" class="cond">영업마진≥5, 유동비≥150</text>

  <rect x="190" y="45" width="155" height="60" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="200" y="65" class="name" fill="#3b82f6">성장주</text>
  <text x="200" y="80" class="cond">ROE≥15, 영업마진≥10</text>
  <text x="200" y="93" class="cond">매출≥1,000억</text>

  <rect x="360" y="45" width="155" height="60" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="370" y="65" class="name" fill="#f59e0b">턴어라운드</text>
  <text x="370" y="80" class="cond">ROE<0(>-30), 부채≤80</text>
  <text x="370" y="93" class="cond">유동비≥150, 자산≥500억</text>

  <rect x="530" y="45" width="155" height="60" class="box" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="540" y="65" class="name" fill="#8b5cf6">현금부자</text>
  <text x="540" y="80" class="cond">FCF>0, 영업CF마진≥10</text>
  <text x="540" y="93" class="cond">부채≤60</text>

  <rect x="20" y="120" width="155" height="60" class="box" fill="#1e293b" stroke="#ef4444"/>
  <text x="30" y="140" class="name" fill="#ef4444">고위험</text>
  <text x="30" y="155" class="cond">부채≥200</text>
  <text x="30" y="168" class="cond">이자보상배수<3</text>

  <rect x="190" y="120" width="155" height="60" class="box" fill="#1e293b" stroke="#dc2626"/>
  <text x="200" y="140" class="name" fill="#dc2626">자본잠식</text>
  <text x="200" y="155" class="cond">자기자본비율<20</text>
  <text x="200" y="168" class="cond">ROE<0</text>

  <rect x="360" y="120" width="155" height="60" class="box" fill="#1e293b" stroke="#ec4899"/>
  <text x="370" y="140" class="name" fill="#ec4899">소형고수익</text>
  <text x="370" y="155" class="cond">자산10~100억, ROE≥15</text>
  <text x="370" y="168" class="cond">영업마진≥10</text>

  <rect x="530" y="120" width="155" height="60" class="box" fill="#1e293b" stroke="#06b6d4"/>
  <text x="540" y="140" class="name" fill="#06b6d4">대형안정</text>
  <text x="540" y="155" class="cond">자산≥1조, 부채≤150</text>
  <text x="540" y="168" class="cond">ROE≥5, 유동비≥100</text>

  <!-- Legend -->
  <rect x="20" y="200" width="660" height="100" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="350" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0">사용법</text>
  <text x="40" y="245" font-size="11" fill="#10b981" font-weight="600">dartlab.screen("가치주")</text>
  <text x="40" y="265" class="cond">→ ROE, 부채비율, 영업이익률, 유동비율 조건 모두 만족하는 종목 DataFrame 반환</text>
  <text x="40" y="285" class="cond">→ 프리셋 이름만 바꾸면 다른 조건으로 즉시 전환</text>
</svg>
