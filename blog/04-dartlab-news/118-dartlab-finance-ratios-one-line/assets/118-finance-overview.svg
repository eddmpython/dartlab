<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 11px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="260" rx="12" fill="#0f172a"/>
  <text x="350" y="28" text-anchor="middle" class="title">dartlab 재무 엔진 — XBRL에서 비율까지</text>

  <!-- Row 1: Source -->
  <rect x="250" y="45" width="200" height="45" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="350" y="65" text-anchor="middle" class="label">DART / EDGAR XBRL</text>
  <text x="350" y="80" text-anchor="middle" class="desc">원본 재무제표</text>

  <line x1="350" y1="90" x2="350" y2="108" class="arrow"/>

  <!-- Row 2: Mapping -->
  <rect x="250" y="110" width="200" height="45" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="350" y="130" text-anchor="middle" class="label">계정 매핑 (34,000개)</text>
  <text x="350" y="145" text-anchor="middle" class="desc">표준 snakeId 변환</text>

  <line x1="350" y1="155" x2="350" y2="173" class="arrow"/>

  <!-- Row 3: Outputs -->
  <rect x="20" y="175" width="130" height="65" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="85" y="198" text-anchor="middle" class="label">c.BS / IS / CF</text>
  <text x="85" y="215" text-anchor="middle" class="desc">DataFrame</text>
  <text x="85" y="230" text-anchor="middle" class="desc">시점별 재무제표</text>

  <rect x="170" y="175" width="130" height="65" class="box" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="235" y="198" text-anchor="middle" class="label">c.timeseries</text>
  <text x="235" y="215" text-anchor="middle" class="desc">분기별 standalone</text>
  <text x="235" y="230" text-anchor="middle" class="desc">IS/CF 누적→순수</text>

  <rect x="320" y="175" width="130" height="65" class="box" fill="#1e293b" stroke="#ec4899"/>
  <text x="385" y="198" text-anchor="middle" class="label">c.ratios</text>
  <text x="385" y="215" text-anchor="middle" class="desc">50+ 비율</text>
  <text x="385" y="230" text-anchor="middle" class="desc">6개 카테고리</text>

  <rect x="470" y="175" width="130" height="65" class="box" fill="#1e293b" stroke="#ef4444"/>
  <text x="535" y="198" text-anchor="middle" class="label">c.ratioSeries</text>
  <text x="535" y="215" text-anchor="middle" class="desc">연간 비율 추이</text>
  <text x="535" y="230" text-anchor="middle" class="desc">ROE, Z-Score ...</text>

  <line x1="350" y1="155" x2="85" y2="173" class="arrow"/>
  <line x1="350" y1="155" x2="235" y2="173" class="arrow"/>
  <line x1="350" y1="155" x2="385" y2="173" class="arrow"/>
  <line x1="350" y1="155" x2="535" y2="173" class="arrow"/>
</svg>
