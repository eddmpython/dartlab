<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 11px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .grade { font-size: 14px; font-weight: 700; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="260" rx="12" fill="#0f172a"/>
  <text x="350" y="28" text-anchor="middle" class="title">7영역 인사이트 — 지표에서 등급까지</text>

  <!-- Input -->
  <rect x="20" y="100" width="110" height="60" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="75" y="125" text-anchor="middle" class="label">재무 데이터</text>
  <text x="75" y="142" text-anchor="middle" class="desc">timeseries</text>

  <line x1="130" y1="130" x2="158" y2="130" class="arrow"/>

  <!-- Engine -->
  <rect x="160" y="50" width="130" height="160" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="225" y="75" text-anchor="middle" class="label">인사이트 엔진</text>
  <text x="225" y="95" text-anchor="middle" class="desc">7영역 × 다중 지표</text>
  <text x="225" y="115" text-anchor="middle" class="desc">점수 합산</text>
  <text x="225" y="135" text-anchor="middle" class="desc">등급 변환</text>
  <text x="225" y="155" text-anchor="middle" class="desc">이상치 감지</text>
  <text x="225" y="175" text-anchor="middle" class="desc">프로파일 분류</text>

  <line x1="290" y1="130" x2="318" y2="130" class="arrow"/>

  <!-- 7 Areas -->
  <rect x="320" y="45" width="170" height="170" class="box" fill="#1e293b" stroke="#334155"/>
  <text x="330" y="68" class="desc">performance</text>  <text x="470" y="68" text-anchor="end" class="grade" fill="#10b981">B</text>
  <text x="330" y="88" class="desc">profitability</text> <text x="470" y="88" text-anchor="end" class="grade" fill="#10b981">A</text>
  <text x="330" y="108" class="desc">health</text>        <text x="470" y="108" text-anchor="end" class="grade" fill="#10b981">A</text>
  <text x="330" y="128" class="desc">cashflow</text>      <text x="470" y="128" text-anchor="end" class="grade" fill="#10b981">B</text>
  <text x="330" y="148" class="desc">governance</text>    <text x="470" y="148" text-anchor="end" class="grade" fill="#f59e0b">C</text>
  <text x="330" y="168" class="desc">risk</text>          <text x="470" y="168" text-anchor="end" class="grade" fill="#10b981">B</text>
  <text x="330" y="188" class="desc">opportunity</text>   <text x="470" y="188" text-anchor="end" class="grade" fill="#10b981">A</text>

  <line x1="490" y1="100" x2="518" y2="100" class="arrow"/>

  <!-- Output -->
  <rect x="520" y="50" width="160" height="80" class="box" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="600" y="75" text-anchor="middle" class="label">AnalysisResult</text>
  <text x="600" y="95" text-anchor="middle" class="desc">.grades() .summary</text>
  <text x="600" y="112" text-anchor="middle" class="desc">.profile .anomalies</text>

  <!-- Anomaly -->
  <rect x="520" y="150" width="160" height="55" class="box" fill="#1e293b" stroke="#ef4444"/>
  <text x="600" y="172" text-anchor="middle" class="label">이상치 6규칙</text>
  <text x="600" y="190" text-anchor="middle" class="desc">danger / warning / info</text>

  <line x1="490" y1="170" x2="518" y2="170" class="arrow"/>
</svg>
