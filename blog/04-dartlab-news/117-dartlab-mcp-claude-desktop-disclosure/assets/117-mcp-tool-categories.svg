<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 11px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .num { font-size: 20px; font-weight: 800; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
  </style>

  <rect width="720" height="400" rx="12" fill="#0f172a"/>

  <!-- 글로벌 도구 -->
  <rect x="30" y="20" width="320" height="360" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="50" y="50" class="num" fill="#3b82f6">16</text>
  <text x="90" y="50" class="title">글로벌 도구</text>
  <text x="50" y="70" class="desc">stock_code 불필요</text>
  <line x1="50" y1="82" x2="330" y2="82" stroke="#334155" stroke-width="1"/>

  <text x="50" y="105" class="label">search_company</text>
  <text x="220" y="105" class="desc">기업 검색</text>
  <text x="50" y="127" class="label">get_listing</text>
  <text x="220" y="127" class="desc">상장사 목록</text>
  <text x="50" y="149" class="label">get_system_spec</text>
  <text x="220" y="149" class="desc">시스템 메타데이터</text>
  <text x="50" y="171" class="label">get_engine_spec</text>
  <text x="220" y="171" class="desc">엔진별 스펙</text>
  <text x="50" y="193" class="label">get_sector_info</text>
  <text x="220" y="193" class="desc">섹터 분류</text>
  <text x="50" y="215" class="label">compare_companies</text>
  <text x="220" y="215" class="desc">기업간 비교</text>
  <text x="50" y="247" class="desc">+ 10개 추가 도구</text>

  <!-- 기업별 도구 -->
  <rect x="370" y="20" width="320" height="360" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="390" y="50" class="num" fill="#10b981">44</text>
  <text x="430" y="50" class="title">기업별 도구</text>
  <text x="390" y="70" class="desc">stock_code 필수</text>
  <line x1="390" y1="82" x2="670" y2="82" stroke="#334155" stroke-width="1"/>

  <text x="390" y="105" class="label">show_topic</text>
  <text x="560" y="105" class="desc">공시 주제 조회</text>
  <text x="390" y="127" class="label">list_topics</text>
  <text x="560" y="127" class="desc">조회 가능 주제</text>
  <text x="390" y="149" class="label">diff_topic</text>
  <text x="560" y="149" class="desc">기간별 텍스트 변화</text>
  <text x="390" y="171" class="label">get_financial_statements</text>
  <text x="560" y="171" class="desc">BS/IS/CF</text>
  <text x="390" y="193" class="label">get_ratios</text>
  <text x="560" y="193" class="desc">재무비율</text>
  <text x="390" y="215" class="label">get_insight</text>
  <text x="560" y="215" class="desc">인사이트 등급</text>
  <text x="390" y="237" class="label">get_ranking</text>
  <text x="560" y="237" class="desc">시장 규모 순위</text>
  <text x="390" y="259" class="label">get_valuation</text>
  <text x="560" y="259" class="desc">밸류에이션</text>
  <text x="390" y="291" class="desc">+ 36개 추가 도구</text>
</svg>