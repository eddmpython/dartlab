<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 11px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .header { font-size: 10px; font-weight: 700; fill: #64748b; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .center-box { rx: 6; ry: 6; stroke-width: 1; }
  </style>

  <rect width="700" height="300" rx="12" fill="#0f172a"/>

  <!-- ask 컬럼 -->
  <rect x="30" y="20" width="280" height="260" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="170" y="48" text-anchor="middle" class="title" fill="#3b82f6">dartlab ask</text>
  <line x1="50" y1="58" x2="290" y2="58" stroke="#334155" stroke-width="1"/>

  <text x="50" y="82" class="header">인터페이스</text>
  <text x="50" y="99" class="desc">CLI / Python API / Server API</text>

  <text x="50" y="125" class="header">LLM 역할</text>
  <text x="50" y="142" class="desc">데이터를 받아서 해석·설명</text>

  <text x="50" y="168" class="header">사용자</text>
  <text x="50" y="185" class="desc">질문을 던지고 답변을 받음</text>

  <text x="50" y="211" class="header">적합한 상황</text>
  <text x="50" y="228" class="desc">"삼성전자 분석해줘" — 종합 분석</text>
  <text x="50" y="243" class="desc">보고서 생성, 대화형 탐색</text>

  <!-- 공통 엔진 -->
  <rect x="295" y="110" width="110" height="80" class="center-box" fill="#0f172a" stroke="#f59e0b"/>
  <text x="350" y="140" text-anchor="middle" class="label" fill="#f59e0b">같은 엔진</text>
  <text x="350" y="160" text-anchor="middle" class="desc">Company</text>
  <text x="350" y="175" text-anchor="middle" class="desc">sections + finance</text>

  <!-- MCP 컬럼 -->
  <rect x="390" y="20" width="280" height="260" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="530" y="48" text-anchor="middle" class="title" fill="#10b981">dartlab MCP</text>
  <line x1="410" y1="58" x2="650" y2="58" stroke="#334155" stroke-width="1"/>

  <text x="410" y="82" class="header">인터페이스</text>
  <text x="410" y="99" class="desc">Claude Desktop / Code / Cursor</text>

  <text x="410" y="125" class="header">LLM 역할</text>
  <text x="410" y="142" class="desc">도구를 호출해서 데이터 직접 조회</text>

  <text x="410" y="168" class="header">사용자</text>
  <text x="410" y="185" class="desc">자연어로 요청 → LLM이 도구 선택</text>

  <text x="410" y="211" class="header">적합한 상황</text>
  <text x="410" y="228" class="desc">"삼성전자 BS 보여줘" — 특정 데이터</text>
  <text x="410" y="243" class="desc">IDE 안에서 즉시 조회, 코딩 중 참조</text>
</svg>