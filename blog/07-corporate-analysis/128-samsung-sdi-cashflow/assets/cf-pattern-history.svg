  <text x="130" y="160" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">영업(+) 투자(-) 재무(+)</text>
  <text x="130" y="178" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">FCF -88억</text>
  <text x="130" y="196" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">CAPEX 5,892억</text>

  <!-- 2022 -->
  <circle cx="270" cy="100" r="8" fill="#3b82f6"/>
  <text x="270" y="85" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2022</text>
