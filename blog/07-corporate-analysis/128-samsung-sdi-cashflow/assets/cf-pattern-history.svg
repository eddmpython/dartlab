  <text x="410" y="160" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">영업(+) 투자(-) 재무(+)</text>
  <text x="410" y="178" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">FCF -1.2조</text>
  <text x="410" y="196" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">CAPEX 1.6조</text>

