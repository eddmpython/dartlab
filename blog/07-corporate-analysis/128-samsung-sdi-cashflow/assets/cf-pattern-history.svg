  <text x="270" y="142" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold" font-family="system-ui">확장형</text>
  <text x="270" y="160" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">영업(+) 투자(-) 재무(+)</text>
  <text x="270" y="178" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">FCF -1,540억</text>
  <text x="270" y="196" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">CAPEX 8,175억</text>

