  <text x="690" y="196" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui">CAPEX 6,694억</text>

  <!-- Bottom: 6 patterns reference -->
  <rect x="40" y="240" width="720" height="140" rx="10" fill="#1e293b"/>
  <text x="400" y="265" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold" font-family="system-ui">CF 패턴 6가지 유형</text>

  <text x="80" y="290" fill="#60a5fa" font-size="10" font-weight="bold" font-family="system-ui">성숙형</text>
  <text x="80" y="305" fill="#64748b" font-size="9" font-family="system-ui">영업(+) 투자(-) 재무(-)</text>
  <text x="80" y="320" fill="#64748b" font-size="9" font-family="system-ui">자체 현금으로 투자+상환</text>

  <text x="210" y="290" fill="#3b82f6" font-size="10" font-weight="bold" font-family="system-ui">확장형</text>
  <text x="210" y="305" fill="#64748b" font-size="9" font-family="system-ui">영업(+) 투자(-) 재무(+)</text>
  <text x="210" y="320" fill="#64748b" font-size="9" font-family="system-ui">외부 자금으로 공격 투자</text>

  <text x="340" y="290" fill="#fbbf24" font-size="10" font-weight="bold" font-family="system-ui">구조조정형</text>
  <text x="340" y="305" fill="#64748b" font-size="9" font-family="system-ui">영업(+) 투자(+) 재무(-)</text>
  <text x="340" y="320" fill="#64748b" font-size="9" font-family="system-ui">자산 매각으로 부채 축소</text>

  <text x="480" y="290" fill="#f97316" font-size="10" font-weight="bold" font-family="system-ui">축소형</text>
  <text x="480" y="305" fill="#64748b" font-size="9" font-family="system-ui">영업(-) 투자(+) 재무(-)</text>
  <text x="480" y="320" fill="#64748b" font-size="9" font-family="system-ui">사업 정리 단계</text>

  <text x="600" y="290" fill="#ef4444" font-size="10" font-weight="bold" font-family="system-ui">위기형</text>
  <text x="600" y="305" fill="#64748b" font-size="9" font-family="system-ui">영업(-) 투자(-) 재무(+)</text>
  <text x="600" y="320" fill="#64748b" font-size="9" font-family="system-ui">적자인데 빚으로 투자</text>

  <text x="710" y="290" fill="#a855f7" font-size="10" font-weight="bold" font-family="system-ui">긴급형</text>
  <text x="710" y="305" fill="#64748b" font-size="9" font-family="system-ui">영업(-) 투자(+) 재무(+)</text>
  <text x="710" y="320" fill="#64748b" font-size="9" font-family="system-ui">자산 팔고 빚도 늘림</text>

  <!-- Arrow: 삼성SDI 위치 표시 -->
  <polygon points="255,340 265,352 245,352" fill="#3b82f6"/>
  <text x="255" y="370" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="system-ui">2021-2024</text>
  <polygon points="385,340 395,352 375,352" fill="#ef4444"/>
  <text x="385" y="370" text-anchor="middle" fill="#f87171" font-size="9" font-family="system-ui">2025</text>
</svg>