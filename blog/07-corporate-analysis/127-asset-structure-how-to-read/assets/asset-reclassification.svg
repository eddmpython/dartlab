<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="18" fill="#0a0e1a"/>
  <text x="400" y="35" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui">영업자산 vs 비영업자산 비중 추이 (2021-2025)</text>

  <!-- Y axis labels -->
  <text x="45" y="80" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">100%</text>
  <text x="45" y="155" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">75%</text>
  <text x="45" y="230" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">50%</text>
  <text x="45" y="305" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">25%</text>
  <text x="45" y="365" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">0%</text>

  <!-- Grid lines -->
  <line x1="55" y1="75" x2="750" y2="75" stroke="#1e293b" stroke-width="1"/>
  <line x1="55" y1="150" x2="750" y2="150" stroke="#1e293b" stroke-width="1"/>
  <line x1="55" y1="225" x2="750" y2="225" stroke="#1e293b" stroke-width="1"/>
  <line x1="55" y1="300" x2="750" y2="300" stroke="#1e293b" stroke-width="1"/>

  <!-- 2021 stacked bar -->
  <rect x="85" y="75" width="80" height="46" rx="4" fill="#8b5cf6" opacity="0.7"/>
  <text x="125" y="103" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="system-ui">기타 16%</text>
  <rect x="85" y="121" width="80" height="116" rx="0" fill="#a78bfa" opacity="0.5"/>
  <text x="125" y="183" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">비영업 40%</text>
  <rect x="85" y="237" width="80" height="128" rx="0" fill="#3b82f6" opacity="0.7"/>
  <text x="125" y="305" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">영업 44%</text>
  <text x="125" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2021</text>

  <!-- 2022 stacked bar -->
  <rect x="220" y="75" width="80" height="49" rx="4" fill="#8b5cf6" opacity="0.7"/>
  <text x="260" y="105" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="system-ui">기타 17%</text>
  <rect x="220" y="124" width="80" height="110" rx="0" fill="#a78bfa" opacity="0.5"/>
  <text x="260" y="183" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">비영업 38%</text>
  <rect x="220" y="234" width="80" height="131" rx="0" fill="#3b82f6" opacity="0.7"/>
  <text x="260" y="305" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">영업 45%</text>
  <text x="260" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2022</text>

  <!-- 2023 stacked bar -->
  <rect x="355" y="75" width="80" height="49" rx="4" fill="#8b5cf6" opacity="0.7"/>
  <text x="395" y="105" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="system-ui">기타 17%</text>
  <rect x="355" y="124" width="80" height="99" rx="0" fill="#a78bfa" opacity="0.5"/>
  <text x="395" y="178" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">비영업 34%</text>
  <rect x="355" y="223" width="80" height="142" rx="0" fill="#3b82f6" opacity="0.8"/>
  <text x="395" y="300" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">영업 49%</text>
  <text x="395" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2023</text>

  <!-- 2024 stacked bar -->
  <rect x="490" y="75" width="80" height="46" rx="4" fill="#8b5cf6" opacity="0.7"/>
  <text x="530" y="103" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="system-ui">기타 16%</text>
  <rect x="490" y="121" width="80" height="87" rx="0" fill="#a78bfa" opacity="0.5"/>
  <text x="530" y="168" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">비영업 30%</text>
  <rect x="490" y="208" width="80" height="157" rx="0" fill="#3b82f6" opacity="0.9"/>
  <text x="530" y="292" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">영업 54%</text>
  <text x="530" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2024</text>

  <!-- 2025 stacked bar -->
  <rect x="625" y="75" width="80" height="38" rx="4" fill="#8b5cf6" opacity="0.7"/>
  <text x="665" y="99" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="system-ui">기타 13%</text>
  <rect x="625" y="113" width="80" height="90" rx="0" fill="#a78bfa" opacity="0.5"/>
  <text x="665" y="162" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">비영업 31%</text>
  <rect x="625" y="203" width="80" height="162" rx="0" fill="#3b82f6"/>
  <text x="665" y="290" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui">영업 56%</text>
  <text x="665" y="380" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold" font-family="system-ui">2025</text>
