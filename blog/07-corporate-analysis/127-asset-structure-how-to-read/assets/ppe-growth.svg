<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="18" fill="#0a0e1a"/>
  <text x="400" y="35" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui">유형자산 성장 추이 — 7.6조에서 19.2조 (2.5배)</text>

  <!-- Y axis -->
  <text x="50" y="85" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">20조</text>
  <text x="50" y="145" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">15조</text>
  <text x="50" y="205" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">10조</text>
  <text x="50" y="265" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">5조</text>
  <text x="50" y="325" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">0</text>

  <!-- Grid lines -->
  <line x1="60" y1="80" x2="750" y2="80" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="140" x2="750" y2="140" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="200" x2="750" y2="200" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="260" x2="750" y2="260" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="320" x2="750" y2="320" stroke="#1e293b" stroke-width="1"/>

  <!-- Bar: 2021 = 7.6조 -->
  <rect x="100" y="229" width="80" height="91" rx="6" fill="#3b82f6" opacity="0.5"/>
  <text x="140" y="222" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">7.6조</text>
  <text x="140" y="340" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2021</text>

  <!-- Bar: 2022 = 9.8조 (estimate) -->
  <rect x="230" y="203" width="80" height="117" rx="6" fill="#3b82f6" opacity="0.6"/>
  <text x="270" y="196" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">9.8조</text>
  <text x="270" y="340" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2022</text>

  <!-- Bar: 2023 = 12.5조 (estimate) -->
  <rect x="360" y="170" width="80" height="150" rx="6" fill="#3b82f6" opacity="0.7"/>
  <text x="400" y="163" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">12.5조</text>
  <text x="400" y="340" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2023</text>

  <!-- Bar: 2024 = 16.8조 (estimate) -->
  <rect x="490" y="119" width="80" height="201" rx="6" fill="#3b82f6" opacity="0.85"/>
  <text x="530" y="112" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">16.8조</text>
  <text x="530" y="340" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2024</text>

  <!-- Bar: 2025 = 19.2조 -->
  <rect x="620" y="90" width="80" height="230" rx="6" fill="#3b82f6"/>
  <text x="660" y="83" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold" font-family="system-ui">19.2조</text>
  <text x="660" y="340" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold" font-family="system-ui">2025</text>

  <!-- Growth annotation -->
  <line x1="140" y1="229" x2="660" y2="90" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- x2.5 badge -->
  <rect x="340" y="355" width="120" height="30" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="400" y="375" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold" font-family="system-ui">5년간 2.5배</text>
