<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="18" fill="#0a0e1a"/>
  <text x="400" y="35" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold" font-family="system-ui">영업CF 마진 추이 (매출 대비 현금 창출력)</text>

  <!-- Y axis -->
  <text x="55" y="90" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">20%</text>
  <text x="55" y="145" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">15%</text>
  <text x="55" y="200" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">10%</text>
  <text x="55" y="255" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">5%</text>
  <text x="55" y="310" text-anchor="end" fill="#64748b" font-size="10" font-family="system-ui">0%</text>

  <!-- Grid -->
  <line x1="70" y1="85" x2="750" y2="85" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="70" y1="140" x2="750" y2="140" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="70" y1="195" x2="750" y2="195" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="70" y1="250" x2="750" y2="250" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="70" y1="305" x2="750" y2="305" stroke="#334155" stroke-width="1"/>

  <!-- 10% reference -->
  <line x1="70" y1="195" x2="750" y2="195" stroke="#22c55e" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="755" y="200" fill="#4ade80" font-size="9" font-family="system-ui">10%</text>

  <!-- Bars -->
  <!-- 2021: 15.2% → height = 15.2 * 11 = 167.2, y = 305 - 167.2 = 137.8 -->
  <rect x="110" y="138" width="80" height="167" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="150" y="128" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold" font-family="system-ui">15.2%</text>
  <text x="150" y="330" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2021</text>

  <!-- 2022: 11.1% → height = 11.1 * 11 = 122.1, y = 305 - 122.1 = 182.9 -->
  <rect x="240" y="183" width="80" height="122" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="280" y="173" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold" font-family="system-ui">11.1%</text>
  <text x="280" y="330" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2022</text>

  <!-- 2023: 7.6% → height = 7.6 * 11 = 83.6, y = 305 - 83.6 = 221.4 -->
  <rect x="370" y="221" width="80" height="84" rx="4" fill="#fbbf24" opacity="0.7"/>
  <text x="410" y="215" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold" font-family="system-ui">7.6%</text>
  <text x="410" y="330" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2023</text>

  <!-- 2024: 10.0% → height = 10.0 * 11 = 110, y = 305 - 110 = 195 -->
  <rect x="500" y="195" width="80" height="110" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="540" y="188" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold" font-family="system-ui">10.0%</text>
  <text x="540" y="330" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2024</text>

  <!-- 2025: 8.6% → height = 8.6 * 11 = 94.6, y = 305 - 94.6 = 210.4 -->
  <rect x="630" y="210" width="80" height="95" rx="4" fill="#fbbf24" opacity="0.7"/>
  <text x="670" y="204" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold" font-family="system-ui">8.6%</text>
  <text x="670" y="330" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">2025</text>

  <!-- Annotation -->
  <rect x="120" y="355" width="560" height="30" rx="6" fill="#1e293b"/>
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">매출 100원당 현금 창출: 15.2원(2021) → 8.6원(2025) — 5년간 거의 반감</text>
</svg>