<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="18" fill="#0a0e1a"/>
  <text x="400" y="35" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold" font-family="system-ui">Pecking Order Theory — 삼성SDI는 어디에 있나</text>

  <!-- Funnel stages -->
  <rect x="60" y="65" width="680" height="50" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="95" fill="#60a5fa" font-size="13" font-weight="bold" font-family="system-ui">1순위: 내부 이익잉여금</text>
  <text x="520" y="95" fill="#94a3b8" font-size="12" font-family="system-ui">정보비대칭 비용 최소 → 가장 저렴</text>

  <rect x="100" y="130" width="600" height="50" rx="8" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="140" y="160" fill="#f87171" font-size="13" font-weight="bold" font-family="system-ui">2순위: 부채 (차입·사채)</text>
  <text x="520" y="160" fill="#94a3b8" font-size="12" font-family="system-ui">이자 비용 발생, 세금 절감 효과</text>

  <rect x="140" y="195" width="520" height="50" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
  <text x="180" y="225" fill="#a78bfa" font-size="13" font-weight="bold" font-family="system-ui">3순위: 주식 발행</text>
  <text x="480" y="225" fill="#94a3b8" font-size="12" font-family="system-ui">정보비대칭 비용 최대 → 최후 수단</text>

  <!-- SDI position indicator -->
  <rect x="60" y="270" width="680" height="40" rx="8" fill="#1e293b"/>
  <text x="80" y="295" fill="#fbbf24" font-size="12" font-weight="bold" font-family="system-ui">삼성SDI 현재:</text>
  <text x="210" y="295" fill="#e2e8f0" font-size="12" font-family="system-ui">1순위 소진(유보 29%↓) → 2순위 급증(차입 26%↑) → 유상증자(3순위) 집행</text>

  <!-- Arrow showing progression -->
  <text x="730" y="95" text-anchor="middle" fill="#3b82f6" font-size="20" font-family="system-ui">✓</text>
  <text x="690" y="160" text-anchor="middle" fill="#ef4444" font-size="20" font-family="system-ui">←</text>
  <text x="650" y="225" text-anchor="middle" fill="#a78bfa" font-size="20" font-family="system-ui">←</text>
</svg>