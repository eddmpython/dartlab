<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="18" fill="#0a0e1a"/>
  <text x="400" y="35" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold" font-family="system-ui">삼성SDI 자금 구조 위험 대시보드</text>

  <!-- 4 risk cards -->
  <rect x="40" y="60" width="170" height="120" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="125" y="85" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold" font-family="system-ui">이자보상배율</text>
  <text x="125" y="120" text-anchor="middle" fill="#ef4444" font-size="32" font-weight="bold" font-family="system-ui">-1.6x</text>
  <text x="125" y="145" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">영업적자로 이자 미상환</text>
  <rect x="60" y="158" width="130" height="6" rx="3" fill="#334155"/>
  <rect x="60" y="158" width="0" height="6" rx="3" fill="#ef4444"/>
  <text x="125" y="175" text-anchor="middle" fill="#ef4444" font-size="9" font-family="system-ui">위험</text>

  <rect x="225" y="60" width="170" height="120" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="310" y="85" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold" font-family="system-ui">유동비율</text>
  <text x="310" y="120" text-anchor="middle" fill="#fbbf24" font-size="32" font-weight="bold" font-family="system-ui">89%</text>
  <text x="310" y="145" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">100% 미만 — 주의 구간</text>
  <rect x="245" y="158" width="130" height="6" rx="3" fill="#334155"/>
  <rect x="245" y="158" width="77" height="6" rx="3" fill="#fbbf24"/>
  <text x="310" y="175" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="system-ui">주의</text>

  <rect x="410" y="60" width="170" height="120" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="495" y="85" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold" font-family="system-ui">Altman Z-Score</text>
  <text x="495" y="120" text-anchor="middle" fill="#ef4444" font-size="32" font-weight="bold" font-family="system-ui">0.94</text>
  <text x="495" y="145" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">1.81 미만 — 부실 경계</text>
  <rect x="430" y="158" width="130" height="6" rx="3" fill="#334155"/>
  <rect x="430" y="158" width="43" height="6" rx="3" fill="#ef4444"/>
  <text x="495" y="175" text-anchor="middle" fill="#ef4444" font-size="9" font-family="system-ui">위험</text>

  <rect x="595" y="60" width="170" height="120" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="680" y="85" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold" font-family="system-ui">암묵적 차입금리</text>
  <text x="680" y="120" text-anchor="middle" fill="#22c55e" font-size="32" font-weight="bold" font-family="system-ui">2.3%</text>
  <text x="680" y="145" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">시장 금리 대비 양호</text>
  <rect x="615" y="158" width="130" height="6" rx="3" fill="#334155"/>
  <rect x="615" y="158" width="100" height="6" rx="3" fill="#22c55e"/>
  <text x="680" y="175" text-anchor="middle" fill="#22c55e" font-size="9" font-family="system-ui">양호</text>

  <!-- Bottom summary -->
  <rect x="40" y="210" width="725" height="90" rx="12" fill="#1e293b"/>
  <text x="60" y="240" fill="#e2e8f0" font-size="13" font-weight="bold" font-family="system-ui">종합 판단</text>
  <text x="60" y="265" fill="#94a3b8" font-size="12" font-family="system-ui">영업이익 적자로 이자·원금 상환이 불가능한 구조. 차입금리 2.3%는 양호하나,</text>
  <text x="60" y="285" fill="#94a3b8" font-size="12" font-family="system-ui">이익이 돌아오지 않으면 차환 리스크가 현실화된다. 유동비율 89%는 단기 유동성 경고.</text>
</svg>