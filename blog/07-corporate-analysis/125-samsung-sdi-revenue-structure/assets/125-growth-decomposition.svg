<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" rx="16" fill="url(#bg4)"/>
  <text x="40" y="40" fill="#e2e8f0" font-size="15" font-weight="700">성장 기여 분해 (2022→2025)</text>
  <text x="40" y="60" fill="#64748b" font-size="11">전체 매출 -34% — 어디서 빠졌나</text>

  <!-- 전체 변화 바 -->
  <rect x="60" y="85" width="680" height="40" rx="6" fill="#334155"/>
  <text x="400" y="110" fill="#94a3b8" font-size="13" font-weight="600" text-anchor="middle">전체 매출 변화 -34.1%</text>

  <!-- 에너지솔루션 기여 -->
  <rect x="60" y="145" width="514" height="50" rx="8" fill="#ef4444" opacity="0.7"/>
  <text x="80" y="165" fill="#fff" font-size="14" font-weight="700">에너지솔루션</text>
  <text x="80" y="185" fill="#fecaca" font-size="12">감소의 76% 기여 — 매출 17.6조 → 12.4조 (-5.2조)</text>
  <text x="540" y="175" fill="#fff" font-size="16" font-weight="700">-76%</text>

  <!-- 전자재료 기여 -->
  <rect x="60" y="210" width="166" height="50" rx="8" fill="#f59e0b" opacity="0.6"/>
  <text x="80" y="230" fill="#fff" font-size="14" font-weight="700">전자재료</text>
  <text x="80" y="248" fill="#fef3c7" font-size="12">감소의 24% — 매출 2.6조 → 0.9조</text>

  <!-- 해석 -->
  <text x="60" y="288" fill="#94a3b8" font-size="12">에너지솔루션이 매출 감소의 대부분을 차지한다. 배터리 가격 하락 + 수요 둔화의 직격탄.</text>
</svg>