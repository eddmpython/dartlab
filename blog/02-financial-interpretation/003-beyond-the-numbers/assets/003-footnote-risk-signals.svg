<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bg003n" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" rx="12" fill="url(#bg003n)"/>
  <rect x="0.5" y="0.5" width="799" height="419" rx="12" stroke="#1e2433" stroke-width="1"/>

  <text x="400" y="34" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Footnote Risk Signal Board</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">Four note areas that flip interpretation of headline numbers</text>

  <rect x="48" y="80" width="340" height="140" rx="8" fill="rgba(234,70,71,0.05)" stroke="rgba(234,70,71,0.2)"/>
  <text x="64" y="104" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f87171">Borrowings Note</text>
  <text x="64" y="124" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">Check:</text>
  <text x="64" y="142" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Maturity concentration</text>
  <text x="64" y="158" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Variable-rate share</text>
  <text x="64" y="174" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Refinance dependence</text>
  <text x="64" y="198" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Headline debt ratio can hide timing risk.</text>

  <rect x="412" y="80" width="340" height="140" rx="8" fill="rgba(251,146,60,0.05)" stroke="rgba(251,146,60,0.2)"/>
  <text x="428" y="104" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74">Inventory Note</text>
  <text x="428" y="124" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">Check:</text>
  <text x="428" y="142" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Write-down trend</text>
  <text x="428" y="158" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Raw vs finished mix</text>
  <text x="428" y="174" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Obsolescence speed</text>
  <text x="428" y="198" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Revenue growth may be inventory loading.</text>

  <rect x="48" y="236" width="340" height="140" rx="8" fill="rgba(251,191,36,0.05)" stroke="rgba(251,191,36,0.2)"/>
  <text x="64" y="260" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fde68a">Provisions Note</text>
  <text x="64" y="280" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">Check:</text>
  <text x="64" y="298" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Litigation provision jump</text>
  <text x="64" y="314" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Warranty burden trend</text>
  <text x="64" y="330" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Contingent liabilities gap</text>
  <text x="64" y="354" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Future losses often start here first.</text>

  <rect x="412" y="236" width="340" height="140" rx="8" fill="rgba(139,92,246,0.05)" stroke="rgba(139,92,246,0.2)"/>
  <text x="428" y="260" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd">Segment Note</text>
  <text x="428" y="280" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">Check:</text>
  <text x="428" y="298" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Profit concentration by segment</text>
  <text x="428" y="314" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Loss-making segment persistence</text>
  <text x="428" y="330" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">- Regional dependency</text>
  <text x="428" y="354" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Total profit can mask structural weakness.</text>
</svg>
