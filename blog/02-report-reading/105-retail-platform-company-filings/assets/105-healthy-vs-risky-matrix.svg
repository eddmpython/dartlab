<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="479" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="400" y="42" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">건강한 유통·플랫폼 vs 위험한 유통·플랫폼</text>
  <line x1="240" y1="56" x2="560" y2="56" stroke="#a78bfa" stroke-width="1.2" opacity="0.3"/>

  <rect x="60" y="70" width="330" height="32" rx="6" fill="rgba(52,211,153,0.10)"/>
  <text x="225" y="91" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#34d399">건강한 구조</text>
  <rect x="410" y="70" width="330" height="32" rx="6" fill="rgba(248,113,113,0.10)"/>
  <text x="575" y="91" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#f87171">위험한 구조</text>

  <text x="60" y="128" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">테이크레이트</text>
  <rect x="60" y="136" width="330" height="36" rx="6" fill="rgba(52,211,153,0.04)" stroke="#34d399" stroke-width="0.5"/>
  <text x="225" y="158" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">유지·상승, 광고 수익원 확대</text>
  <rect x="410" y="136" width="330" height="36" rx="6" fill="rgba(248,113,113,0.04)" stroke="#f87171" stroke-width="0.5"/>
  <text x="575" y="158" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">하락, 수수료 경쟁 심화</text>

  <text x="60" y="192" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">이행비용</text>
  <rect x="60" y="200" width="330" height="36" rx="6" fill="rgba(52,211,153,0.04)" stroke="#34d399" stroke-width="0.5"/>
  <text x="225" y="222" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">비용률 개선, 규모의 경제</text>
  <rect x="410" y="200" width="330" height="36" rx="6" fill="rgba(248,113,113,0.04)" stroke="#f87171" stroke-width="0.5"/>
  <text x="575" y="222" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">정체·악화, 배송 보조금 과다</text>

  <text x="60" y="256" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">마케팅</text>
  <rect x="60" y="264" width="330" height="36" rx="6" fill="rgba(52,211,153,0.04)" stroke="#34d399" stroke-width="0.5"/>
  <text x="225" y="286" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">비중 감소, MAU 유지</text>
  <rect x="410" y="264" width="330" height="36" rx="6" fill="rgba(248,113,113,0.04)" stroke="#f87171" stroke-width="0.5"/>
  <text x="575" y="286" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">끊으면 이탈, CAC > LTV</text>

  <text x="60" y="320" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">단위경제</text>
  <rect x="60" y="328" width="330" height="36" rx="6" fill="rgba(52,211,153,0.04)" stroke="#34d399" stroke-width="0.5"/>
  <text x="225" y="350" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">공헌이익 양수, 개선 추세</text>
  <rect x="410" y="328" width="330" height="36" rx="6" fill="rgba(248,113,113,0.04)" stroke="#f87171" stroke-width="0.5"/>
  <text x="575" y="350" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">음수, 성장할수록 적자 확대</text>

  <text x="60" y="384" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">현금흐름</text>
  <rect x="60" y="392" width="330" height="36" rx="6" fill="rgba(52,211,153,0.04)" stroke="#34d399" stroke-width="0.5"/>
  <text x="225" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">영업CF 흑자, CAPEX 피크 지남</text>
  <rect x="410" y="392" width="330" height="36" rx="6" fill="rgba(248,113,113,0.04)" stroke="#f87171" stroke-width="0.5"/>
  <text x="575" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">적자 지속, 유증 반복</text>

  <rect x="100" y="440" width="600" height="24" rx="6" fill="rgba(167,139,250,0.06)"/>
  <text x="400" y="457" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">좋은 적자: 단위경제 양수 + 수렴 | 나쁜 적자: 단위경제 음수 + 발산</text>

  <text x="400" y="476" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
</svg>
