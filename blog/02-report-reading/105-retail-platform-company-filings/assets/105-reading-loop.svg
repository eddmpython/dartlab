<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#94a3b8" stroke-width="1"/>
    </marker>
  </defs>
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="479" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="400" y="42" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">유통·플랫폼 단위경제 루프 — 읽는 순서</text>
  <line x1="240" y1="56" x2="560" y2="56" stroke="#a78bfa" stroke-width="1.2" opacity="0.3"/>

  <rect x="50" y="80" width="190" height="64" rx="10" fill="rgba(167,139,250,0.10)" stroke="#a78bfa" stroke-width="1"/>
  <text x="145" y="106" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">1. GMV vs 순매출</text>
  <text x="145" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">총액법·순액법, 배율</text>

  <path d="M240 112 L290 112" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="290" y="80" width="210" height="64" rx="10" fill="rgba(56,189,248,0.10)" stroke="#38bdf8" stroke-width="1"/>
  <text x="395" y="106" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">2. 테이크레이트·수익</text>
  <text x="395" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">수수료·광고·구독 구성</text>

  <path d="M500 112 L550 112" stroke="#38bdf8" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="550" y="80" width="200" height="64" rx="10" fill="rgba(52,211,153,0.10)" stroke="#34d399" stroke-width="1"/>
  <text x="650" y="106" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#34d399">3. 이행비용·물류</text>
  <text x="650" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">배송·창고·반품 비용률</text>

  <path d="M650 144 L650 185" stroke="#34d399" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="440" y="192" width="260" height="64" rx="10" fill="rgba(251,146,60,0.10)" stroke="#fb923c" stroke-width="1"/>
  <text x="570" y="218" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#fb923c">4. CAC·마케팅 효율</text>
  <text x="570" y="238" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">LTV/CAC, MAU 유지율</text>

  <path d="M440 224 L330 224" stroke="#fb923c" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="80" y="192" width="250" height="64" rx="10" fill="rgba(248,113,113,0.10)" stroke="#f87171" stroke-width="1"/>
  <text x="205" y="218" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#f87171">5. 단위경제·손익분기</text>
  <text x="205" y="238" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">주문당 공헌이익, 영업레버리지</text>

  <path d="M80 224 L50 224 L50 112" stroke="#f87171" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>

  <rect x="100" y="290" width="600" height="80" rx="10" fill="rgba(167,139,250,0.06)" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="400" y="318" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">핵심: 매출 절대값이 아니라 거래 1건당 남는 돈의 구조를 먼저 읽는다</text>
  <text x="400" y="342" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">단위경제 양수 + 성장 = 시간이 답 | 단위경제 음수 + 성장 = 성장이 독</text>
  <text x="400" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">같은 매출 1조여도 직매입 vs 마켓플레이스는 완전히 다른 사업</text>

  <rect x="100" y="392" width="600" height="52" rx="8" fill="rgba(251,146,60,0.06)" stroke="#fb923c" stroke-width="0.5"/>
  <text x="120" y="416" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fb923c">+</text>
  <text x="140" y="416" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">유형별 핵심이 다르다</text>
  <text x="140" y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">오프라인=평당매출·리스 | 직매입=재고회전·이행비용 | 마켓플레이스=테이크레이트·MAU</text>

  <text x="400" y="466" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
</svg>
