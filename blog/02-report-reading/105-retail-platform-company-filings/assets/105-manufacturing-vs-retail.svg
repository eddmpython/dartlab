<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="519" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="400" y="42" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">같은 매출 1조 — 직매입 vs 마켓플레이스 vs 제조업</text>
  <line x1="200" y1="56" x2="600" y2="56" stroke="#a78bfa" stroke-width="1.2" opacity="0.3"/>

  <text x="140" y="86" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="12" font-weight="700" fill="#94a3b8">항목</text>
  <text x="340" y="86" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="12" font-weight="700" fill="#34d399">제조업</text>
  <text x="510" y="86" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="12" font-weight="700" fill="#a78bfa">직매입 유통</text>
  <text x="680" y="86" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="12" font-weight="700" fill="#fb923c">마켓플레이스</text>
  <line x1="50" y1="98" x2="750" y2="98" stroke="#1e2433" stroke-width="1"/>

  <rect x="50" y="106" width="700" height="48" rx="6" fill="rgba(167,139,250,0.04)"/>
  <text x="140" y="132" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">GMV</text>
  <text x="340" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">해당 없음</text>
  <text x="510" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">= 매출 (1조)</text>
  <text x="680" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">10조 (매출의 10배)</text>

  <rect x="50" y="162" width="700" height="48" rx="6" fill="rgba(56,189,248,0.04)"/>
  <text x="140" y="188" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">매출</text>
  <text x="340" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">1조 (제품 판매)</text>
  <text x="510" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">1조 (상품 재판매)</text>
  <text x="680" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">1000억 (수수료)</text>

  <rect x="50" y="218" width="700" height="48" rx="6" fill="rgba(52,211,153,0.04)"/>
  <text x="140" y="244" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">매출총이익률</text>
  <text x="340" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">30~50%</text>
  <text x="510" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">15~25%</text>
  <text x="680" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">60~80%</text>

  <rect x="50" y="274" width="700" height="48" rx="6" fill="rgba(251,146,60,0.04)"/>
  <text x="140" y="300" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">핵심 비용</text>
  <text x="340" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">원재료비</text>
  <text x="510" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">이행비용 (물류)</text>
  <text x="680" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">마케팅·CAC</text>

  <rect x="50" y="330" width="700" height="48" rx="6" fill="rgba(248,113,113,0.04)"/>
  <text x="140" y="356" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">재고 리스크</text>
  <text x="340" y="356" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">자사 제품</text>
  <text x="510" y="356" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">타사 상품 (높음)</text>
  <text x="680" y="356" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">없음</text>

  <rect x="50" y="386" width="700" height="48" rx="6" fill="rgba(129,140,248,0.04)"/>
  <text x="140" y="412" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">핵심 지표</text>
  <text x="340" y="412" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">영업이익률</text>
  <text x="510" y="412" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">이행비용률·재고회전</text>
  <text x="680" y="412" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">테이크레이트·MAU</text>

  <rect x="100" y="452" width="600" height="28" rx="6" fill="rgba(167,139,250,0.06)"/>
  <text x="400" y="470" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">같은 매출 1조여도 비즈니스 모델이 다르면 읽는 숫자가 완전히 달라진다</text>

  <text x="400" y="510" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
</svg>
