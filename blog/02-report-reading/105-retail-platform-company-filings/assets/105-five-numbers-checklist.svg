<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="800" height="540" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="539" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="400" y="42" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">유통·플랫폼 5가지 핵심 숫자 — 위험 체크보드</text>
  <line x1="230" y1="56" x2="570" y2="56" stroke="#a78bfa" stroke-width="1.2" opacity="0.3"/>

  <rect x="60" y="76" width="680" height="72" rx="10" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="0.8"/>
  <circle cx="92" cy="100" r="14" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="92" y="105" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">1</text>
  <text x="120" y="100" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">GMV vs 순매출</text>
  <text x="120" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">총액·순액법 확인 → 테이크레이트 = 순매출/GMV</text>
  <text x="120" y="136" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 총액법으로 매출 부풀림, GMV 성장 둔화</text>

  <rect x="60" y="160" width="680" height="72" rx="10" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="0.8"/>
  <circle cx="92" cy="184" r="14" fill="rgba(56,189,248,0.2)" stroke="#38bdf8" stroke-width="1"/>
  <text x="92" y="189" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">2</text>
  <text x="120" y="184" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">테이크레이트·수익 구조</text>
  <text x="120" y="202" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">수수료+광고+구독 다변화 = 건강 | 광고 마진 극히 높음</text>
  <text x="120" y="220" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 테이크레이트 하락, 수수료 경쟁 심화</text>

  <rect x="60" y="244" width="680" height="72" rx="10" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="0.8"/>
  <circle cx="92" cy="268" r="14" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="92" y="273" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#34d399">3</text>
  <text x="120" y="268" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#34d399">이행비용·물류 효율</text>
  <text x="120" y="286" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">이행비용률 개선 = 규모의 경제 작동</text>
  <text x="120" y="304" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 비용률 정체·악화, 배송 보조금 과다</text>

  <rect x="60" y="328" width="680" height="72" rx="10" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="0.8"/>
  <circle cx="92" cy="352" r="14" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1"/>
  <text x="92" y="357" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fb923c">4</text>
  <text x="120" y="352" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#fb923c">CAC·마케팅 효율</text>
  <text x="120" y="370" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">마케팅 줄여도 MAU 유지 = 습관화 | LTV/CAC > 3x</text>
  <text x="120" y="388" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 마케팅 끊으면 이탈, CAC > LTV</text>

  <rect x="60" y="412" width="680" height="72" rx="10" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="0.8"/>
  <circle cx="92" cy="436" r="14" fill="rgba(248,113,113,0.2)" stroke="#f87171" stroke-width="1"/>
  <text x="92" y="441" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f87171">5</text>
  <text x="120" y="436" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#f87171">단위경제·손익분기</text>
  <text x="120" y="454" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">주문당 공헌이익 양수 + 개선 추세 = 흑자 전환 신호</text>
  <text x="120" y="472" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 공헌이익 음수, 적자 5년+ 수렴 없음</text>

  <text x="400" y="528" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
</svg>
