<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">사업보고서 섹션 우선순위 히트맵</title>
  <desc id="desc">숫자 신뢰성, 리스크, 성장, 지배구조 등 읽는 목적에 따라 사업보고서에서 어떤 섹션을 먼저 봐야 하는지 정리한 히트맵</desc>
  <defs>
    <linearGradient id="bg004b" x1="0" y1="0" x2="1200" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0f1724"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" rx="28" fill="url(#bg004b)"/>
  <rect x="20" y="20" width="1160" height="780" rx="24" stroke="#1e293b" stroke-width="2"/>

  <text x="72" y="82" fill="#0f1219" font-family="Pretendard, Inter, sans-serif" font-size="34" font-weight="700">무엇이 궁금한가에 따라 먼저 열 섹션이 달라진다</text>
  <text x="72" y="120" fill="#94a3b8" font-family="Pretendard, Inter, sans-serif" font-size="18">사업보고서는 순서대로 읽는 문서가 아니라, 질문에 따라 다른 곳부터 여는 문서다.</text>

