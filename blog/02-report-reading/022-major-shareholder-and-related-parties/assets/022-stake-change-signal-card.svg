<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">지분 변동 신호 카드</title>
  <desc id="desc">최대주주와 특수관계인 지분 변동을 읽을 때 좋은 신호와 경계 신호를 비교하는 카드</desc>
  <defs>
    <linearGradient id="bg022b" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09111d"/>
      <stop offset="100%" stop-color="#101826"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg022b)"/>
  <rect x="20" y="20" width="1160" height="680" rx="24" stroke="#1e293b" stroke-width="2"/>

  <text x="72" y="82" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="34" font-weight="700">지분 변동은 크기보다 방향과 설명을 본다</text>
  <text x="72" y="120" fill="#94a3b8" font-family="Pretendard, Inter, sans-serif" font-size="18">같은 변동도 구조 단순화인지, 복잡화인지에 따라 의미가 달라진다.</text>

  <rect x="72" y="176" width="250" height="214" rx="22" fill="#16231f" stroke="#22c55e" stroke-width="2"/>
  <text x="98" y="220" fill="#86efac" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">CHECK 1</text>
  <text x="98" y="262" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="26" font-weight="700">합계는 유지</text>
  <text x="98" y="298" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="18">가족과 계열사 비중만</text>
  <text x="98" y="324" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="18">정리된 경우일 수 있다</text>
  <text x="98" y="362" fill="#bbf7d0" font-family="Pretendard, Inter, sans-serif" font-size="18">핵심 질문: 구조가 단순해졌는가</text>

  <rect x="346" y="176" width="250" height="214" rx="22" fill="#142033" stroke="#38bdf8" stroke-width="2"/>
  <text x="372" y="220" fill="#7dd3fc" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">CHECK 2</text>
  <text x="372" y="262" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="26" font-weight="700">개인 감소</text>
  <text x="372" y="298" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="18">법인 또는 가족으로</text>
  <text x="372" y="324" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="18">축이 옮겨갔는지 본다</text>
  <text x="372" y="362" fill="#bae6fd" font-family="Pretendard, Inter, sans-serif" font-size="18">핵심 질문: 왜 축을 옮겼는가</text>

  <rect x="620" y="176" width="250" height="214" rx="22" fill="#2a1d18" stroke="#f97316" stroke-width="2"/>
  <text x="646" y="220" fill="#fdba74" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">CHECK 3</text>
  <text x="646" y="262" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="26" font-weight="700">잦은 소폭 이동</text>
  <text x="646" y="298" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="18">수치보다 설명이 약하면</text>
  <text x="646" y="324" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="18">계속 질문이 남는다</text>
  <text x="646" y="362" fill="#fed7aa" font-family="Pretendard, Inter, sans-serif" font-size="18">핵심 질문: 공시 이유가 충분한가</text>

  <rect x="894" y="176" width="234" height="214" rx="22" fill="#271b29" stroke="#a78bfa" stroke-width="2"/>
  <text x="920" y="220" fill="#c4b5fd" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">CHECK 4</text>
  <text x="920" y="262" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="26" font-weight="700">합계 하락</text>
  <text x="920" y="298" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="18">우호지분이 약해졌다면</text>
  <text x="920" y="324" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="18">주총 영향도도 달라질 수 있다</text>
  <text x="920" y="362" fill="#ddd6fe" font-family="Pretendard, Inter, sans-serif" font-size="18">핵심 질문: 통제력이 흔들리나</text>

  <rect x="72" y="444" width="1056" height="206" rx="24" fill="#101926" stroke="#334155" stroke-width="2"/>
  <text x="104" y="488" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">빠르게 해석하는 기준</text>
  <text x="104" y="528" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="20">좋은 신호: 설명이 깔끔하고 구조가 단순해진다</text>
  <text x="104" y="560" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="20">경계 신호: 법인 고리가 늘고 변동 이유가 흐리다</text>
  <text x="104" y="592" fill="#cbd5e1" font-family="Pretendard, Inter, sans-serif" font-size="20">후속 확인: 이사 선임, 보수한도, 관련자 거래 공시까지 붙여서 본다</text>
  <rect x="104" y="608" width="318" height="22" rx="11" fill="#22c55e"/>
  <rect x="440" y="608" width="232" height="22" rx="11" fill="#f59e0b"/>
  <rect x="690" y="608" width="316" height="22" rx="11" fill="#ef4444"/>
  <text x="1040" y="624" text-anchor="end" fill="#94a3b8" font-family="Pretendard, Inter, sans-serif" font-size="16">좋은 신호 -> 중립 -> 경계 신호</text>
</svg>
