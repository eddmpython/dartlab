<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#94a3b8" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="800" height="420" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="419" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">감사 후 정정공시 — 읽는 순서</text>
  <line x1="300" y1="50" x2="500" y2="50" stroke="#a78bfa" stroke-width="1.2" opacity="0.3"/>

  <!-- Step 1 -->
  <rect x="40" y="72" width="200" height="58" rx="10" fill="rgba(167,139,250,0.10)" stroke="#a78bfa" stroke-width="1"/>
  <text x="140" y="96" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">1. 정정 대상 확인</text>
  <text x="140" y="114" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">사업보고서·감사보고서·정정신고서</text>

  <!-- Arrow 1->2 -->
  <path d="M240 101 L280 101" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="290" y="72" width="220" height="58" rx="10" fill="rgba(56,189,248,0.10)" stroke="#38bdf8" stroke-width="1"/>
  <text x="400" y="96" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">2. 기준선 차이 기록</text>
  <text x="400" y="114" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">확정본 대비 무엇이 바뀌었는지</text>

  <!-- Arrow 2->3 -->
  <path d="M510 101 L550 101" stroke="#38bdf8" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="560" y="72" width="200" height="58" rx="10" fill="rgba(52,211,153,0.10)" stroke="#34d399" stroke-width="1"/>
  <text x="660" y="96" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#34d399">3. 왜 지금 바뀌는지</text>
  <text x="660" y="114" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">후속 사실인지 누락 보완인지</text>

  <!-- Arrow 3->4 (down) -->
  <path d="M660 130 L660 166" stroke="#34d399" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="440" y="174" width="280" height="58" rx="10" fill="rgba(251,146,60,0.10)" stroke="#fb923c" stroke-width="1"/>
  <text x="580" y="198" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#fb923c">4. 감사·내부통제 반응</text>
  <text x="580" y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">재발행·KAM·문구 변화 확인</text>

  <!-- Arrow 4->5 -->
  <path d="M440 203 L320 203" stroke="#fb923c" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="60" y="174" width="260" height="58" rx="10" fill="rgba(248,113,113,0.10)" stroke="#f87171" stroke-width="1"/>
  <text x="190" y="198" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#f87171">5. 후속 정정 체인</text>
  <text x="190" y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">추가 정정·재감사로 이어지는지</text>

  <!-- Key insight box -->
  <rect x="80" y="268" width="640" height="72" rx="10" fill="rgba(167,139,250,0.06)" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="400" y="294" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">핵심: 감사 확정 기준선이 왜 다시 흔들리는가를 먼저 묻는다</text>
  <text x="400" y="316" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">대상 → 차이 → 시점 해석 → 감사 반응 → 후속 체인 순서로 읽는다</text>

  <!-- Branding -->
  <text x="400" y="390" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
</svg>