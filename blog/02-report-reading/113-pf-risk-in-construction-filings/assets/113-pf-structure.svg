<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">
  <rect width="800" height="520" fill="#0f1219"/>
  <rect x="0.5" y="0.5" width="799" height="519" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">PF(프로젝트파이낸싱) 구조도</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#6b7280">건설사 사업보고서에서 읽어야 할 관계 구조</text>

  <!-- 시행사 (center top) -->
  <rect x="310" y="80" width="180" height="60" rx="8" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">시행사 (SPC)</text>
  <text x="400" y="124" text-anchor="middle" font-size="11" fill="#6b7280">사업 기획 · 인허가 · 분양</text>

  <!-- 건설사 (center) -->
  <rect x="310" y="210" width="180" height="60" rx="8" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="236" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">건설사 (시공사)</text>
  <text x="400" y="254" text-anchor="middle" font-size="11" fill="#6b7280">시공 · 책임준공 · 연대보증</text>

  <!-- 금융기관 (left) -->
  <rect x="40" y="210" width="180" height="60" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="130" y="236" text-anchor="middle" font-size="15" font-weight="700" fill="#f59e0b">금융기관</text>
  <text x="130" y="254" text-anchor="middle" font-size="11" fill="#6b7280">PF 대출 · 브릿지론</text>

  <!-- 신탁사 (right) -->
  <rect x="580" y="210" width="180" height="60" rx="8" fill="#059669" opacity="0.1" stroke="#059669" stroke-width="2"/>
  <text x="670" y="236" text-anchor="middle" font-size="15" font-weight="700" fill="#059669">신탁사</text>
  <text x="670" y="254" text-anchor="middle" font-size="11" fill="#6b7280">토지신탁 · 자금관리</text>

  <!-- 수분양자 (bottom) -->
  <rect x="310" y="350" width="180" height="60" rx="8" fill="#059669" opacity="0.1" stroke="#059669" stroke-width="2"/>
  <text x="400" y="376" text-anchor="middle" font-size="15" font-weight="700" fill="#059669">수분양자</text>
  <text x="400" y="394" text-anchor="middle" font-size="11" fill="#6b7280">분양대금 납부</text>

  <!-- Arrows and labels -->
  <!-- 시행사 → 건설사 -->
  <line x1="400" y1="140" x2="400" y2="210" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="180" font-size="11" fill="#e2e8f0">도급계약</text>

  <!-- 금융기관 → 시행사 -->
  <line x1="175" y1="210" x2="310" y2="140" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="200" y="162" font-size="11" fill="#f59e0b">PF 대출</text>

  <!-- 건설사 → 금융기관 -->
  <line x1="310" y1="240" x2="220" y2="240" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="265" y="232" text-anchor="middle" font-size="11" fill="#dc2626">연대보증</text>
  <text x="265" y="262" text-anchor="middle" font-size="11" fill="#dc2626">자금보충약정</text>

  <!-- 신탁사 → 시행사 -->
  <line x1="625" y1="210" x2="490" y2="140" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="590" y="162" font-size="11" fill="#059669">토지 관리</text>

  <!-- 수분양자 → 시행사 (via trust) -->
  <line x1="400" y1="350" x2="400" y2="270" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="415" y="318" font-size="11" fill="#059669">분양대금</text>

  <!-- 건설사 ↔ 신탁사 -->
  <line x1="490" y1="240" x2="580" y2="240" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <text x="535" y="232" text-anchor="middle" font-size="11" fill="#6b7280">책임준공</text>

  <!-- Bottom note box -->
  <rect x="60" y="440" width="680" height="60" rx="6" fill="#dc2626" opacity="0.06" stroke="#dc2626" stroke-width="1"/>
  <text x="400" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">건설사의 PF 리스크 핵심</text>
  <text x="400" y="484" text-anchor="middle" font-size="12" fill="#e2e8f0">분양 실패 시 → 시행사 디폴트 → 연대보증·자금보충약정 현실화 → 건설사 유동성 위기</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e293b"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>
</svg>