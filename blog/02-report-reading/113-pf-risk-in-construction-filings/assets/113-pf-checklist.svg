<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">
  <rect width="800" height="620" fill="#0f1219"/>
  <rect x="0.5" y="0.5" width="799" height="619" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">PF 리스크 30분 점검 판단 트리</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#6b7280">사업보고서를 펼친 뒤 이 순서로 확인한다</text>

  <!-- Step 1 -->
  <rect x="250" y="75" width="300" height="50" rx="8" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">1단계: PF 보증 총액 확인 (5분)</text>
  <text x="400" y="115" text-anchor="middle" font-size="11" fill="#6b7280">주석 우발부채 + 지급보증 현황</text>

  <!-- Decision 1 -->
  <path d="M400 125 L400 145" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ad)"/>
  <polygon points="400,150 440,175 400,200 360,175" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="400" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">보증/자본</text>
  <text x="400" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">> 50%?</text>

  <!-- No branch (left) -->
  <line x1="360" y1="175" x2="200" y2="175" stroke="#059669" stroke-width="1.5" marker-end="url(#agr)"/>
  <text x="280" y="168" text-anchor="middle" font-size="10" fill="#059669">No</text>
  <rect x="80" y="155" width="120" height="40" rx="6" fill="#059669" opacity="0.1" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">낮은 노출</text>
  <text x="140" y="192" text-anchor="middle" font-size="9" fill="#059669">기본 모니터링</text>

  <!-- Yes branch (down) -->
  <path d="M400 200 L400 225" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ard)"/>
  <text x="412" y="216" font-size="10" fill="#dc2626">Yes</text>

  <!-- Step 2 -->
  <rect x="250" y="230" width="300" height="50" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">2단계: 분양률 · 미분양 확인 (5분)</text>
  <text x="400" y="270" text-anchor="middle" font-size="11" fill="#6b7280">사업의 내용 - PF 사업별 분양 현황</text>

  <!-- Decision 2 -->
  <path d="M400 280 L400 300" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ad)"/>
  <polygon points="400,305 440,330 400,355 360,330" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="400" y="333" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">분양률</text>
  <text x="400" y="347" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">&lt; 70%?</text>

  <!-- No branch (left) -->
  <line x1="360" y1="330" x2="200" y2="330" stroke="#059669" stroke-width="1.5" marker-end="url(#agr)"/>
  <text x="280" y="323" text-anchor="middle" font-size="10" fill="#059669">No</text>
  <rect x="80" y="310" width="120" height="40" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">보증은 크나</text>
  <text x="140" y="347" text-anchor="middle" font-size="9" fill="#f59e0b">분양 정상 → 주시</text>

  <!-- Yes branch (down) -->
  <path d="M400 355 L400 380" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ard)"/>
  <text x="412" y="371" font-size="10" fill="#dc2626">Yes</text>

  <!-- Step 3 -->
  <rect x="250" y="385" width="300" height="50" rx="8" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="407" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">3단계: 자금보충·KAM 확인 (10분)</text>
  <text x="400" y="425" text-anchor="middle" font-size="11" fill="#6b7280">주석 약정이행 + 감사보고서 KAM</text>

  <!-- Decision 3 -->
  <path d="M400 435 L400 455" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ad)"/>
  <polygon points="400,460 440,485 400,510 360,485" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="400" y="485" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">약정 이행</text>
  <text x="400" y="499" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">or KAM?</text>

  <!-- No branch (left) -->
  <line x1="360" y1="485" x2="200" y2="485" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#agr)"/>
  <text x="280" y="478" text-anchor="middle" font-size="10" fill="#f59e0b">No</text>
  <rect x="80" y="465" width="120" height="40" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="488" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">잠재 위험</text>
  <text x="140" y="502" text-anchor="middle" font-size="9" fill="#f59e0b">분기별 추적 필요</text>

  <!-- Yes branch (down) -->
  <path d="M400 510 L400 535" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ard)"/>
  <text x="412" y="526" font-size="10" fill="#dc2626">Yes</text>

  <!-- Final: 고위험 -->
  <rect x="300" y="540" width="200" height="55" rx="8" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="2.5"/>
  <text x="400" y="562" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">고위험 PF 노출</text>
  <text x="400" y="582" text-anchor="middle" font-size="11" fill="#dc2626">기한이익상실 · 계속기업 점검</text>

  <!-- Right side: time summary -->
  <rect x="610" y="470" width="160" height="100" rx="6" fill="white" stroke="#1e293b" stroke-width="1"/>
  <text x="690" y="492" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">총 소요 시간</text>
  <text x="690" y="514" text-anchor="middle" font-size="11" fill="#6b7280">1단계: 5분</text>
  <text x="690" y="530" text-anchor="middle" font-size="11" fill="#6b7280">2단계: 5분</text>
  <text x="690" y="546" text-anchor="middle" font-size="11" fill="#6b7280">3단계: 10분</text>
  <text x="690" y="564" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">합계: 20~30분</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="ad" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <polygon points="0 0, 8 0, 4 8" fill="#6b7280"/>
    </marker>
    <marker id="ard" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <polygon points="0 0, 8 0, 4 8" fill="#dc2626"/>
    </marker>
    <marker id="agr" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse">
      <polygon points="8 0, 0 3, 8 6" fill="#059669"/>
    </marker>
  </defs>
</svg>