<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">
  <rect width="800" height="500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">사업보고서에서 PF 정보를 찾는 5개 위치</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#6b7280">각 위치에서 확인할 핵심 항목</text>

  <!-- Center: 사업보고서 -->
  <circle cx="400" cy="260" r="60" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">사업보고서</text>
  <text x="400" y="273" text-anchor="middle" font-size="11" fill="#2563eb">PF 정보</text>

  <!-- 1. 주석 - 우발부채 (top left) -->
  <rect x="40" y="80" width="220" height="80" rx="8" fill="white" stroke="#dc2626" stroke-width="2"/>
  <rect x="40" y="80" width="220" height="26" rx="8" fill="#dc2626"/>
  <rect x="40" y="98" width="220" height="8" fill="#dc2626"/>
  <text x="150" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="white">1. 주석 - 우발부채</text>
  <text x="55" y="126" font-size="11" fill="#1e293b">PF 보증 잔액, 자금보충약정 금액</text>
  <text x="55" y="144" font-size="11" fill="#dc2626">가장 핵심적인 PF 노출 규모 확인처</text>
  <line x1="260" y1="130" x2="345" y2="230" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 2. 지급보증 현황 (top right) -->
  <rect x="540" y="80" width="220" height="80" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <rect x="540" y="80" width="220" height="26" rx="8" fill="#f59e0b"/>
  <rect x="540" y="98" width="220" height="8" fill="#f59e0b"/>
  <text x="650" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="white">2. 지급보증 현황</text>
  <text x="555" y="126" font-size="11" fill="#1e293b">보증 대상, 보증 금액, 보증 기간</text>
  <text x="555" y="144" font-size="11" fill="#f59e0b">프로젝트별 보증 내역 상세 확인</text>
  <line x1="540" y1="130" x2="455" y2="230" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 3. 특수관계자 거래 (left) -->
  <rect x="40" y="310" width="220" height="80" rx="8" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="40" y="310" width="220" height="26" rx="8" fill="#059669"/>
  <rect x="40" y="328" width="220" height="8" fill="#059669"/>
  <text x="150" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="white">3. 특수관계자 거래</text>
  <text x="55" y="356" font-size="11" fill="#1e293b">관계사 SPC 대여금, 미수금 잔액</text>
  <text x="55" y="374" font-size="11" fill="#059669">숨겨진 PF 노출 확인</text>
  <line x1="260" y1="340" x2="345" y2="280" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 4. 감사보고서 KAM (right) -->
  <rect x="540" y="310" width="220" height="80" rx="8" fill="white" stroke="#2563eb" stroke-width="2"/>
  <rect x="540" y="310" width="220" height="26" rx="8" fill="#2563eb"/>
  <rect x="540" y="328" width="220" height="8" fill="#2563eb"/>
  <text x="650" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="white">4. 감사보고서 KAM</text>
  <text x="555" y="356" font-size="11" fill="#1e293b">PF 보증 관련 핵심감사사항</text>
  <text x="555" y="374" font-size="11" fill="#2563eb">감사인의 리스크 판단 확인</text>
  <line x1="540" y1="340" x2="455" y2="280" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 5. 사업의 내용 (bottom center) -->
  <rect x="290" y="410" width="220" height="80" rx="8" fill="white" stroke="#6b7280" stroke-width="2"/>
  <rect x="290" y="410" width="220" height="26" rx="8" fill="#6b7280"/>
  <rect x="290" y="428" width="220" height="8" fill="#6b7280"/>
  <text x="400" y="427" text-anchor="middle" font-size="12" font-weight="700" fill="white">5. 사업의 내용</text>
  <text x="305" y="456" font-size="11" fill="#1e293b">PF 사업 목록, 분양률, 공정률</text>
  <text x="305" y="474" font-size="11" fill="#6b7280">전체 사업 포트폴리오 파악</text>
  <line x1="400" y1="410" x2="400" y2="320" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>