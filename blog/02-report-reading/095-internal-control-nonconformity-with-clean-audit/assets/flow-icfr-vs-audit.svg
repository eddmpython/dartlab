<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, sans-serif">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">내부회계관리제도 의견 vs 감사의견 — 평가 범위가 다르다</text>

  <!-- Company box -->
  <rect x="300" y="60" width="200" height="50" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">기업의 재무 보고</text>

  <!-- Split arrows -->
  <line x1="340" y1="110" x2="200" y2="160" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="460" y1="110" x2="600" y2="160" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- ICFR branch -->
  <rect x="60" y="160" width="280" height="60" rx="8" fill="#2563eb" fill-opacity="0.1" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">내부회계관리제도(ICFR)</text>
  <text x="200" y="205" text-anchor="middle" font-size="12" fill="#2563eb">통제 절차의 설계·운영 적정성</text>

  <!-- Audit branch -->
  <rect x="460" y="160" width="280" height="60" rx="8" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="2"/>
  <text x="600" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">외부감사</text>
  <text x="600" y="205" text-anchor="middle" font-size="12" fill="#059669">재무제표 숫자의 정확성·공정성</text>

  <!-- ICFR evaluation scope -->
  <rect x="60" y="245" width="280" height="80" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="200" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">평가 질문</text>
  <text x="200" y="288" text-anchor="middle" font-size="11" fill="#374151">"숫자를 만드는 과정이</text>
  <text x="200" y="305" text-anchor="middle" font-size="11" fill="#374151">제대로 설계·운영되고 있는가?"</text>

  <!-- Audit evaluation scope -->
  <rect x="460" y="245" width="280" height="80" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="600" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">평가 질문</text>
  <text x="600" y="288" text-anchor="middle" font-size="11" fill="#374151">"재무제표 숫자가</text>
  <text x="600" y="305" text-anchor="middle" font-size="11" fill="#374151">회계기준에 맞게 표시되었는가?"</text>

  <!-- Results -->
  <rect x="60" y="350" width="280" height="55" rx="6" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="2"/>
  <text x="200" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">비적정</text>
  <text x="200" y="395" text-anchor="middle" font-size="11" fill="#dc2626">통제 절차에 중요한 취약점 존재</text>

  <rect x="460" y="350" width="280" height="55" rx="6" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="2"/>
  <text x="600" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">적정</text>
  <text x="600" y="395" text-anchor="middle" font-size="11" fill="#059669">추가 실증 절차로 숫자 정확성 확인</text>

  <!-- Arrows from scope to result -->
  <line x1="200" y1="325" x2="200" y2="350" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <line x1="600" y1="325" x2="600" y2="350" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Bottom insight -->
  <rect x="150" y="435" width="500" height="45" rx="8" fill="#d97706" fill-opacity="0.1" stroke="#d97706" stroke-width="1.5"/>
  <text x="400" y="455" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97706">⚠ 공존 의미: 지금 숫자는 맞지만, 숫자를 만드는 과정에 구멍이 있다</text>
  <text x="400" y="472" text-anchor="middle" font-size="11" fill="#d97706">→ 다음 기간의 숫자 신뢰는 낮아질 수 있다</text>

  <!-- Connecting dashes -->
  <line x1="200" y1="405" x2="280" y2="435" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="405" x2="520" y2="435" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
