<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, sans-serif">
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#f1f5f9">경고 신호 강화 단계 — ICFR 비적정에서 감사의견 변경까지</text>

  <!-- Background gradient steps -->
  <rect x="40" y="60" width="720" height="75" rx="6" fill="#059669" fill-opacity="0.08"/>
  <rect x="40" y="145" width="720" height="75" rx="6" fill="#d97706" fill-opacity="0.06"/>
  <rect x="40" y="230" width="720" height="75" rx="6" fill="#d97706" fill-opacity="0.12"/>
  <rect x="40" y="315" width="720" height="75" rx="6" fill="#dc2626" fill-opacity="0.1"/>
  <rect x="40" y="400" width="720" height="75" rx="6" fill="#dc2626" fill-opacity="0.18"/>

  <!-- Step 1 -->
  <rect x="55" y="70" width="50" height="50" rx="25" fill="#059669"/>
  <text x="80" y="101" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f1219">1</text>
  <text x="130" y="88" font-size="14" font-weight="bold" fill="#059669">최초 ICFR 비적정 발생</text>
  <text x="130" y="108" font-size="11" fill="#f1f5f9">비적정 사유 확인 — 단일 영역 설계 미비인지, 복수 영역 운영 미비인지 분류</text>
  <text x="130" y="123" font-size="11" fill="#94a3b8">확인: 감사보고서 ICFR 의견란, 취약점 상세 기술</text>

  <!-- Arrow -->
  <line x1="80" y1="125" x2="80" y2="155" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="74,152 80,162 86,152" fill="#94a3b8"/>

  <!-- Step 2 -->
  <rect x="55" y="155" width="50" height="50" rx="25" fill="#d97706"/>
  <text x="80" y="186" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f1219">2</text>
  <text x="130" y="173" font-size="14" font-weight="bold" fill="#d97706">다음 분기 시정 진행 미흡</text>
  <text x="130" y="193" font-size="11" fill="#f1f5f9">경영진 시정 계획이 추상적이거나, 분기보고서에 진행 상황 언급 없음</text>
  <text x="130" y="208" font-size="11" fill="#94a3b8">확인: 반기/분기보고서 내부통제 항목, 감사위원회 활동내역</text>

  <line x1="80" y1="210" x2="80" y2="240" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="74,237 80,247 86,237" fill="#94a3b8"/>

  <!-- Step 3 -->
  <rect x="55" y="240" width="50" height="50" rx="25" fill="#d97706"/>
  <text x="80" y="271" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f1219">3</text>
  <text x="130" y="258" font-size="14" font-weight="bold" fill="#d97706">2년 연속 같은 사유 ICFR 비적정</text>
  <text x="130" y="278" font-size="11" fill="#f1f5f9">같은 취약점이 시정되지 않고 반복 — 경영진 의지 또는 능력 부재 시사</text>
  <text x="130" y="293" font-size="11" fill="#94a3b8">확인: 전기 ICFR 사유와 비교, 감사위원회 반복 안건 여부</text>

  <line x1="80" y1="295" x2="80" y2="325" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="74,322 80,332 86,322" fill="#94a3b8"/>

  <!-- Step 4 -->
  <rect x="55" y="325" width="50" height="50" rx="25" fill="#dc2626"/>
  <text x="80" y="356" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f1219">4</text>
  <text x="130" y="343" font-size="14" font-weight="bold" fill="#dc2626">ICFR 비적정 + 재무 수치 변동 확대</text>
  <text x="130" y="363" font-size="11" fill="#f1f5f9">통제 취약 영역의 계정 수치가 비정상 변동, 정정공시 발생</text>
  <text x="130" y="378" font-size="11" fill="#94a3b8">확인: 관련 계정 전기 대비 변동률, 정정공시 검색</text>

  <line x1="80" y1="380" x2="80" y2="410" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="74,407 80,417 86,407" fill="#94a3b8"/>

  <!-- Step 5 -->
  <rect x="55" y="410" width="50" height="50" rx="25" fill="#dc2626"/>
  <text x="80" y="441" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f1219">5</text>
  <text x="130" y="428" font-size="14" font-weight="bold" fill="#dc2626">ICFR 비적정 → 감사의견 변경</text>
  <text x="130" y="448" font-size="11" fill="#f1f5f9">통제 부재가 재무제표 왜곡으로 이어져 감사의견 한정/부적정으로 변경</text>
  <text x="130" y="463" font-size="11" fill="#94a3b8">확인: 감사의견 변경 사유, 상장적격성 심사 대상 여부</text>

  <!-- Right side severity bar -->
  <rect x="720" y="70" width="30" height="395" rx="4" fill="url(#severityGrad)"/>
  <text x="735" y="60" text-anchor="middle" font-size="10" fill="#94a3b8">위험도</text>

  <defs>
    <linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient>
    <linearGradient id="severityGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#d97706" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgDark)" rx="12"/>
  <rect x="0.5" y="0.5" width="799" height="499" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>
</svg>
