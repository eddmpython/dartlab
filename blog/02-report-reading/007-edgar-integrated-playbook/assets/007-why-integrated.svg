<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs><linearGradient id="bg7b" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient></defs>
  <rect width="800" height="420" rx="12" fill="url(#bg7b)"/><rect x="0.5" y="0.5" width="799" height="419" rx="12" stroke="#1e2433"/>
  <text x="400" y="34" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Why Integrated Reading</text>
  <rect x="40" y="80" width="340" height="260" rx="8" fill="rgba(234,70,71,0.05)" stroke="rgba(234,70,71,0.2)"/>
  <text x="56" y="104" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#f87171">Separated reading</text>
  <text x="56" y="126" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">- Event and numbers disconnected</text>
  <text x="56" y="144" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">- FPI flow not mapped</text>
  <text x="56" y="162" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">- 13F timing misuse</text>
  <rect x="420" y="80" width="340" height="260" rx="8" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.2)"/>
  <text x="436" y="104" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#86efac">Integrated reading</text>
  <text x="436" y="126" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">- Baseline -> Update -> Event -> Context</text>
  <text x="436" y="144" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">- Same framework for domestic/FPI</text>
  <text x="436" y="162" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">- Causal interpretation quality improves</text>
</svg>
