<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" fill="none">
  <rect width="800" height="430" rx="28" fill="#050811"/><rect x="24" y="24" width="752" height="382" rx="24" fill="#0f1219" stroke="#1e2433"/>
  <text x="48" y="62" fill="#f8fafc" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700">KAM Anatomy</text>
  <text x="48" y="86" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12">Every KAM answers three questions: what, why, and how sensitive.</text>
  <rect x="70" y="150" width="180" height="120" rx="18" fill="#111827" stroke="#334155"/>
  <text x="94" y="188" fill="#fda4a4" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">What was critical?</text>
  <text x="94" y="214" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">account or transaction</text>
  <rect x="310" y="150" width="180" height="120" rx="18" fill="#111827" stroke="#334155"/>
  <text x="334" y="188" fill="#fdba74" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">Why was it hard?</text>
  <text x="334" y="214" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">judgment and uncertainty</text>
  <rect x="550" y="150" width="180" height="120" rx="18" fill="#111827" stroke="#334155"/>
  <text x="572" y="188" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">How sensitive?</text>
  <text x="572" y="214" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">earnings and asset impact</text>
  <path d="M250 210H310" stroke="#ea4647" stroke-width="3"/>
  <path d="M490 210H550" stroke="#ea4647" stroke-width="3"/>
</svg>
