<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">오너 행동 매트릭스</title>
  <desc id="desc">오너의 힘이 주주와 같은 방향으로 쓰이는지, 자기편 중심으로 쓰이는지 비교하는 매트릭스</desc>
  <defs>
    <linearGradient id="bg027a" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="100%" stop-color="#101826"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg027a)"/>
  <rect x="20" y="20" width="1160" height="720" rx="24" stroke="#1e293b" stroke-width="2"/>

  <text x="72" y="82" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="34" font-weight="700">오너십은 힘의 크기보다 힘의 방향으로 읽는다</text>
  <text x="72" y="120" fill="#94a3b8" font-family="Pretendard, Inter, sans-serif" font-size="18">같은 강한 지배력도 환원, 보수, 내부거래, 주총 행동에서 누구를 향하는지가 더 중요하다.</text>

  <text x="238" y="206" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">소수주주 정렬 약함</text>
  <text x="896" y="206" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">소수주주 정렬 있음</text>
  <text x="60" y="374" transform="rotate(-90 60 374)" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">설명 약함</text>
  <text x="60" y="638" transform="rotate(-90 60 638)" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">설명 충분</text>

  <rect x="104" y="228" width="438" height="214" rx="24" fill="#2a1b1b" stroke="#ef4444" stroke-width="2"/>
  <text x="138" y="272" fill="#fca5a5" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">위험한 오너십</text>
  <text x="138" y="310" fill="#fecaca" font-family="Pretendard, Inter, sans-serif" font-size="18">내부거래는 크고 보수는 공격적인데</text>
  <text x="138" y="336" fill="#fecaca" font-family="Pretendard, Inter, sans-serif" font-size="18">환원과 견제 장치는 약하다</text>
  <text x="138" y="372" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="18">주총과 이사회가 같은 방향으로만 기울면 위험 신호가 커진다</text>

  <rect x="590" y="228" width="506" height="214" rx="24" fill="#241b2a" stroke="#a78bfa" stroke-width="2"/>
  <text x="624" y="272" fill="#c4b5fd" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">환원은 있지만 설명 부족</text>
  <text x="624" y="310" fill="#ddd6fe" font-family="Pretendard, Inter, sans-serif" font-size="18">배당이나 매입은 보이지만</text>
  <text x="624" y="336" fill="#ddd6fe" font-family="Pretendard, Inter, sans-serif" font-size="18">왜 그런 자본정책을 택하는지 설명이 약하면 신뢰가 덜 쌓인다</text>
  <text x="624" y="372" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="18">숫자와 서술을 같이 봐야 하는 구간</text>

  <rect x="104" y="486" width="438" height="214" rx="24" fill="#2b1d1b" stroke="#f97316" stroke-width="2"/>
  <text x="138" y="530" fill="#fdba74" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">설명은 좋은데 정렬 약함</text>
  <text x="138" y="568" fill="#fed7aa" font-family="Pretendard, Inter, sans-serif" font-size="18">오너의 장기 비전을 말하지만</text>
  <text x="138" y="594" fill="#fed7aa" font-family="Pretendard, Inter, sans-serif" font-size="18">보수와 자본정책이 자기편 중심이면 불편함이 남는다</text>
  <text x="138" y="630" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="18">말보다 결과를 더 무겁게 봐야 하는 구간</text>

  <rect x="590" y="486" width="506" height="214" rx="24" fill="#16231f" stroke="#22c55e" stroke-width="2"/>
  <text x="624" y="530" fill="#86efac" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">좋은 오너십</text>
  <text x="624" y="568" fill="#bbf7d0" font-family="Pretendard, Inter, sans-serif" font-size="18">지배력은 강해도 구조가 단순하고 설명 가능하며</text>
  <text x="624" y="594" fill="#bbf7d0" font-family="Pretendard, Inter, sans-serif" font-size="18">환원, 보수, 이사회 행동이 대체로 같은 방향을 가리킨다</text>
  <text x="624" y="630" fill="#f8fafc" font-family="Pretendard, Inter, sans-serif" font-size="18">강한 힘이 장기 경쟁력으로 읽히기 쉬운 구간</text>
</svg>
