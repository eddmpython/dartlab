<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="800" height="540" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="539" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="400" y="42" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">지주사 30분 읽기 루프</text>
  <line x1="280" y1="56" x2="520" y2="56" stroke="#a78bfa" stroke-width="1.2" opacity="0.3"/>

  <line x1="100" y1="86" x2="100" y2="480" stroke="#1e2433" stroke-width="2"/>

  <!-- Step 1 -->
  <circle cx="100" cy="100" r="16" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="100" y="105" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa">1</text>
  <text x="130" y="96" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">연결 vs 별도 간극 (5분)</text>
  <text x="130" y="114" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">연결·별도 매출/이익 나란히 비교 → 순수 vs 사업지주 파악 → 비지배지분 비중</text>
  <rect x="620" y="86" width="120" height="28" rx="6" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="680" y="104" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a78bfa">IS + BS</text>

  <!-- Step 2 -->
  <circle cx="100" cy="164" r="16" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="100" y="169" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#38bdf8">2</text>
  <text x="130" y="160" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">자회사 포트폴리오 (5분)</text>
  <text x="130" y="178" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">계열회사 현황 → 핵심 자회사 목록·지분율 → 연결이익 기여도 분포</text>
  <rect x="620" y="150" width="120" height="28" rx="6" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="0.5"/>
  <text x="680" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#38bdf8">계열회사 현황</text>

  <!-- Step 3 -->
  <circle cx="100" cy="228" r="16" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="100" y="233" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#34d399">3</text>
  <text x="130" y="224" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#34d399">지분법손익 vs 배당 (5분)</text>
  <text x="130" y="242" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">별도 IS에서 지분법이익 → 배당금수익과 대조 → 현금화율 계산</text>
  <rect x="620" y="214" width="120" height="28" rx="6" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="0.5"/>
  <text x="680" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#34d399">별도 IS + 주석</text>

  <!-- Step 4 -->
  <circle cx="100" cy="292" r="16" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="100" y="297" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fb923c">4</text>
  <text x="130" y="288" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#fb923c">별도 수익 구조 분해 (5분)</text>
  <text x="130" y="306" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">배당·로열티·임대·자문 분리 → 판관비+이자 커버 여부 → 내부거래 비중</text>
  <rect x="620" y="278" width="120" height="28" rx="6" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="0.5"/>
  <text x="680" y="296" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fb923c">별도 IS</text>

  <!-- Step 5 -->
  <circle cx="100" cy="356" r="16" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="100" y="361" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#f87171">5</text>
  <text x="130" y="352" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#f87171">내부거래 적정성 (5분)</text>
  <text x="130" y="370" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">특수관계자 거래 주석 → 로열티율·임대 조건 → 공정거래 제재 이력</text>
  <rect x="620" y="342" width="120" height="28" rx="6" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="0.5"/>
  <text x="680" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f87171">주석</text>

  <!-- Step 6 -->
  <circle cx="100" cy="420" r="16" fill="rgba(129,140,248,0.15)" stroke="#818cf8" stroke-width="1.5"/>
  <text x="100" y="425" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#818cf8">6</text>
  <text x="130" y="416" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#818cf8">배당 파이프라인·CF (5분)</text>
  <text x="130" y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">별도 CF → 배당수입 vs 배당지급 → 차입금·이자 → 지분 변동</text>
  <rect x="620" y="406" width="120" height="28" rx="6" fill="rgba(129,140,248,0.08)" stroke="#818cf8" stroke-width="0.5"/>
  <text x="680" y="424" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#818cf8">별도 CF</text>

  <rect x="100" y="466" width="600" height="40" rx="8" fill="rgba(167,139,250,0.06)" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="400" y="490" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">간극 → 포트폴리오 → 지분법 → 수익구조 → 내부거래 → 배당 CF — 한 루프로 연결</text>

  <text x="400" y="530" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
</svg>
