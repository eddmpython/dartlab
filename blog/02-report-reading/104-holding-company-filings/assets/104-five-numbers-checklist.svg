<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="800" height="540" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="539" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="400" y="42" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">지주사 5가지 핵심 숫자 — 위험 체크보드</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#a78bfa" stroke-width="1.2" opacity="0.3"/>

  <!-- Item 1 -->
  <rect x="60" y="76" width="680" height="72" rx="10" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="0.8"/>
  <circle cx="92" cy="100" r="14" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="92" y="105" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">1</text>
  <text x="120" y="100" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">연결 vs 별도 간극</text>
  <text x="120" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">매출 배율 10x+ = 순수지주 | 간극으로 지주사 성격 파악</text>
  <text x="120" y="136" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 비지배지분 과다, 단일 자회사에 연결이익 80%+ 의존</text>

  <!-- Item 2 -->
  <rect x="60" y="160" width="680" height="72" rx="10" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="0.8"/>
  <circle cx="92" cy="184" r="14" fill="rgba(56,189,248,0.2)" stroke="#38bdf8" stroke-width="1"/>
  <text x="92" y="189" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">2</text>
  <text x="120" y="184" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">지분법손익 실체</text>
  <text x="120" y="202" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">지분법이익 vs 수취배당 — 배당/지분법 > 30% = 현금 건전</text>
  <text x="120" y="220" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 지분법만 크고 배당 미미, 지분법손실 발생</text>

  <!-- Item 3 -->
  <rect x="60" y="244" width="680" height="72" rx="10" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="0.8"/>
  <circle cx="92" cy="268" r="14" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="92" y="273" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#34d399">3</text>
  <text x="120" y="268" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#34d399">별도 수익 구조</text>
  <text x="120" y="286" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">배당+로열티+임대가 판관비+이자를 커버 = 자체 운영 가능</text>
  <text x="120" y="304" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 별도 영업적자, 배당 없으면 존속 곤란</text>

  <!-- Item 4 -->
  <rect x="60" y="328" width="680" height="72" rx="10" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="0.8"/>
  <circle cx="92" cy="352" r="14" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1"/>
  <text x="92" y="357" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fb923c">4</text>
  <text x="120" y="352" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#fb923c">자회사 포트폴리오</text>
  <text x="120" y="370" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">지분율·기여도 분산 + 성장 자회사 보유 = 건강</text>
  <text x="120" y="388" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 편중, 핵심 자회사 부진, 순환출자 규제 리스크</text>

  <!-- Item 5 -->
  <rect x="60" y="412" width="680" height="72" rx="10" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="0.8"/>
  <circle cx="92" cy="436" r="14" fill="rgba(248,113,113,0.2)" stroke="#f87171" stroke-width="1"/>
  <text x="92" y="441" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f87171">5</text>
  <text x="120" y="436" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#f87171">배당 파이프라인·CF</text>
  <text x="120" y="454" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">자회사→지주→주주 경로 원활, 이자 < 배당수입</text>
  <text x="120" y="472" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 이자 ≥ 배당수입, 차입으로 지분매입, 배당 불규칙</text>

  <text x="400" y="528" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
</svg>
