<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <defs><linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient></defs>
  <title id="title">우발부채와 소송 후속 추적 워치보드</title>
  <desc id="desc">다음 분기와 다음 사업보고서에서 충당부채, 소송 단계, 현금 유출을 어떻게 추적할지 정리한 체크보드다.</desc>
  <rect width="1080" height="720" fill="#050811"/>
  <rect x="0.5" y="0.5" width="1079" height="719" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>
  <text x="60" y="76" font-size="32" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#f1f5f9">다음 보고서에서 바로 다시 볼 항목</text>
  <text x="60" y="110" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#94a3b8">우발부채와 소송은 지금보다 다음 기수에서 실제 비용으로 움직일 때 의미가 더 커진다</text>

  <rect x="60" y="160" width="290" height="220" rx="24" fill="#0f1219" stroke="#1e2433" stroke-width="2"/>
  <text x="92" y="205" font-size="22" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#f1f5f9">주석 재확인</text>
  <text x="92" y="247" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">충당부채가 늘었는가</text>
  <text x="92" y="277" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">사용 또는 환입이 있었는가</text>
  <text x="92" y="307" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">우발부채가 인식으로 이동했는가</text>
  <text x="92" y="337" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">금액 범위가 더 구체해졌는가</text>

  <rect x="395" y="160" width="290" height="220" rx="24" fill="#0f1219" stroke="#1e2433" stroke-width="2"/>
  <text x="427" y="205" font-size="22" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#f1f5f9">사건 진행</text>
  <text x="427" y="247" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">1심, 항소, 조정, 합의 여부</text>
  <text x="427" y="277" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">새 소송이 추가됐는가</text>
  <text x="427" y="307" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">작년보다 설명이 길어졌는가</text>
  <text x="427" y="337" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">갑자기 짧아졌다면 이유가 있는가</text>

  <rect x="730" y="160" width="290" height="220" rx="24" fill="#0f1219" stroke="#1e2433" stroke-width="2"/>
  <text x="762" y="205" font-size="22" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#f1f5f9">현금과 자금 부담</text>
  <text x="762" y="247" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">실제 지급 흔적이 있는가</text>
  <text x="762" y="277" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">영업현금흐름이 더 약해졌는가</text>
  <text x="762" y="307" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">보증 이행 가능성이 커졌는가</text>
  <text x="762" y="337" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">차입과 약정 부담이 붙었는가</text>

  <rect x="60" y="430" width="960" height="220" rx="28" fill="#16355f"/>
  <text x="98" y="482" font-size="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#ffffff">빠른 결론 규칙</text>
  <text x="98" y="524" font-size="20" font-family="'Segoe UI', Arial, sans-serif" fill="#d6e6ff">문구는 그대로인데 금액과 현금 유출이 커지면 위험 강도가 올라간다</text>
  <text x="98" y="558" font-size="20" font-family="'Segoe UI', Arial, sans-serif" fill="#d6e6ff">문구가 짧아졌다면 안심하지 말고 종결, 합의, 단순 축약 중 무엇인지 확인한다</text>
  <text x="98" y="592" font-size="20" font-family="'Segoe UI', Arial, sans-serif" fill="#d6e6ff">감사보고서와 주석이 같은 방향을 가리키는데 경영진 설명만 낙관적이면 보수적으로 읽는다</text>
</svg>
