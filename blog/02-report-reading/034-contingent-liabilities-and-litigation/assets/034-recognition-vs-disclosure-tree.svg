<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">충당부채 인식과 우발부채 공시 결정 트리</title>
  <desc id="desc">현재 의무, 자원 유출 가능성, 금액 추정 가능성에 따라 충당부채 인식과 우발부채 공시를 나누는 구조다.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#93c5fd"/>
    </marker>
    <linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient>
  </defs>
  <rect width="1200" height="760" fill="#050811"/>
  <rect x="0.5" y="0.5" width="1199" height="759" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>
  <text x="70" y="82" font-size="34" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#f1f5f9">회계 처리의 실전 분기</text>
  <text x="70" y="118" font-size="19" font-family="'Segoe UI', Arial, sans-serif" fill="#94a3b8">인식 여부가 끝이 아니라, 왜 그 분기점에 놓였는지를 읽어야 한다</text>

  <rect x="430" y="150" width="340" height="92" rx="24" fill="#16355f"/>
  <text x="472" y="204" font-size="28" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#ffffff">현재 의무가 있는가</text>

  <rect x="130" y="330" width="300" height="120" rx="26" fill="#0f1219" stroke="#1e2433" stroke-width="2"/>
  <text x="165" y="375" font-size="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#f1f5f9">아직 불명확</text>
  <text x="165" y="409" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">분쟁은 있지만 회사 의무가</text>
  <text x="165" y="436" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">확정되지 않은 단계</text>

  <rect x="450" y="330" width="300" height="120" rx="26" fill="#0f1219" stroke="#1e2433" stroke-width="2"/>
  <text x="486" y="375" font-size="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#f1f5f9">유출 가능성 높음</text>
  <text x="486" y="409" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">부담이 현실화될 가능성이</text>
  <text x="486" y="436" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">상당히 높다고 본다</text>

  <rect x="770" y="330" width="300" height="120" rx="26" fill="#0f1219" stroke="#1e2433" stroke-width="2"/>
  <text x="810" y="375" font-size="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#f1f5f9">유출 가능성 낮음</text>
  <text x="810" y="409" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">가능성이 낮거나</text>
  <text x="810" y="436" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#cbd5e1">원격이라고 본다</text>

  <rect x="130" y="560" width="300" height="116" rx="26" fill="rgba(217,119,6,0.15)" stroke="#92400e" stroke-width="2"/>
  <text x="166" y="604" font-size="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#fbbf24">우발부채 공시</text>
  <text x="166" y="638" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#fcd34d">소송 배경, 금액 범위,</text>
  <text x="166" y="664" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#fcd34d">추정 곤란 사유를 본다</text>

  <rect x="450" y="560" width="300" height="116" rx="26" fill="rgba(22,163,74,0.12)" stroke="#166534" stroke-width="2"/>
  <text x="486" y="604" font-size="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#86efac">충당부채 인식</text>
  <text x="486" y="638" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#86efac">금액, 사용, 환입,</text>
  <text x="486" y="664" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#86efac">전기 대비 변화를 본다</text>

  <rect x="770" y="560" width="300" height="116" rx="26" fill="rgba(30,36,51,0.5)" stroke="#1e2433" stroke-width="2"/>
  <text x="804" y="604" font-size="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" fill="#cbd5e1">축약 또는 원격</text>
  <text x="804" y="638" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#94a3b8">정말 작은 이슈인지,</text>
  <text x="804" y="664" font-size="18" font-family="'Segoe UI', Arial, sans-serif" fill="#94a3b8">설명이 부족한지 구분</text>

  <line x1="600" y1="242" x2="280" y2="330" stroke="#3f628f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="242" x2="600" y2="330" stroke="#3f628f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="242" x2="920" y2="330" stroke="#3f628f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="280" y1="450" x2="280" y2="560" stroke="#3f628f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="450" x2="600" y2="560" stroke="#3f628f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="920" y1="450" x2="920" y2="560" stroke="#3f628f" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
