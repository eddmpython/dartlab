<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">075 Evidence Layer</title>
  <desc id="desc">Read the delta in five stacked layers</desc>
  <rect width="1280" height="720" fill="#10213a"/>
  <text x="84" y="82" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">075 Evidence Layer</text>
  <text x="84" y="120" font-size="20" font-family="Arial, sans-serif" fill="#cdd9e7">Read the delta in five stacked layers</text>
  <rect x="88" y="152" width="1104" height="520" rx="28" fill="#0d1c30" opacity="0.7" stroke="#5dade2" stroke-width="2"/>
  <rect x="112" y="176" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="190" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="221" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Base</text><text x="318" y="221" font-size="24" font-family="Arial, sans-serif" fill="#19324d">Audited report and audit report first</text>
  <rect x="112" y="278" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="292" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="323" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Scope</text><text x="318" y="323" font-size="24" font-family="Arial, sans-serif" fill="#19324d">Match company scope and period before reading</text>
  <rect x="112" y="380" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="394" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="425" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Delta</text><text x="318" y="425" font-size="24" font-family="Arial, sans-serif" fill="#19324d">Tax, impairment, provision, or timing change</text>
  <rect x="112" y="482" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="496" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="527" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Notes</text><text x="318" y="527" font-size="24" font-family="Arial, sans-serif" fill="#19324d">Write first and final explanation side by side</text>
  <rect x="112" y="584" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="598" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="629" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Audit</text><text x="318" y="629" font-size="24" font-family="Arial, sans-serif" fill="#19324d">Heavier tone means lower future trust</text>
</svg>
