<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">075 Watchboard</title>
  <desc id="desc">Five follow-up questions for the next report</desc>
  <rect width="1280" height="720" fill="#0f1c31"/>
  <text x="84" y="82" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">075 Watchboard</text>
  <text x="84" y="118" font-size="20" font-family="Arial, sans-serif" fill="#ced8e5">Five follow-up questions for the next report</text>
  <rect x="90" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="118" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">1. Same line again?</text><text x="118" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">One repeated gap often</text><text x="118" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">means a weak close.</text>
  <rect x="470" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="498" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">2. Audit tone up?</text><text x="498" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">KAM and emphasis tell</text><text x="498" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">you what changed weight.</text>
  <rect x="850" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="878" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">3. Story stable?</text><text x="878" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Write first and final</text><text x="878" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">explanations together.</text>
  <rect x="280" y="386" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="308" y="434" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">4. Delta type?</text><text x="308" y="468" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Tax differs from core</text><text x="308" y="496" font-size="20" font-family="Arial, sans-serif" fill="#36506b">revenue and provision.</text>
  <rect x="660" y="386" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="688" y="434" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">5. Future discount?</text><text x="688" y="468" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Patch the model and</text><text x="688" y="496" font-size="20" font-family="Arial, sans-serif" fill="#36506b">patch trust together.</text>
</svg>
