<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">075 Decision Tree</title>
  <desc id="desc">Is this a closing gap, a judgment shift, or a trust issue?</desc>
  <rect width="1280" height="720" fill="#0f1c30"/>
  <text x="84" y="82" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">075 Decision Tree</text>
  <text x="84" y="118" font-size="20" font-family="Arial, sans-serif" fill="#ced8e5">Is this a closing gap, a judgment shift, or a trust issue?</text>
  <rect x="470" y="150" width="340" height="88" rx="24" fill="#ffffff" opacity="0.96"/><text x="640" y="200" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">Why did the number move?</text>
  <path d="M 640 238 L 640 310" stroke="#8cc6ff" stroke-width="8" stroke-linecap="round"/>
  <path d="M 640 310 L 250 310" stroke="#8cc6ff" stroke-width="8" stroke-linecap="round"/>
  <path d="M 640 310 L 1030 310" stroke="#8cc6ff" stroke-width="8" stroke-linecap="round"/>
  <rect x="110" y="330" width="280" height="176" rx="24" fill="#ffffff" opacity="0.96"/><text x="250" y="382" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">Closing Gap</text><text x="250" y="420" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Minor tax move</text><text x="250" y="448" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Scope already matched</text><text x="250" y="476" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Story stays stable</text>
  <rect x="500" y="330" width="280" height="176" rx="24" fill="#ffffff" opacity="0.96"/><text x="640" y="382" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">Judgment Shift</text><text x="640" y="420" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Provision or loss changed</text><text x="640" y="448" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Need note support</text><text x="640" y="476" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Read the audit line</text>
  <rect x="890" y="330" width="280" height="176" rx="24" fill="#ffffff" opacity="0.96"/><text x="1030" y="382" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">Trust Issue</text><text x="1030" y="420" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Story keeps changing</text><text x="1030" y="448" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Restatement repeated</text><text x="1030" y="476" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Future discount rises</text>
</svg>
