<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 11px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .code { font-size: 9px; fill: #a5b4fc; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .header { font-size: 10px; font-weight: 700; fill: #64748b; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
  </style>

  <rect width="750" height="320" rx="12" fill="#0f172a"/>

  <!-- Claude Desktop -->
  <rect x="20" y="20" width="230" height="280" class="box" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="135" y="48" text-anchor="middle" class="title" fill="#8b5cf6">Claude Desktop</text>
  <line x1="40" y1="58" x2="230" y2="58" stroke="#334155" stroke-width="1"/>

  <text x="40" y="80" class="header">설정 생성</text>
  <text x="40" y="98" class="code">dartlab mcp --config claude-desktop</text>

  <text x="40" y="125" class="header">설정 파일</text>
  <text x="40" y="143" class="code">~/AppData/Roaming/Claude/</text>
  <text x="40" y="158" class="code">claude_desktop_config.json</text>

  <text x="40" y="185" class="header">플랫폼</text>
  <text x="40" y="203" class="desc">Windows, macOS</text>

  <text x="40" y="230" class="header">특징</text>
  <text x="40" y="248" class="desc">대화형 UI, 일반 사용자 친화적</text>
  <text x="40" y="263" class="desc">가장 쉬운 시작점</text>

  <!-- Claude Code -->
  <rect x="260" y="20" width="230" height="280" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="375" y="48" text-anchor="middle" class="title" fill="#3b82f6">Claude Code</text>
  <line x1="280" y1="58" x2="470" y2="58" stroke="#334155" stroke-width="1"/>

  <text x="280" y="80" class="header">설정 생성</text>
  <text x="280" y="98" class="code">dartlab mcp --config claude-code</text>

  <text x="280" y="125" class="header">설정 파일</text>
  <text x="280" y="143" class="code">~/.claude/settings.json</text>
  <text x="280" y="158" class="code">.claude/settings.json</text>

  <text x="280" y="185" class="header">플랫폼</text>
  <text x="280" y="203" class="desc">터미널 (모든 OS)</text>

  <text x="280" y="230" class="header">특징</text>
  <text x="280" y="248" class="desc">CLI 기반, 개발자 워크플로우</text>
  <text x="280" y="263" class="desc">에이전트 코딩 통합</text>

  <!-- Cursor -->
  <rect x="500" y="20" width="230" height="280" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="615" y="48" text-anchor="middle" class="title" fill="#10b981">Cursor</text>
  <line x1="520" y1="58" x2="710" y2="58" stroke="#334155" stroke-width="1"/>

  <text x="520" y="80" class="header">설정 생성</text>
  <text x="520" y="98" class="code">dartlab mcp --config cursor</text>

  <text x="520" y="125" class="header">설정 파일</text>
  <text x="520" y="143" class="code">.cursor/mcp.json</text>

  <text x="520" y="185" class="header">플랫폼</text>
  <text x="520" y="203" class="desc">VS Code 기반 IDE</text>

  <text x="520" y="230" class="header">특징</text>
  <text x="520" y="248" class="desc">코드 편집 중 공시 데이터 조회</text>
  <text x="520" y="263" class="desc">프로젝트별 설정</text>
</svg>