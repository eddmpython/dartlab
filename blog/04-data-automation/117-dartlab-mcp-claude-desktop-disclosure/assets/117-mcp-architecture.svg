<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 14px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 12px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="800" height="320" rx="12" fill="#0f172a"/>

  <!-- 클라이언트 3개 -->
  <rect x="30" y="40" width="150" height="50" class="box" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="105" y="70" text-anchor="middle" class="label">Claude Desktop</text>

  <rect x="30" y="110" width="150" height="50" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="105" y="140" text-anchor="middle" class="label">Claude Code</text>

  <rect x="30" y="180" width="150" height="50" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="105" y="210" text-anchor="middle" class="label">Cursor</text>

  <!-- stdio -->
  <rect x="240" y="100" width="100" height="60" class="box" fill="#1e293b" stroke="#475569"/>
  <text x="290" y="128" text-anchor="middle" class="label">stdio</text>
  <text x="290" y="145" text-anchor="middle" class="desc">JSON-RPC</text>

  <!-- MCP Server -->
  <rect x="400" y="70" width="170" height="120" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="485" y="100" text-anchor="middle" class="title" fill="#f59e0b">dartlab MCP</text>
  <line x1="420" y1="110" x2="550" y2="110" stroke="#334155" stroke-width="1"/>
  <text x="485" y="130" text-anchor="middle" class="desc">60개 도구</text>
  <text x="485" y="147" text-anchor="middle" class="desc">16 글로벌 + 44 기업별</text>
  <text x="485" y="164" text-anchor="middle" class="desc">LRU 5개 캐시</text>
  <text x="485" y="181" text-anchor="middle" class="desc">TTL 600초</text>

  <!-- Company -->
  <rect x="630" y="70" width="140" height="120" class="box" fill="#1e293b" stroke="#ec4899"/>
  <text x="700" y="100" text-anchor="middle" class="label">Company</text>
  <line x1="650" y1="110" x2="750" y2="110" stroke="#334155" stroke-width="1"/>
  <text x="700" y="130" text-anchor="middle" class="desc">sections 44개</text>
  <text x="700" y="147" text-anchor="middle" class="desc">finance BS/IS/CF</text>
  <text x="700" y="164" text-anchor="middle" class="desc">insight 7영역</text>
  <text x="700" y="181" text-anchor="middle" class="desc">report 28종</text>

  <!-- 화살표 -->
  <line x1="180" y1="65" x2="238" y2="118" class="arrow"/>
  <line x1="180" y1="135" x2="238" y2="130" class="arrow"/>
  <line x1="180" y1="205" x2="238" y2="145" class="arrow"/>
  <line x1="340" y1="130" x2="398" y2="130" class="arrow"/>
  <line x1="570" y1="130" x2="628" y2="130" class="arrow"/>

  <!-- 하단 설명 -->
  <text x="105" y="270" text-anchor="middle" class="desc">AI 클라이언트</text>
  <text x="290" y="270" text-anchor="middle" class="desc">전송 계층</text>
  <text x="485" y="270" text-anchor="middle" class="desc">MCP 서버</text>
  <text x="700" y="270" text-anchor="middle" class="desc">데이터 엔진</text>
</svg>