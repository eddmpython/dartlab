<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 11px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .header { font-size: 10px; font-weight: 700; fill: #64748b; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
  </style>

  <rect width="700" height="220" rx="12" fill="#0f172a"/>

  <!-- signal -->
  <rect x="30" y="20" width="300" height="180" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="180" y="48" text-anchor="middle" class="label" fill="#3b82f6">signal()</text>
  <line x1="50" y1="58" x2="310" y2="58" stroke="#334155" stroke-width="1"/>

  <text x="50" y="80" class="header">입력</text>
  <text x="50" y="97" class="desc">키워드 (예: "AI")</text>

  <text x="50" y="118" class="header">출력</text>
  <text x="50" y="135" class="desc">키워드별 연도 트렌드 DataFrame</text>

  <text x="50" y="156" class="header">관점</text>
  <text x="50" y="173" class="desc">"이 키워드가 얼마나 퍼졌나"</text>

  <!-- digest -->
  <rect x="370" y="20" width="300" height="180" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="520" y="48" text-anchor="middle" class="label" fill="#10b981">digest()</text>
  <line x1="390" y1="58" x2="650" y2="58" stroke="#334155" stroke-width="1"/>

  <text x="390" y="80" class="header">입력</text>
  <text x="390" y="97" class="desc">없음 (전체 스캔) / 섹터 필터</text>

  <text x="390" y="118" class="header">출력</text>
  <text x="390" y="135" class="desc">시장 전체 변화 요약 (3형식)</text>

  <text x="390" y="156" class="header">관점</text>
  <text x="390" y="173" class="desc">"시장에서 무엇이 바뀌었나"</text>
</svg>
