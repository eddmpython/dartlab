<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .grade { font-size: 18px; font-weight: 700; }
    .range { font-size: 10px; fill: #94a3b8; }
    .meaning { font-size: 10px; font-weight: 600; fill: #f8fafc; }
    .box { rx: 6; ry: 6; }
  </style>

  <rect width="700" height="180" rx="12" fill="#0f172a"/>
  <text x="350" y="28" text-anchor="middle" class="title">등급 변환 기준</text>

  <!-- A -->
  <rect x="30" y="50" width="100" height="100" class="box" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="80" y="82" text-anchor="middle" class="grade" fill="#10b981">A</text>
  <text x="80" y="102" text-anchor="middle" class="meaning">우수</text>
  <text x="80" y="120" text-anchor="middle" class="range">≥ 80%</text>
  <text x="80" y="135" text-anchor="middle" class="range">of max score</text>

  <!-- B -->
  <rect x="148" y="50" width="100" height="100" class="box" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="198" y="82" text-anchor="middle" class="grade" fill="#3b82f6">B</text>
  <text x="198" y="102" text-anchor="middle" class="meaning">양호</text>
  <text x="198" y="120" text-anchor="middle" class="range">≥ 50%</text>
  <text x="198" y="135" text-anchor="middle" class="range">of max score</text>

  <!-- C -->
  <rect x="266" y="50" width="100" height="100" class="box" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="316" y="82" text-anchor="middle" class="grade" fill="#f59e0b">C</text>
  <text x="316" y="102" text-anchor="middle" class="meaning">보통</text>
  <text x="316" y="120" text-anchor="middle" class="range">≥ 20%</text>
  <text x="316" y="135" text-anchor="middle" class="range">of max score</text>

  <!-- D -->
  <rect x="384" y="50" width="100" height="100" class="box" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="434" y="82" text-anchor="middle" class="grade" fill="#ef4444">D</text>
  <text x="434" y="102" text-anchor="middle" class="meaning">주의</text>
  <text x="434" y="120" text-anchor="middle" class="range">≥ 0</text>
  <text x="434" y="135" text-anchor="middle" class="range">score</text>

  <!-- F -->
  <rect x="502" y="50" width="100" height="100" class="box" fill="#1e293b" stroke="#dc2626" stroke-width="2"/>
  <text x="552" y="82" text-anchor="middle" class="grade" fill="#dc2626">F</text>
  <text x="552" y="102" text-anchor="middle" class="meaning">위험</text>
  <text x="552" y="120" text-anchor="middle" class="range">< 0</text>
  <text x="552" y="135" text-anchor="middle" class="range">score</text>

  <!-- N -->
  <rect x="620" y="50" width="60" height="100" class="box" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="650" y="82" text-anchor="middle" class="grade" fill="#64748b">N</text>
  <text x="650" y="102" text-anchor="middle" class="meaning">평가불가</text>
  <text x="650" y="120" text-anchor="middle" class="range">데이터</text>
  <text x="650" y="135" text-anchor="middle" class="range">없음</text>
</svg>
