<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .label { font-size: 12px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="200" rx="12" fill="#0f172a"/>

  <rect x="20" y="60" width="120" height="80" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="80" y="90" text-anchor="middle" class="label">DART XBRL</text>
  <text x="80" y="108" text-anchor="middle" class="desc">원본 재무제표</text>
  <text x="80" y="123" text-anchor="middle" class="desc">회사별 계정ID 상이</text>

  <rect x="180" y="60" width="120" height="80" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="240" y="90" text-anchor="middle" class="label">계정 매핑</text>
  <text x="240" y="108" text-anchor="middle" class="desc">34,000개 매핑</text>
  <text x="240" y="123" text-anchor="middle" class="desc">→ 표준 snakeId</text>

  <rect x="340" y="60" width="120" height="80" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="400" y="90" text-anchor="middle" class="label">정규화</text>
  <text x="400" y="108" text-anchor="middle" class="desc">누적→standalone</text>
  <text x="400" y="123" text-anchor="middle" class="desc">CFS 우선 처리</text>

  <rect x="500" y="60" width="170" height="80" class="box" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="585" y="85" text-anchor="middle" class="label">Polars DataFrame</text>
  <text x="585" y="103" text-anchor="middle" class="desc">c.BS / c.IS / c.CF</text>
  <text x="585" y="118" text-anchor="middle" class="desc">c.ratios / c.timeseries</text>
  <text x="585" y="133" text-anchor="middle" class="desc">회사간 비교 가능</text>

  <line x1="140" y1="100" x2="178" y2="100" class="arrow"/>
  <line x1="300" y1="100" x2="338" y2="100" class="arrow"/>
  <line x1="460" y1="100" x2="498" y2="100" class="arrow"/>
</svg>
