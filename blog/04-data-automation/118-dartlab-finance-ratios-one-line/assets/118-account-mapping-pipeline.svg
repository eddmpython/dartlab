<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .label { font-size: 11px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .step { font-size: 10px; font-weight: 700; fill: #3b82f6; }
    .box { rx: 6; ry: 6; stroke-width: 1; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="280" rx="12" fill="#0f172a"/>

  <text x="350" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">계정 매핑 파이프라인</text>

  <rect x="30" y="50" width="140" height="50" class="box" fill="#1e293b" stroke="#ef4444"/>
  <text x="100" y="72" text-anchor="middle" class="step">Step 1</text>
  <text x="100" y="88" text-anchor="middle" class="desc">접두사 제거</text>

  <rect x="200" y="50" width="140" height="50" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="270" y="72" text-anchor="middle" class="step">Step 2</text>
  <text x="270" y="88" text-anchor="middle" class="desc">ID 동의어 (70+)</text>

  <rect x="370" y="50" width="140" height="50" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="440" y="72" text-anchor="middle" class="step">Step 3</text>
  <text x="440" y="88" text-anchor="middle" class="desc">한글명 동의어 (150+)</text>

  <rect x="540" y="50" width="140" height="50" class="box" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="610" y="72" text-anchor="middle" class="step">Step 4</text>
  <text x="610" y="88" text-anchor="middle" class="desc">매핑테이블 (34K)</text>

  <line x1="170" y1="75" x2="198" y2="75" class="arrow"/>
  <line x1="340" y1="75" x2="368" y2="75" class="arrow"/>
  <line x1="510" y1="75" x2="538" y2="75" class="arrow"/>

  <!-- 예시 -->
  <rect x="30" y="130" width="640" height="130" class="box" fill="#1e293b" stroke="#334155"/>
  <text x="50" y="155" class="label">예시: 삼성전자 매출액</text>

  <text x="50" y="178" class="desc">원본: ifrs-full_Revenue → Revenue → ID_SYNONYMS 확인 → revenue</text>
  <text x="50" y="198" class="desc">원본: dart_매출액 → 매출액 → ACCOUNT_NAME_SYNONYMS → revenue</text>
  <text x="50" y="218" class="desc">원본: Revenue_x123 → Revenue → CORE_MAP 미해당 → accountMappings.json → revenue</text>

  <text x="50" y="245" class="label" fill="#10b981">결과: 모든 회사의 매출액 → snakeId "revenue"로 통일</text>
</svg>
