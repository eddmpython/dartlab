<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">DART vs EDGAR — 같은 sections, 다른 소스</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">두 전자공시 시스템이 하나의 topic x period 구조로 수렴하는 과정</text>

  <!-- DART side -->
  <rect x="60" y="110" width="500" height="540" rx="12" fill="rgba(251,146,60,0.04)" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
  <text x="310" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fb923c">DART 전자공시</text>
  <text x="310" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">금융감독원 전자공시시스템</text>

  <!-- DART sources -->
  <rect x="90" y="195" width="200" height="50" rx="8" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="190" y="218" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">docs</text>
  <text x="190" y="235" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">사업보고서 원문 파싱</text>

  <rect x="330" y="195" width="200" height="50" rx="8" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="430" y="218" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">finance</text>
  <text x="430" y="235" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">XBRL 재무제표</text>

  <rect x="90" y="260" width="200" height="50" rx="8" fill="rgba(220,38,38,0.08)" stroke="rgba(220,38,38,0.25)" stroke-width="1"/>
  <text x="190" y="283" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#f87171">report</text>
  <text x="190" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">28개 정형 API 체계</text>

  <!-- DART arrow to sections -->
  <path d="M310 325 L310 370" stroke="#fb923c" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="305,370 310,380 315,370" fill="#fb923c"/>

  <!-- DART sections result -->
  <rect x="110" y="390" width="400" height="120" rx="8" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="310" y="420" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="700" fill="#34d399">sections</text>
  <text x="130" y="450" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">docs.sections → 서술 원문 spine</text>
  <text x="130" y="470" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">finance → BS/IS/CF/SCE 대체</text>
  <text x="130" y="490" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">report → 28개 정형 보충</text>

  <!-- Topic count -->
  <rect x="130" y="525" width="350" height="30" rx="4" fill="rgba(52,211,153,0.08)"/>
  <text x="310" y="545" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6ee7b7">329 topics x 106 periods (삼성전자)</text>

  <!-- EDGAR side -->
  <rect x="640" y="110" width="500" height="540" rx="12" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
  <text x="890" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#38bdf8">SEC EDGAR</text>
  <text x="890" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Securities and Exchange Commission</text>

  <!-- EDGAR sources -->
  <rect x="670" y="195" width="200" height="50" rx="8" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="770" y="218" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">docs</text>
  <text x="770" y="235" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">10-K / 10-Q 원문 파싱</text>

  <rect x="910" y="195" width="200" height="50" rx="8" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="1010" y="218" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">finance</text>
  <text x="1010" y="235" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">SEC XBRL 재무</text>

  <!-- No report for EDGAR -->
  <rect x="670" y="260" width="200" height="50" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="770" y="283" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#475569">report</text>
  <text x="770" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#475569">없음 — docs + finance만</text>

  <!-- EDGAR arrow -->
  <path d="M890 325 L890 370" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="885,370 890,380 895,370" fill="#38bdf8"/>

  <!-- EDGAR sections result -->
  <rect x="690" y="390" width="400" height="120" rx="8" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="890" y="420" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="700" fill="#34d399">sections</text>
  <text x="710" y="450" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">docs.sections → 10-K/10-Q spine</text>
  <text x="710" y="470" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">finance → BS/IS/CF/SCE 대체</text>
  <text x="710" y="490" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">report → 해당 없음</text>

  <rect x="710" y="525" width="350" height="30" rx="4" fill="rgba(52,211,153,0.08)"/>
  <text x="890" y="545" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6ee7b7">100% 매핑률 (974종목 검증)</text>

  <!-- Bottom: shared interface -->
  <rect x="300" y="660" width="600" height="40" rx="8" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)" stroke-width="1.5"/>
  <text x="600" y="685" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#34d399">c.sections  /  c.show(topic)  /  c.trace(topic)  /  c.topics</text>
</svg>