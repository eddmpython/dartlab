<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">sections = topic x period 수평화 매트릭스</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">공시 문서 전체를 하나의 테이블로 펼치는 구조</text>

  <!-- Matrix header row -->
  <rect x="60" y="110" width="200" height="40" rx="6" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.4)" stroke-width="1"/>
  <text x="160" y="135" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#34d399">topic / period</text>

  <rect x="280" y="110" width="160" height="40" rx="6" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="360" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#34d399">2025Q4</text>

  <rect x="460" y="110" width="160" height="40" rx="6" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
  <text x="540" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6ee7b7">2024Q4</text>

  <rect x="640" y="110" width="160" height="40" rx="6" fill="rgba(52,211,153,0.04)" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
  <text x="720" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6ee7b7" opacity="0.7">2024Q3</text>

  <rect x="820" y="110" width="160" height="40" rx="6" fill="rgba(52,211,153,0.02)" stroke="rgba(52,211,153,0.1)" stroke-width="1"/>
  <text x="900" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6ee7b7" opacity="0.5">2023Q4</text>

  <rect x="1000" y="110" width="140" height="40" rx="6" fill="rgba(52,211,153,0.01)" stroke="rgba(52,211,153,0.08)" stroke-width="1"/>
  <text x="1070" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6ee7b7" opacity="0.3">...</text>

  <!-- Row 1: companyOverview (text) -->
  <rect x="60" y="165" width="200" height="70" rx="6" fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.25)" stroke-width="1"/>
  <text x="75" y="190" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="600" fill="#fb923c">I. 회사의 개요</text>
  <text x="75" y="210" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">companyOverview</text>
  <text x="75" y="225" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">text | blockOrder 0</text>

  <rect x="280" y="165" width="160" height="70" rx="4" fill="rgba(30,36,51,0.6)"/>
  <text x="295" y="190" font-family="Pretendard, sans-serif" font-size="11" fill="#cbd5e1">삼성전자는 1969년</text>
  <text x="295" y="206" font-family="Pretendard, sans-serif" font-size="11" fill="#cbd5e1">설립된 종합 전자...</text>

  <rect x="460" y="165" width="160" height="70" rx="4" fill="rgba(30,36,51,0.4)"/>
  <text x="475" y="190" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">삼성전자는 1969년</text>
  <text x="475" y="206" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">설립된 종합 전자...</text>

  <rect x="640" y="165" width="160" height="70" rx="4" fill="rgba(30,36,51,0.3)"/>
  <text x="655" y="195" font-family="Pretendard, sans-serif" font-size="11" fill="#64748b">null</text>

  <rect x="820" y="165" width="160" height="70" rx="4" fill="rgba(30,36,51,0.3)"/>
  <text x="835" y="190" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8" opacity="0.6">삼성전자는 1969년</text>

  <!-- Row 2: businessOverview (text) -->
  <rect x="60" y="250" width="200" height="70" rx="6" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="75" y="275" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">II. 사업의 내용</text>
  <text x="75" y="295" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">businessOverview</text>
  <text x="75" y="310" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">text | blockOrder 0</text>

  <rect x="280" y="250" width="160" height="70" rx="4" fill="rgba(30,36,51,0.6)"/>
  <text x="295" y="275" font-family="Pretendard, sans-serif" font-size="11" fill="#cbd5e1">반도체 HBM 생산</text>
  <text x="295" y="291" font-family="Pretendard, sans-serif" font-size="11" fill="#cbd5e1">확대 기조 유지...</text>

  <rect x="460" y="250" width="160" height="70" rx="4" fill="rgba(30,36,51,0.4)"/>
  <text x="475" y="275" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">메모리 수요 부진에</text>
  <text x="475" y="291" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">따른 실적 둔화...</text>

  <!-- Row 3: BS (finance) -->
  <rect x="60" y="335" width="200" height="70" rx="6" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="75" y="360" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">III. 재무에 관한 사항</text>
  <text x="75" y="380" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">BS (finance)</text>
  <text x="75" y="395" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#a78bfa">finance source</text>

  <rect x="280" y="335" width="160" height="70" rx="4" fill="rgba(167,139,250,0.06)"/>
  <text x="295" y="358" font-family="JetBrains Mono, monospace" font-size="10" fill="#c4b5fd">total_assets</text>
  <text x="295" y="374" font-family="JetBrains Mono, monospace" font-size="11" fill="#f1f5f9">455.2T</text>
  <text x="295" y="392" font-family="JetBrains Mono, monospace" font-size="10" fill="#c4b5fd">total_equity</text>

  <rect x="460" y="335" width="160" height="70" rx="4" fill="rgba(167,139,250,0.04)"/>
  <text x="475" y="358" font-family="JetBrains Mono, monospace" font-size="10" fill="#a78bfa" opacity="0.7">total_assets</text>
  <text x="475" y="374" font-family="JetBrains Mono, monospace" font-size="11" fill="#cbd5e1">426.6T</text>

  <!-- Row 4: table block -->
  <rect x="60" y="420" width="200" height="70" rx="6" fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.25)" stroke-width="1"/>
  <text x="75" y="445" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="600" fill="#fb923c">I. 회사의 개요</text>
  <text x="75" y="465" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">companyOverview</text>
  <text x="75" y="480" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">table | blockOrder 1</text>

  <rect x="280" y="420" width="160" height="70" rx="4" fill="rgba(30,36,51,0.6)"/>
  <text x="295" y="445" font-family="Pretendard, sans-serif" font-size="10" fill="#cbd5e1">| 항목 | 내용 |</text>
  <text x="295" y="461" font-family="Pretendard, sans-serif" font-size="10" fill="#cbd5e1">| 설립일 | 1969 |</text>
  <text x="295" y="477" font-family="Pretendard, sans-serif" font-size="10" fill="#94a3b8">| 대표이사 | ... |</text>

  <!-- Legend -->
  <rect x="60" y="530" width="1080" height="80" rx="8" fill="rgba(30,36,51,0.4)" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="555" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">source 우선순위</text>

  <rect x="80" y="570" width="12" height="12" rx="2" fill="rgba(167,139,250,0.3)"/>
  <text x="100" y="581" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a78bfa">finance — 숫자 우선 (BS, IS, CF)</text>

  <rect x="380" y="570" width="12" height="12" rx="2" fill="rgba(220,38,38,0.3)"/>
  <text x="400" y="581" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f87171">report — 정형 공시 (DART only)</text>

  <rect x="680" y="570" width="12" height="12" rx="2" fill="rgba(56,189,248,0.3)"/>
  <text x="700" y="581" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#38bdf8">docs — 서술형 원문 (text/table)</text>

  <!-- DartLab branding -->
  <text x="600" y="660" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
  <text x="600" y="680" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">DART + EDGAR 공시를 하나의 topic x period 구조로</text>
</svg>