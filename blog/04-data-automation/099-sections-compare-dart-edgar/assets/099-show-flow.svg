<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="619" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">show(topic) — 한 줄로 공시 블록을 여는 실전 흐름</text>
  <text x="600" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">sections 위에서 소스를 자동 선택하고 최적 데이터를 반환한다</text>

  <!-- Step 1: User call -->
  <rect x="80" y="110" width="280" height="100" rx="10" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="220" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#34d399" letter-spacing="0.04em">STEP 1: 호출</text>
  <text x="220" y="168" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#f1f5f9">c.show("businessOverview")</text>
  <text x="220" y="192" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">c.show("BS")</text>

  <!-- Arrow 1→2 -->
  <line x1="370" y1="160" x2="430" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Source selection -->
  <rect x="440" y="110" width="280" height="100" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="580" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" letter-spacing="0.04em">STEP 2: 소스 선택</text>
  <text x="580" y="168" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#f1f5f9">finance > report > docs</text>
  <text x="580" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">BS → finance 우선, 나머지 → docs</text>

  <!-- Arrow 2→3 -->
  <line x1="730" y1="160" x2="790" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Block index -->
  <rect x="800" y="110" width="330" height="100" rx="10" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1.5"/>
  <text x="965" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#38bdf8" letter-spacing="0.04em">STEP 3: 블록 목차 반환</text>
  <text x="965" y="168" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#f1f5f9">block | type | source | preview</text>
  <text x="965" y="188" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">0 | text | docs | 반도체 HBM...</text>

  <!-- Arrow down from step 3 -->
  <line x1="965" y1="220" x2="965" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Block detail -->
  <rect x="680" y="280" width="450" height="130" rx="10" fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.3)" stroke-width="1.5"/>
  <text x="905" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fb923c" letter-spacing="0.04em">STEP 4: 블록 상세 조회</text>
  <text x="905" y="340" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#f1f5f9">c.show("businessOverview", 0)</text>
  <text x="905" y="368" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">해당 블록의 실제 DataFrame 반환</text>
  <text x="905" y="390" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">모든 기간의 텍스트 또는 테이블 데이터</text>

  <!-- trace box -->
  <rect x="80" y="280" width="300" height="130" rx="10" fill="rgba(220,38,38,0.06)" stroke="rgba(220,38,38,0.2)" stroke-width="1"/>
  <text x="230" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f87171" letter-spacing="0.04em">trace(topic) — 출처 추적</text>
  <text x="100" y="340" font-family="JetBrains Mono, monospace" font-size="12" fill="#f1f5f9">c.trace("BS")</text>
  <text x="100" y="365" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">source: finance</text>
  <text x="100" y="385" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">periods: 2025Q4, 2024Q4, 2024Q3...</text>
  <text x="100" y="400" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">hasText: false, hasTable: true</text>

  <!-- Code examples -->
  <rect x="80" y="440" width="1040" height="140" rx="10" fill="rgba(30,36,51,0.6)" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="468" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b"># 전자공시 문서 기간별 비교 — 코드 3줄</text>
  <text x="100" y="492" font-family="JetBrains Mono, monospace" font-size="13" fill="#34d399">import</text>
  <text x="155" y="492" font-family="JetBrains Mono, monospace" font-size="13" fill="#f1f5f9"> dartlab</text>
  <text x="100" y="516" font-family="JetBrains Mono, monospace" font-size="13" fill="#f1f5f9">c = dartlab.Company(</text>
  <text x="310" y="516" font-family="JetBrains Mono, monospace" font-size="13" fill="#fbbf24">"005930"</text>
  <text x="386" y="516" font-family="JetBrains Mono, monospace" font-size="13" fill="#f1f5f9">)</text>
  <text x="500" y="516" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b"># 삼성전자</text>
  <text x="100" y="540" font-family="JetBrains Mono, monospace" font-size="13" fill="#f1f5f9">c.show(</text>
  <text x="170" y="540" font-family="JetBrains Mono, monospace" font-size="13" fill="#fbbf24">"businessOverview"</text>
  <text x="368" y="540" font-family="JetBrains Mono, monospace" font-size="13" fill="#f1f5f9">)</text>
  <text x="500" y="540" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b"># 사업의 내용, 기간별 비교</text>
  <text x="100" y="564" font-family="JetBrains Mono, monospace" font-size="13" fill="#f1f5f9">c.show(</text>
  <text x="170" y="564" font-family="JetBrains Mono, monospace" font-size="13" fill="#fbbf24">"BS"</text>
  <text x="210" y="564" font-family="JetBrains Mono, monospace" font-size="13" fill="#f1f5f9">)</text>
  <text x="500" y="564" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b"># 재무상태표 — finance source 자동 선택</text>
</svg>