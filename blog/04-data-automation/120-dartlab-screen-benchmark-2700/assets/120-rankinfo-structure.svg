<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 10px; font-weight: 600; fill: #f8fafc; }
    .val { font-size: 10px; fill: #94a3b8; }
    .highlight { font-size: 11px; font-weight: 600; fill: #10b981; }
    .box { rx: 6; ry: 6; stroke-width: 1; }
  </style>

  <rect width="700" height="200" rx="12" fill="#0f172a"/>
  <text x="350" y="28" text-anchor="middle" class="title">RankInfo — 종목별 시장 위치</text>

  <rect x="20" y="50" width="200" height="130" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="30" y="72" class="label">전체 순위</text>
  <text x="30" y="92" class="val">revenueRank: 1</text>
  <text x="30" y="108" class="val">assetRank: 1</text>
  <text x="30" y="124" class="val">growthRank: 342</text>
  <text x="30" y="145" class="highlight">sizeClass: "large"</text>
  <text x="30" y="165" class="val">sector: "반도체"</text>

  <rect x="250" y="50" width="200" height="130" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="260" y="72" class="label">섹터 내 순위</text>
  <text x="260" y="92" class="val">revenueRankInSector: 1</text>
  <text x="260" y="108" class="val">assetRankInSector: 1</text>
  <text x="260" y="124" class="val">growthRankInSector: 15</text>
  <text x="260" y="145" class="val">revenueSectorTotal: 42</text>
  <text x="260" y="165" class="val">assetSectorTotal: 42</text>

  <rect x="480" y="50" width="200" height="130" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="490" y="72" class="label">핵심 지표</text>
  <text x="490" y="92" class="val">revenue: 302조</text>
  <text x="490" y="108" class="val">totalAssets: 455조</text>
  <text x="490" y="124" class="highlight">revenueGrowth3Y: 8.2%</text>
  <text x="490" y="145" class="val">industryGroup: "반도체"</text>
</svg>
