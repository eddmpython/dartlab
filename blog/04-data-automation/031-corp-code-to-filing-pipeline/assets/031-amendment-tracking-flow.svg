  <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round">
    <path d="M242 186H310"/>
    <path d="M490 186H558"/>
  </g>

  <rect x="72" y="288" width="656" height="94" rx="20" fill="#111827" stroke="#334155"/>
  <text x="96" y="320" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">Keep both views</text>
  <text x="96" y="346" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="13">Operational view: one latest effective document for dashboards and analytics.</text>
  <text x="96" y="368" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="13">History view: original and amended filings remain linked for audit, debugging, and change review.</text>
