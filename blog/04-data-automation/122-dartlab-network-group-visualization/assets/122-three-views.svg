<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .label { font-size: 11px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
  </style>

  <rect width="700" height="220" rx="12" fill="#0f172a"/>
  <text x="350" y="28" text-anchor="middle" class="title">3가지 뷰 — 목적에 맞게 선택</text>

  <!-- Full -->
  <rect x="20" y="50" width="210" height="150" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="125" y="75" text-anchor="middle" class="label" fill="#3b82f6">Full View</text>
  <text x="35" y="100" class="desc">전체 노드 + 엣지</text>
  <text x="35" y="118" class="desc">groups, industries</text>
  <text x="35" y="136" class="desc">cycles (순환출자)</text>
  <text x="35" y="160" class="desc" fill="#64748b">용도: 전체 시장 구조 파악</text>
  <text x="35" y="178" class="desc" fill="#64748b">특정 패턴 탐색</text>

  <!-- Overview -->
  <rect x="250" y="50" width="200" height="150" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="350" y="75" text-anchor="middle" class="label" fill="#f59e0b">Overview</text>
  <text x="265" y="100" class="desc">그룹 슈퍼노드</text>
  <text x="265" y="118" class="desc">그룹 간 관계</text>
  <text x="265" y="136" class="desc">가중치 + 유형</text>
  <text x="265" y="160" class="desc" fill="#64748b">용도: 재벌 그룹 간</text>
  <text x="265" y="178" class="desc" fill="#64748b">관계 구조 조감</text>

  <!-- Ego -->
  <rect x="470" y="50" width="210" height="150" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="575" y="75" text-anchor="middle" class="label" fill="#10b981">Ego View</text>
  <text x="485" y="100" class="desc">특정 기업 중심</text>
  <text x="485" y="118" class="desc">N-hop 이내 이웃</text>
  <text x="485" y="136" class="desc">동종업계 자동 추가</text>
  <text x="485" y="160" class="desc" fill="#64748b">용도: 특정 기업의</text>
  <text x="485" y="178" class="desc" fill="#64748b">관계망 + 업계 비교</text>
</svg>
