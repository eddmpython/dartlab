<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Inter', system-ui, sans-serif; }
    .label { font-size: 12px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; fill: #94a3b8; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="800" height="280" rx="12" fill="#0f172a"/>

  <!-- Step 1 -->
  <rect x="20" y="100" width="110" height="70" class="box" fill="#1e293b" stroke="#3b82f6"/>
  <text x="75" y="128" text-anchor="middle" class="label">자연어 입력</text>
  <text x="75" y="148" text-anchor="middle" class="desc">"삼성전자</text>
  <text x="75" y="160" text-anchor="middle" class="desc">배당 추세는?"</text>

  <!-- Step 2 -->
  <rect x="170" y="100" width="110" height="70" class="box" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="225" y="125" text-anchor="middle" class="label">종목 추출</text>
  <text x="225" y="145" text-anchor="middle" class="desc">삼성전자 → 005930</text>
  <text x="225" y="160" text-anchor="middle" class="desc">fuzzy matching</text>

  <!-- Step 3 -->
  <rect x="320" y="100" width="110" height="70" class="box" fill="#1e293b" stroke="#10b981"/>
  <text x="375" y="125" text-anchor="middle" class="label">Company 로드</text>
  <text x="375" y="145" text-anchor="middle" class="desc">sections 44개</text>
  <text x="375" y="160" text-anchor="middle" class="desc">finance + report</text>

  <!-- Step 4 -->
  <rect x="470" y="100" width="110" height="70" class="box" fill="#1e293b" stroke="#f59e0b"/>
  <text x="525" y="125" text-anchor="middle" class="label">패키지 조립</text>
  <text x="525" y="145" text-anchor="middle" class="desc">배당 → dividend</text>
  <text x="525" y="160" text-anchor="middle" class="desc">ratios + report</text>

  <!-- Step 5 -->
  <rect x="620" y="100" width="110" height="70" class="box" fill="#1e293b" stroke="#ec4899"/>
  <text x="675" y="125" text-anchor="middle" class="label">LLM 분석</text>
  <text x="675" y="145" text-anchor="middle" class="desc">컨텍스트 + 질문</text>
  <text x="675" y="160" text-anchor="middle" class="desc">→ 스트리밍 답변</text>

  <!-- 화살표 -->
  <line x1="130" y1="135" x2="168" y2="135" class="arrow"/>
  <line x1="280" y1="135" x2="318" y2="135" class="arrow"/>
  <line x1="430" y1="135" x2="468" y2="135" class="arrow"/>
  <line x1="580" y1="135" x2="618" y2="135" class="arrow"/>

  <!-- 하단 라벨 -->
  <text x="75" y="200" text-anchor="middle" class="desc">사용자</text>
  <text x="225" y="200" text-anchor="middle" class="desc">resolve</text>
  <text x="375" y="200" text-anchor="middle" class="desc">dartlab</text>
  <text x="525" y="200" text-anchor="middle" class="desc">ai engine</text>
  <text x="675" y="200" text-anchor="middle" class="desc">provider</text>
</svg>