<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="718" rx="6" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9">증분 업데이트 vs 전체 갱신</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">Incremental Update vs Full Refresh — Smart Synchronization</text>

  <!-- Top decision diamond -->
  <polygon points="600,120 730,180 600,240 470,180" fill="#0a0e18" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="600" y="174" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">갱신이</text>
  <text x="600" y="192" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">필요한가?</text>

  <!-- Left branch: 증분 (green) -->
  <line x1="470" y1="180" x2="310" y2="180" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="390" y="170" font-family="Pretendard, sans-serif" font-size="12" font-weight="bold" fill="#34d399">기본값</text>

  <!-- Right branch: 전체 (orange) -->
  <line x1="730" y1="180" x2="890" y2="180" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="810" y="170" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#fb923c">forceUpdate=True</text>

  <!-- ===== LEFT PATH: 증분 업데이트 ===== -->
  <rect x="80" y="150" width="220" height="56" rx="12" fill="#0c2e1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="190" y="184" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="16" font-weight="bold" fill="#34d399">증분 업데이트</text>

  <line x1="190" y1="206" x2="190" y2="246" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Check: local mtime < remote updated_at -->
  <rect x="60" y="256" width="260" height="64" rx="10" fill="#0a0e18" stroke="#34d399" stroke-width="1"/>
  <text x="190" y="280" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#34d399">시간 비교</text>
  <text x="190" y="302" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">로컬 mtime &lt; 원격 updated_at?</text>

  <line x1="190" y1="320" x2="190" y2="354" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Diamond: changed? -->
  <polygon points="190,362 260,398 190,434 120,398" fill="#0a0e18" stroke="#34d399" stroke-width="1"/>
  <text x="190" y="402" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" font-weight="bold" fill="#34d399">변경?</text>

  <!-- Yes: download -->
  <line x1="120" y1="398" x2="60" y2="398" stroke="#34d399" stroke-width="1.2"/>
  <line x1="60" y1="398" x2="60" y2="468" stroke="#34d399" stroke-width="1.2" marker-end="url(#arr-g)"/>
  <text x="76" y="390" font-family="Pretendard, sans-serif" font-size="11" fill="#34d399">Yes</text>

  <rect x="20" y="478" width="180" height="50" rx="8" fill="#0c2e1a" stroke="#34d399" stroke-width="1"/>
  <text x="110" y="500" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#34d399">해당 파일만 다운로드</text>
  <text x="110" y="518" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">변경분만 전송</text>

  <!-- No: skip -->
  <line x1="260" y1="398" x2="320" y2="398" stroke="#64748b" stroke-width="1.2"/>
  <line x1="320" y1="398" x2="320" y2="468" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="282" y="390" font-family="Pretendard, sans-serif" font-size="11" fill="#64748b">No</text>

  <rect x="240" y="478" width="160" height="50" rx="8" fill="#0a0e18" stroke="#1e2433" stroke-width="1"/>
  <text x="320" y="500" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#64748b">건너뛰기</text>
  <text x="320" y="518" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">이미 최신</text>

  <!-- ===== RIGHT PATH: 전체 갱신 ===== -->
  <rect x="900" y="150" width="220" height="56" rx="12" fill="#2e1a0c" stroke="#fb923c" stroke-width="1.5"/>
  <text x="1010" y="184" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="16" font-weight="bold" fill="#fb923c">전체 갱신</text>

  <line x1="1010" y1="206" x2="1010" y2="246" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Force: skip check -->
  <rect x="880" y="256" width="260" height="64" rx="10" fill="#0a0e18" stroke="#fb923c" stroke-width="1"/>
  <text x="1010" y="280" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#fb923c">시간 비교 생략</text>
  <text x="1010" y="302" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">forceUpdate=True 강제 실행</text>

  <line x1="1010" y1="320" x2="1010" y2="360" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Download all -->
  <rect x="880" y="370" width="260" height="64" rx="10" fill="#2e1a0c" stroke="#fb923c" stroke-width="1"/>
  <text x="1010" y="394" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#fb923c">전체 재다운로드</text>
  <text x="1010" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">모든 에셋 강제 갱신</text>

  <line x1="1010" y1="434" x2="1010" y2="468" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Overwrite -->
  <rect x="880" y="478" width="260" height="50" rx="8" fill="#2e1a0c" stroke="#fb923c" stroke-width="1"/>
  <text x="1010" y="500" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#fb923c">로컬 파일 덮어쓰기</text>
  <text x="1010" y="518" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">mtime 갱신</text>

  <!-- ===== Bottom comparison box ===== -->
  <rect x="120" y="560" width="960" height="116" rx="12" fill="#0a0e18" stroke="#1e2433" stroke-width="1.5"/>

  <text x="600" y="590" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#f1f5f9">비교 요약</text>

  <!-- Left stats -->
  <rect x="160" y="606" width="380" height="54" rx="8" fill="#0c2e1a" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <text x="180" y="626" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#34d399">증분 업데이트</text>
  <text x="180" y="648" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">시간 ~95% 절약 | 대역폭 ~90% 절약 | 일상 동기화</text>

  <!-- Right stats -->
  <rect x="660" y="606" width="380" height="54" rx="8" fill="#2e1a0c" stroke="#fb923c" stroke-width="1" opacity="0.5"/>
  <text x="680" y="626" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#fb923c">전체 갱신</text>
  <text x="680" y="648" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">무결성 보장 | 스키마 변경 대응 | 초기 설정</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>