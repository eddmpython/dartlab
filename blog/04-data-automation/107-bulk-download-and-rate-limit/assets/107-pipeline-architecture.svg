<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="718" rx="6" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9">전자공시 대량 수집 파이프라인</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">Pipeline Architecture — API Call → Storage → Distribution</text>

  <!-- Step 1: API 호출 (blue) -->
  <rect x="60" y="140" width="160" height="80" rx="12" fill="#0c1a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="140" y="172" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#38bdf8">API 호출</text>
  <text x="140" y="196" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">OpenDART / EDGAR</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="180" x2="270" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Rate Limit 관리 (purple) -->
  <rect x="280" y="140" width="160" height="80" rx="12" fill="#1a0f2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="172" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#a78bfa">Rate Limit 관리</text>
  <text x="360" y="196" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">throttle / queue</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="180" x2="490" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: 다운로드 (blue) -->
  <rect x="500" y="140" width="160" height="80" rx="12" fill="#0c1a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="580" y="172" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#38bdf8">다운로드</text>
  <text x="580" y="196" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">async / batch</text>

  <!-- Arrow 3→4 -->
  <line x1="660" y1="180" x2="710" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: 검증 (green) -->
  <rect x="720" y="140" width="160" height="80" rx="12" fill="#0c2e1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="800" y="172" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#34d399">검증</text>
  <text x="800" y="196" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">schema / integrity</text>

  <!-- Arrow 4→5 -->
  <line x1="880" y1="180" x2="930" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Parquet 저장 (orange) -->
  <rect x="940" y="140" width="160" height="80" rx="12" fill="#2e1a0c" stroke="#fb923c" stroke-width="1.5"/>
  <text x="1020" y="172" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#fb923c">Parquet 저장</text>
  <text x="1020" y="196" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">columnar format</text>

  <!-- Arrow 5→6 (going down) -->
  <line x1="1020" y1="220" x2="1020" y2="290" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: GitHub Releases (orange) -->
  <rect x="840" y="300" width="360" height="80" rx="12" fill="#2e1a0c" stroke="#fb923c" stroke-width="1.5"/>
  <text x="1020" y="332" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#fb923c">GitHub Releases 배포</text>
  <text x="1020" y="356" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">data-docs / data-finance-1~4</text>

  <!-- Detail section -->
  <rect x="60" y="280" width="720" height="320" rx="10" fill="#0a0e18" stroke="#1e2433" stroke-width="1"/>

  <!-- Detail title -->
  <text x="80" y="310" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#f1f5f9">파이프라인 상세</text>

  <!-- API row -->
  <circle cx="100" cy="350" r="6" fill="#38bdf8"/>
  <text x="120" y="355" font-family="Pretendard, sans-serif" font-size="13" fill="#cbd5e1">API 호출</text>
  <text x="240" y="355" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748b">— OpenDART REST API, EDGAR HTTPS 직접 수집</text>

  <!-- Rate limit row -->
  <circle cx="100" cy="390" r="6" fill="#a78bfa"/>
  <text x="120" y="395" font-family="Pretendard, sans-serif" font-size="13" fill="#cbd5e1">Rate Limit</text>
  <text x="240" y="395" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748b">— 일간/초간 한도 준수, 큐 기반 스로틀링</text>

  <!-- Download row -->
  <circle cx="100" cy="430" r="6" fill="#38bdf8"/>
  <text x="120" y="435" font-family="Pretendard, sans-serif" font-size="13" fill="#cbd5e1">다운로드</text>
  <text x="240" y="435" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748b">— 비동기 배치 처리, 부분 재개 지원</text>

  <!-- Validation row -->
  <circle cx="100" cy="470" r="6" fill="#34d399"/>
  <text x="120" y="475" font-family="Pretendard, sans-serif" font-size="13" fill="#cbd5e1">검증</text>
  <text x="240" y="475" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748b">— 스키마 일치, 파일 무결성, 누락 항목 탐지</text>

  <!-- Storage row -->
  <circle cx="100" cy="510" r="6" fill="#fb923c"/>
  <text x="120" y="515" font-family="Pretendard, sans-serif" font-size="13" fill="#cbd5e1">저장</text>
  <text x="240" y="515" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748b">— Parquet 컬럼 포맷, 종목 코드별 파일 분리</text>

  <!-- Distribution row -->
  <circle cx="100" cy="550" r="6" fill="#fb923c"/>
  <text x="120" y="555" font-family="Pretendard, sans-serif" font-size="13" fill="#cbd5e1">배포</text>
  <text x="240" y="555" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748b">— GitHub Releases 태그별 분할, 1000개 제한 준수</text>

  <!-- Legend -->
  <rect x="80" y="574" width="12" height="12" rx="2" fill="#38bdf8" opacity="0.3"/>
  <rect x="80" y="574" width="12" height="12" rx="2" fill="none" stroke="#38bdf8" stroke-width="1"/>
  <text x="100" y="585" font-family="Inter, sans-serif" font-size="11" fill="#64748b">입력</text>

  <rect x="150" y="574" width="12" height="12" rx="2" fill="#34d399" opacity="0.3"/>
  <rect x="150" y="574" width="12" height="12" rx="2" fill="none" stroke="#34d399" stroke-width="1"/>
  <text x="170" y="585" font-family="Inter, sans-serif" font-size="11" fill="#64748b">처리</text>

  <rect x="220" y="574" width="12" height="12" rx="2" fill="#fb923c" opacity="0.3"/>
  <rect x="220" y="574" width="12" height="12" rx="2" fill="none" stroke="#fb923c" stroke-width="1"/>
  <text x="240" y="585" font-family="Inter, sans-serif" font-size="11" fill="#64748b">저장</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>