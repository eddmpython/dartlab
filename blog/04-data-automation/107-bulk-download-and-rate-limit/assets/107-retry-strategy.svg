<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#f87171"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="718" rx="6" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9">네트워크 장애 대응 전략</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">Retry Strategy — Decision Tree for Error Handling</text>

  <!-- Step 1: 요청 (blue) -->
  <rect x="490" y="110" width="220" height="56" rx="12" fill="#0c1a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="600" y="144" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="16" font-weight="bold" fill="#38bdf8">API 요청 전송</text>

  <!-- Arrow down to diamond -->
  <line x1="600" y1="166" x2="600" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond: 성공? -->
  <polygon points="600,210 700,260 600,310 500,260" fill="#0a0e18" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="600" y="256" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">성공?</text>
  <text x="600" y="274" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">HTTP 2xx</text>

  <!-- YES: Success path (green) — goes right -->
  <line x1="700" y1="260" x2="820" y2="260" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="755" y="250" font-family="Pretendard, sans-serif" font-size="12" font-weight="bold" fill="#34d399">Yes</text>

  <!-- Success box -->
  <rect x="830" y="232" width="180" height="56" rx="12" fill="#0c2e1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="920" y="256" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#34d399">저장 완료</text>
  <text x="920" y="274" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">다음 항목 진행</text>

  <!-- NO path — goes down -->
  <line x1="600" y1="310" x2="600" y2="360" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="614" y="342" font-family="Pretendard, sans-serif" font-size="12" font-weight="bold" fill="#f87171">No</text>

  <!-- Diamond: Error Type -->
  <polygon points="600,370 720,430 600,490 480,430" fill="#0a0e18" stroke="#f87171" stroke-width="1.5"/>
  <text x="600" y="426" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#f87171">에러 유형</text>
  <text x="600" y="444" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">분류</text>

  <!-- Branch 1: 429 Rate Limit — goes left -->
  <line x1="480" y1="430" x2="340" y2="430" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="410" y="420" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#fb923c">429</text>

  <rect x="120" y="400" width="210" height="64" rx="10" fill="#2e1a0c" stroke="#fb923c" stroke-width="1.5"/>
  <text x="225" y="424" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="bold" fill="#fb923c">Rate Limit 대기</text>
  <text x="225" y="446" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">Retry-After 헤더 준수</text>

  <!-- Arrow from 429 back to request (loop) -->
  <line x1="120" y1="432" x2="80" y2="432" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="432" x2="80" y2="140" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="140" x2="480" y2="140" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <text x="76" y="285" font-family="Pretendard, sans-serif" font-size="10" fill="#fb923c" transform="rotate(-90,76,285)">재시도</text>

  <!-- Branch 2: 5xx Server Error — goes right -->
  <line x1="720" y1="430" x2="840" y2="430" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="780" y="420" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#f87171">5xx</text>

  <rect x="850" y="400" width="230" height="64" rx="10" fill="#1a0f0f" stroke="#f87171" stroke-width="1.5"/>
  <text x="965" y="424" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="bold" fill="#f87171">지수 백오프 재시도</text>
  <text x="965" y="446" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">1s → 2s → 4s → 8s (최대 3회)</text>

  <!-- Arrow from 5xx back to request (loop) -->
  <line x1="1080" y1="432" x2="1130" y2="432" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1130" y1="432" x2="1130" y2="140" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1130" y1="140" x2="720" y2="140" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <text x="1134" y="285" font-family="Pretendard, sans-serif" font-size="10" fill="#f87171" transform="rotate(90,1134,285)">재시도</text>

  <!-- Branch 3: Timeout — goes down -->
  <line x1="600" y1="490" x2="600" y2="530" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="630" y="516" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#fb923c">timeout</text>

  <rect x="440" y="540" width="320" height="64" rx="10" fill="#2e1a0c" stroke="#fb923c" stroke-width="1.5"/>
  <text x="600" y="564" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="bold" fill="#fb923c">부분 재개 (Checkpoint)</text>
  <text x="600" y="586" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">마지막 성공 지점부터 이어서 진행</text>

  <!-- Legend -->
  <rect x="80" y="628" width="1040" height="50" rx="8" fill="#0a0e18" stroke="#1e2433" stroke-width="1"/>

  <circle cx="120" cy="653" r="5" fill="#34d399"/>
  <text x="134" y="658" font-family="Pretendard, sans-serif" font-size="12" fill="#34d399">성공 경로</text>

  <circle cx="260" cy="653" r="5" fill="#f87171"/>
  <text x="274" y="658" font-family="Pretendard, sans-serif" font-size="12" fill="#f87171">에러 경로</text>

  <circle cx="400" cy="653" r="5" fill="#fb923c"/>
  <text x="414" y="658" font-family="Pretendard, sans-serif" font-size="12" fill="#fb923c">재시도 경로</text>

  <circle cx="560" cy="653" r="5" fill="#a78bfa"/>
  <text x="574" y="658" font-family="Pretendard, sans-serif" font-size="12" fill="#a78bfa">판단 노드</text>

  <text x="760" y="658" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">점선 = 재시도 루프</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>