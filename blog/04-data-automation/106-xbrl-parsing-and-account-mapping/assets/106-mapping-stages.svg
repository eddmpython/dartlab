<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="718" rx="8" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9">5단계 매핑 — 단계별 기여도</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">각 단계가 전체 매핑률에 기여하는 비율</text>

  <!-- Waterfall chart -->
  <!-- Y-axis labels -->
  <text x="80" y="155" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">100%</text>
  <line x1="90" y1="150" x2="1100" y2="150" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="80" y="255" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">75%</text>
  <line x1="90" y1="250" x2="1100" y2="250" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="80" y="355" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">50%</text>
  <line x1="90" y1="350" x2="1100" y2="350" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="80" y="455" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">25%</text>
  <line x1="90" y1="450" x2="1100" y2="450" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="80" y="555" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">0%</text>
  <line x1="90" y1="550" x2="1100" y2="550" stroke="#1e2433" stroke-width="0.5"/>

  <!-- Scale: 0% = y:550, 100% = y:150, so 1% = 4px -->

  <!-- Bar 1: Prefix 정규화 ~15% — starts at 0, fills to 15% -->
  <!-- Bottom: 550, Height: 60 (15%), Top: 490 -->
  <rect x="130" y="490" width="140" height="60" rx="4" fill="#a78bfa" opacity="0.8"/>
  <text x="200" y="525" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#f1f5f9">15%</text>
  <!-- Connector line to next bar -->
  <line x1="270" y1="490" x2="310" y2="490" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" opacity="0.4"/>

  <!-- Bar 2: ID 동의어 ~10% — starts at 15%, fills to 25% -->
  <!-- Bottom: 490, Height: 40, Top: 450 -->
  <rect x="310" y="450" width="140" height="40" rx="4" fill="#38bdf8" opacity="0.8"/>
  <text x="380" y="475" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#f1f5f9">10%</text>
  <line x1="450" y1="450" x2="490" y2="450" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" opacity="0.4"/>

  <!-- Bar 3: 계정명 동의어 ~20% — starts at 25%, fills to 45% -->
  <!-- Bottom: 450, Height: 80, Top: 370 -->
  <rect x="490" y="370" width="140" height="80" rx="4" fill="#34d399" opacity="0.8"/>
  <text x="560" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#f1f5f9">20%</text>
  <line x1="630" y1="370" x2="670" y2="370" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" opacity="0.4"/>

  <!-- Bar 4: 학습 매퍼 ~50% — starts at 45%, fills to 95% -->
  <!-- Bottom: 370, Height: 200, Top: 170 -->
  <rect x="670" y="170" width="140" height="200" rx="4" fill="#fb923c" opacity="0.8"/>
  <text x="740" y="278" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="bold" fill="#f1f5f9">50%</text>
  <line x1="810" y1="170" x2="850" y2="170" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" opacity="0.4"/>

  <!-- Bar 5: 괄호 제거 Fallback ~2% — starts at 95%, fills to 97% -->
  <!-- Bottom: 170, Height: 8, Top: 162 -->
  <rect x="850" y="162" width="140" height="8" rx="2" fill="#f87171" opacity="0.8"/>
  <text x="920" y="156" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#f87171">2%</text>

  <!-- Unmapped area indicator -->
  <rect x="1030" y="150" width="60" height="12" rx="2" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" opacity="0.5"/>
  <text x="1060" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">3%</text>
  <text x="1060" y="180" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="10" fill="#94a3b8">미매핑</text>

  <!-- X-axis labels -->
  <text x="200" y="580" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#a78bfa">Prefix</text>
  <text x="200" y="596" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#a78bfa">정규화</text>

  <text x="380" y="580" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#38bdf8">ID</text>
  <text x="380" y="596" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#38bdf8">동의어</text>

  <text x="560" y="580" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#34d399">계정명</text>
  <text x="560" y="596" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#34d399">동의어</text>

  <text x="740" y="580" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#fb923c">학습</text>
  <text x="740" y="596" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#fb923c">매퍼</text>

  <text x="920" y="580" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#f87171">괄호 제거</text>
  <text x="920" y="596" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#f87171">Fallback</text>

  <!-- Summary bar at bottom -->
  <rect x="100" y="625" width="1000" height="40" rx="8" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Stacked horizontal bar -->
  <rect x="100" y="625" width="150" height="40" rx="8" fill="#a78bfa" opacity="0.3"/>
  <rect x="250" y="625" width="100" height="40" fill="#38bdf8" opacity="0.3"/>
  <rect x="350" y="625" width="200" height="40" fill="#34d399" opacity="0.3"/>
  <rect x="550" y="625" width="500" height="40" fill="#fb923c" opacity="0.3"/>
  <rect x="1050" y="625" width="20" height="40" fill="#f87171" opacity="0.3"/>
  <rect x="1070" y="625" width="30" height="40" rx="0 8 8 0" fill="#1e2433" opacity="0.5"/>

  <text x="600" y="650" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#f1f5f9">누적 매핑률: 97.07%</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>