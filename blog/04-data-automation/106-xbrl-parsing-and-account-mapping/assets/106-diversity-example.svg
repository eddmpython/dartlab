<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="718" rx="8" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9">같은 매출, 다른 이름</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">DART와 EDGAR에서 동일한 매출 항목이 표현되는 다양한 방식</text>

  <!-- Left section label: DART -->
  <text x="220" y="120" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#38bdf8">DART 원본 태그</text>
  <line x1="100" y1="130" x2="340" y2="130" stroke="#38bdf8" stroke-width="0.5" opacity="0.4"/>

  <!-- DART items -->
  <rect x="60" y="150" width="320" height="46" rx="8" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <rect x="60" y="150" width="320" height="46" rx="8" fill="#38bdf8" opacity="0.06"/>
  <text x="220" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#38bdf8">ifrs-full_Revenue</text>

  <rect x="60" y="210" width="320" height="46" rx="8" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <rect x="60" y="210" width="320" height="46" rx="8" fill="#38bdf8" opacity="0.06"/>
  <text x="220" y="238" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#38bdf8">dart_Revenue</text>

  <rect x="60" y="270" width="320" height="46" rx="8" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <rect x="60" y="270" width="320" height="46" rx="8" fill="#38bdf8" opacity="0.06"/>
  <text x="220" y="298" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" fill="#38bdf8">매출액</text>

  <rect x="60" y="330" width="320" height="46" rx="8" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <rect x="60" y="330" width="320" height="46" rx="8" fill="#38bdf8" opacity="0.06"/>
  <text x="220" y="358" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" fill="#38bdf8">수익(매출액)</text>

  <!-- EDGAR section label -->
  <text x="220" y="410" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#fb923c">EDGAR 원본 태그</text>
  <line x1="100" y1="420" x2="340" y2="420" stroke="#fb923c" stroke-width="0.5" opacity="0.4"/>

  <rect x="60" y="438" width="320" height="46" rx="8" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.7"/>
  <rect x="60" y="438" width="320" height="46" rx="8" fill="#fb923c" opacity="0.06"/>
  <text x="220" y="466" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fb923c">RevenueFromContractsWithCustomers</text>

  <rect x="60" y="498" width="320" height="46" rx="8" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.7"/>
  <rect x="60" y="498" width="320" height="46" rx="8" fill="#fb923c" opacity="0.06"/>
  <text x="220" y="526" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#fb923c">Revenues</text>

  <rect x="60" y="558" width="320" height="46" rx="8" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.7"/>
  <rect x="60" y="558" width="320" height="46" rx="8" fill="#fb923c" opacity="0.06"/>
  <text x="220" y="586" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#fb923c">SalesRevenueNet</text>

  <!-- Convergence lines from DART -->
  <line x1="385" y1="173" x2="780" y2="380" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="233" x2="780" y2="380" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="293" x2="780" y2="380" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="353" x2="780" y2="380" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>

  <!-- Convergence lines from EDGAR -->
  <line x1="385" y1="461" x2="780" y2="400" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="521" x2="780" y2="400" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="581" x2="780" y2="400" stroke="#fb923c" stroke-width="1" opacity="0.3"/>

  <!-- Center convergence area -->
  <text x="560" y="310" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#94a3b8" opacity="0.7">7개 표현</text>
  <text x="560" y="330" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#94a3b8" opacity="0.7">하나의 의미</text>

  <!-- Right side: unified result -->
  <rect x="785" y="350" width="350" height="90" rx="16" fill="none" stroke="#34d399" stroke-width="2" opacity="0.9"/>
  <rect x="785" y="350" width="350" height="90" rx="16" fill="#34d399" opacity="0.08"/>
  <text x="960" y="386" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#34d399">revenue</text>
  <text x="960" y="418" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#94a3b8">표준 snakeId</text>

  <!-- Stats section -->
  <rect x="785" y="480" width="165" height="80" rx="10" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <rect x="785" y="480" width="165" height="80" rx="10" fill="#38bdf8" opacity="0.04"/>
  <text x="867" y="510" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#38bdf8">DART 동의어</text>
  <text x="867" y="540" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#f1f5f9">150+</text>

  <rect x="970" y="480" width="165" height="80" rx="10" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.5"/>
  <rect x="970" y="480" width="165" height="80" rx="10" fill="#fb923c" opacity="0.04"/>
  <text x="1052" y="510" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#fb923c">EDGAR 동의어</text>
  <text x="1052" y="540" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#f1f5f9">11,660</text>

  <rect x="785" y="575" width="350" height="60" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <rect x="785" y="575" width="350" height="60" rx="10" fill="#a78bfa" opacity="0.04"/>
  <text x="960" y="600" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#a78bfa">통합 매핑 총계</text>
  <text x="960" y="624" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#f1f5f9">34,249개</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>