<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#34d399" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="718" rx="8" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9">매핑 검증의 3가지 축</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">단일 지표가 아닌 삼각 검증으로 매핑 품질을 보장</text>

  <!-- Triangle lines -->
  <line x1="600" y1="160" x2="260" y2="510" stroke="#34d399" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="160" x2="940" y2="510" stroke="#34d399" stroke-width="1" opacity="0.2"/>
  <line x1="260" y1="510" x2="940" y2="510" stroke="#34d399" stroke-width="1" opacity="0.2"/>

  <!-- Inner triangle fill -->
  <polygon points="600,160 260,510 940,510" fill="#34d399" opacity="0.02"/>

  <!-- Top vertex: 매핑률 -->
  <circle cx="600" cy="155" r="80" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
  <circle cx="600" cy="155" r="80" fill="#34d399" opacity="0.06"/>
  <text x="600" y="145" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="28" font-weight="bold" fill="#34d399" filter="url(#glow-green)">97.07%</text>
  <text x="600" y="172" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#f1f5f9">매핑률</text>

  <!-- Top description box -->
  <rect x="430" y="250" width="340" height="70" rx="10" fill="none" stroke="#1e2433" stroke-width="1"/>
  <rect x="430" y="250" width="340" height="70" rx="10" fill="#34d399" opacity="0.03"/>
  <text x="600" y="275" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">전체 계정 중 표준 snakeId로 매핑된 비율</text>
  <text x="600" y="298" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">34,249개 매핑 / 약 35,300개 고유 계정</text>

  <!-- Bottom-left vertex: BS 항등식 -->
  <circle cx="260" cy="505" r="80" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <circle cx="260" cy="505" r="80" fill="#38bdf8" opacity="0.06"/>
  <text x="260" y="495" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="28" font-weight="bold" fill="#38bdf8">99.7%</text>
  <text x="260" y="522" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#f1f5f9">BS 항등식</text>

  <!-- Bottom-left description box -->
  <rect x="90" y="600" width="340" height="70" rx="10" fill="none" stroke="#1e2433" stroke-width="1"/>
  <rect x="90" y="600" width="340" height="70" rx="10" fill="#38bdf8" opacity="0.03"/>
  <text x="260" y="625" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">자산 = 부채 + 자본 항등식 검증</text>
  <text x="260" y="648" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">매핑 오류 시 BS가 맞지 않음</text>

  <!-- Bottom-right vertex: 핵심 계정 커버리지 -->
  <circle cx="940" cy="505" r="80" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <circle cx="940" cy="505" r="80" fill="#a78bfa" opacity="0.06"/>
  <text x="940" y="495" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="28" font-weight="bold" fill="#a78bfa">98%+</text>
  <text x="940" y="522" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#f1f5f9">핵심 계정</text>

  <!-- Bottom-right description box -->
  <rect x="770" y="600" width="340" height="70" rx="10" fill="none" stroke="#1e2433" stroke-width="1"/>
  <rect x="770" y="600" width="340" height="70" rx="10" fill="#a78bfa" opacity="0.03"/>
  <text x="940" y="625" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">매출, 영업이익, 순이익 등 핵심 50개</text>
  <text x="940" y="648" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">계정의 매핑 성공률</text>

  <!-- Center explanation -->
  <rect x="460" y="400" width="280" height="65" rx="12" fill="none" stroke="#f1f5f9" stroke-width="1" opacity="0.2"/>
  <rect x="460" y="400" width="280" height="65" rx="12" fill="#f1f5f9" opacity="0.03"/>
  <text x="600" y="425" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="bold" fill="#f1f5f9">삼각 검증</text>
  <text x="600" y="448" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">하나만 높아도 신뢰 불가</text>

  <!-- Connecting lines from center to vertices -->
  <line x1="520" y1="432" x2="340" y2="505" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" stroke-dasharray="4"/>
  <line x1="600" y1="400" x2="600" y2="235" stroke="#34d399" stroke-width="0.8" opacity="0.3" stroke-dasharray="4"/>
  <line x1="680" y1="432" x2="860" y2="505" stroke="#a78bfa" stroke-width="0.8" opacity="0.3" stroke-dasharray="4"/>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>