<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="718" rx="8" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9">XBRL 계정 매핑 파이프라인</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">원본 XBRL 태그에서 표준 snakeId까지 5단계 변환 과정</text>

  <!-- Pipeline Steps -->
  <!-- Step 1: 원본 XBRL -->
  <rect x="40" y="130" width="170" height="90" rx="12" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <rect x="40" y="130" width="170" height="90" rx="12" fill="#38bdf8" opacity="0.08"/>
  <text x="125" y="162" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#38bdf8">1단계</text>
  <text x="125" y="185" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#f1f5f9">원본 XBRL</text>
  <text x="125" y="207" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Raw account_id</text>

  <!-- Arrow 1 -->
  <line x1="215" y1="175" x2="250" y2="175" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <polygon points="250,170 260,175 250,180" fill="#38bdf8" opacity="0.6"/>

  <!-- Step 2: Prefix 정규화 -->
  <rect x="265" y="130" width="170" height="90" rx="12" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.9"/>
  <rect x="265" y="130" width="170" height="90" rx="12" fill="#34d399" opacity="0.08"/>
  <text x="350" y="162" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#34d399">2단계</text>
  <text x="350" y="185" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#f1f5f9">Prefix 정규화</text>
  <text x="350" y="207" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">ifrs-full_, dart_ 제거</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="175" x2="475" y2="175" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
  <polygon points="475,170 485,175 475,180" fill="#34d399" opacity="0.6"/>

  <!-- Step 3: ID 동의어 -->
  <rect x="490" y="130" width="170" height="90" rx="12" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <rect x="490" y="130" width="170" height="90" rx="12" fill="#a78bfa" opacity="0.08"/>
  <text x="575" y="162" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa">3단계</text>
  <text x="575" y="185" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#f1f5f9">ID 동의어</text>
  <text x="575" y="207" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">ID_SYNONYMS 70+개</text>

  <!-- Arrow 3 -->
  <line x1="665" y1="175" x2="700" y2="175" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <polygon points="700,170 710,175 700,180" fill="#a78bfa" opacity="0.6"/>

  <!-- Step 4: 계정명 동의어 -->
  <rect x="715" y="130" width="170" height="90" rx="12" fill="none" stroke="#fb923c" stroke-width="1.5" opacity="0.9"/>
  <rect x="715" y="130" width="170" height="90" rx="12" fill="#fb923c" opacity="0.08"/>
  <text x="800" y="162" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#fb923c">4단계</text>
  <text x="800" y="185" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#f1f5f9">계정명 동의어</text>
  <text x="800" y="207" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">NAME_SYNONYMS 150+개</text>

  <!-- Arrow 4 -->
  <line x1="890" y1="175" x2="925" y2="175" stroke="#fb923c" stroke-width="1.5" opacity="0.6"/>
  <polygon points="925,170 935,175 925,180" fill="#fb923c" opacity="0.6"/>

  <!-- Step 5: 학습 매퍼 -->
  <rect x="940" y="130" width="220" height="90" rx="12" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.9"/>
  <rect x="940" y="130" width="220" height="90" rx="12" fill="#f87171" opacity="0.08"/>
  <text x="1050" y="162" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="bold" fill="#f87171">5단계</text>
  <text x="1050" y="185" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#f1f5f9">학습 매퍼 + Fallback</text>
  <text x="1050" y="207" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">34,249개 매핑 + 괄호 제거</text>

  <!-- Result arrow down -->
  <line x1="600" y1="225" x2="600" y2="275" stroke="url(#arrow-grad)" stroke-width="2" opacity="0.5"/>
  <polygon points="594,275 600,285 606,275" fill="#a78bfa" opacity="0.6"/>

  <!-- Result box -->
  <rect x="420" y="290" width="360" height="60" rx="14" fill="none" stroke="#34d399" stroke-width="2" opacity="0.8"/>
  <rect x="420" y="290" width="360" height="60" rx="14" fill="#34d399" opacity="0.06"/>
  <text x="600" y="318" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="16" font-weight="bold" fill="#34d399">표준 snakeId</text>
  <text x="600" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">회사 간 비교 가능한 통일 계정 체계</text>

  <!-- Example flow -->
  <text x="600" y="400" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="16" font-weight="bold" fill="#f1f5f9">변환 예시</text>

  <!-- Example 1 -->
  <rect x="60" y="430" width="300" height="50" rx="8" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
  <rect x="60" y="430" width="300" height="50" rx="8" fill="#38bdf8" opacity="0.05"/>
  <text x="210" y="460" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#38bdf8">ifrs-full_Revenue</text>

  <line x1="365" y1="455" x2="425" y2="455" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
  <polygon points="425,450 435,455 425,460" fill="#34d399" opacity="0.6"/>
  <text x="400" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">prefix</text>

  <rect x="440" y="430" width="200" height="50" rx="8" fill="none" stroke="#34d399" stroke-width="1" opacity="0.6"/>
  <rect x="440" y="430" width="200" height="50" rx="8" fill="#34d399" opacity="0.05"/>
  <text x="540" y="460" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#34d399">Revenue</text>

  <line x1="645" y1="455" x2="705" y2="455" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="705,450 715,455 705,460" fill="#a78bfa" opacity="0.6"/>
  <text x="680" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">매핑</text>

  <rect x="720" y="430" width="200" height="50" rx="8" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <rect x="720" y="430" width="200" height="50" rx="8" fill="#a78bfa" opacity="0.05"/>
  <text x="820" y="460" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#a78bfa">revenue</text>

  <!-- Example 2 -->
  <rect x="60" y="510" width="300" height="50" rx="8" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
  <rect x="60" y="510" width="300" height="50" rx="8" fill="#38bdf8" opacity="0.05"/>
  <text x="210" y="540" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#38bdf8">dart_OperatingIncomeLoss</text>

  <line x1="365" y1="535" x2="425" y2="535" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
  <polygon points="425,530 435,535 425,540" fill="#34d399" opacity="0.6"/>

  <rect x="440" y="510" width="200" height="50" rx="8" fill="none" stroke="#34d399" stroke-width="1" opacity="0.6"/>
  <rect x="440" y="510" width="200" height="50" rx="8" fill="#34d399" opacity="0.05"/>
  <text x="540" y="540" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#34d399">OperatingIncomeLoss</text>

  <line x1="645" y1="535" x2="705" y2="535" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="705,530 715,535 705,540" fill="#a78bfa" opacity="0.6"/>

  <rect x="720" y="510" width="200" height="50" rx="8" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <rect x="720" y="510" width="200" height="50" rx="8" fill="#a78bfa" opacity="0.05"/>
  <text x="820" y="540" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#a78bfa">operating_income</text>

  <!-- Example 3 -->
  <rect x="60" y="590" width="300" height="50" rx="8" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6"/>
  <rect x="60" y="590" width="300" height="50" rx="8" fill="#fb923c" opacity="0.05"/>
  <text x="210" y="620" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" fill="#fb923c">수익(매출액)</text>

  <line x1="365" y1="615" x2="425" y2="615" stroke="#fb923c" stroke-width="1.5" opacity="0.5"/>
  <polygon points="425,610 435,615 425,620" fill="#fb923c" opacity="0.6"/>
  <text x="400" y="605" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">한글 동의어</text>

  <rect x="440" y="590" width="200" height="50" rx="8" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6"/>
  <rect x="440" y="590" width="200" height="50" rx="8" fill="#fb923c" opacity="0.05"/>
  <text x="540" y="620" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" fill="#fb923c">매출액</text>

  <line x1="645" y1="615" x2="705" y2="615" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="705,610 715,615 705,620" fill="#a78bfa" opacity="0.6"/>

  <rect x="720" y="590" width="200" height="50" rx="8" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <rect x="720" y="590" width="200" height="50" rx="8" fill="#a78bfa" opacity="0.05"/>
  <text x="820" y="620" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#a78bfa">revenue</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>