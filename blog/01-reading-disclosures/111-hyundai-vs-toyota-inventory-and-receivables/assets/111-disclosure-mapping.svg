<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fb923c" fill-opacity="0.7"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#fb923c" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)" rx="12"/>
  <rect x="1" y="1" width="1198" height="718" fill="none" stroke="#1e2433" rx="12"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">공시 위치 매핑</text>
  <text x="600" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#64748b">DART vs EDGAR Disclosure Location Mapping</text>

  <!-- ========== LEFT: DART ========== -->
  <rect x="60" y="105" width="420" height="45" rx="8" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.4"/>
  <text x="270" y="133" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="16" font-weight="700" fill="#a78bfa">DART 사업보고서</text>

  <!-- DART sections -->
  <rect x="70" y="170" width="400" height="42" rx="6" fill="#1e2433" fill-opacity="0.5" stroke="#38bdf8" stroke-opacity="0.3"/>
  <text x="90" y="196" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">III. 재무에 관한 사항</text>

  <rect x="90" y="225" width="370" height="36" rx="5" fill="#1e2433" fill-opacity="0.4" stroke="#1e2433"/>
  <text x="110" y="248" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">1. 요약 재무정보</text>
  <text x="420" y="248" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">financialSummary</text>

  <rect x="90" y="268" width="370" height="36" rx="5" fill="#1e2433" fill-opacity="0.4" stroke="#1e2433"/>
  <text x="110" y="291" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">2. 연결재무제표</text>
  <text x="420" y="291" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">consolidatedFS</text>

  <rect x="70" y="320" width="400" height="42" rx="6" fill="#1e2433" fill-opacity="0.5" stroke="#34d399" stroke-opacity="0.3"/>
  <text x="90" y="346" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#34d399">주석 (Notes to FS)</text>

  <rect x="90" y="372" width="370" height="36" rx="5" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="110" y="395" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">재고자산</text>
  <text x="420" y="395" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">inventory</text>

  <rect x="90" y="415" width="370" height="36" rx="5" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="110" y="438" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">매출채권 및 기타채권</text>
  <text x="420" y="438" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">tradeReceivables</text>

  <rect x="90" y="458" width="370" height="36" rx="5" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="110" y="481" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">금융자산(할부/리스채권)</text>
  <text x="420" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">financeReceivables</text>

  <rect x="90" y="501" width="370" height="36" rx="5" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="110" y="524" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">대손충당금</text>
  <text x="420" y="524" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">allowanceForDoubtful</text>

  <!-- ========== RIGHT: EDGAR ========== -->
  <rect x="720" y="105" width="420" height="45" rx="8" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.4"/>
  <text x="930" y="133" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#38bdf8">EDGAR 10-K</text>

  <!-- EDGAR sections -->
  <rect x="730" y="170" width="400" height="42" rx="6" fill="#1e2433" fill-opacity="0.5" stroke="#38bdf8" stroke-opacity="0.3"/>
  <text x="750" y="196" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">Part II - Financial Statements</text>

  <rect x="750" y="225" width="370" height="36" rx="5" fill="#1e2433" fill-opacity="0.4" stroke="#1e2433"/>
  <text x="770" y="248" font-family="Inter, sans-serif" font-size="12" fill="#f1f5f9">Item 8. Financial Statements</text>
  <text x="1080" y="248" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">financialStatements</text>

  <rect x="730" y="320" width="400" height="42" rx="6" fill="#1e2433" fill-opacity="0.5" stroke="#34d399" stroke-opacity="0.3"/>
  <text x="750" y="346" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#34d399">Notes to Financial Statements</text>

  <rect x="750" y="372" width="370" height="36" rx="5" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="770" y="395" font-family="Inter, sans-serif" font-size="12" fill="#f1f5f9">Inventories</text>
  <text x="1080" y="395" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">inventory</text>

  <rect x="750" y="415" width="370" height="36" rx="5" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="770" y="438" font-family="Inter, sans-serif" font-size="12" fill="#f1f5f9">Trade Accounts Receivable</text>
  <text x="1080" y="438" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">tradeReceivables</text>

  <rect x="750" y="458" width="370" height="36" rx="5" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="770" y="481" font-family="Inter, sans-serif" font-size="12" fill="#f1f5f9">Finance Receivables (TFS)</text>
  <text x="1080" y="481" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">financeReceivables</text>

  <rect x="750" y="501" width="370" height="36" rx="5" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="770" y="524" font-family="Inter, sans-serif" font-size="12" fill="#f1f5f9">Allowance for Credit Losses</text>
  <text x="1080" y="524" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">allowanceForDoubtful</text>

  <!-- Connecting arrows -->
  <line x1="460" y1="390" x2="750" y2="390" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrowRight)" marker-start="url(#arrowLeft)"/>
  <line x1="460" y1="433" x2="750" y2="433" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrowRight)" marker-start="url(#arrowLeft)"/>
  <line x1="460" y1="476" x2="750" y2="476" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrowRight)" marker-start="url(#arrowLeft)"/>
  <line x1="460" y1="519" x2="750" y2="519" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrowRight)" marker-start="url(#arrowLeft)"/>

  <!-- Center label -->
  <rect x="545" y="420" width="110" height="28" rx="14" fill="#fb923c" fill-opacity="0.15" stroke="#fb923c" stroke-opacity="0.4"/>
  <text x="600" y="439" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#fb923c">1:1 Mapping</text>

  <!-- Bottom note -->
  <rect x="100" y="565" width="1000" height="65" rx="8" fill="#a78bfa" fill-opacity="0.05" stroke="#a78bfa" stroke-opacity="0.15"/>
  <text x="600" y="590" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#94a3b8">DartLab은 DART/EDGAR의 주석 데이터를 동일한 topic으로 매핑하여</text>
  <text x="600" y="610" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#94a3b8">한국 기업과 미국 기업의 재고/매출채권을 동일한 인터페이스로 비교할 수 있다.</text>

  <!-- Footer -->
  <text x="600" y="690" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#64748b">DartLab 전자공시 분석</text>
</svg>