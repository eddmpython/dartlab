  <defs><linearGradient id="bg8a" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient></defs>
  <rect width="800" height="430" rx="12" fill="url(#bg8a)"/><rect x="0.5" y="0.5" width="799" height="429" rx="12" stroke="#1e2433"/>
