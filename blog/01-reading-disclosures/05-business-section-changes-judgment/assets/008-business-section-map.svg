  <rect x="284" y="86" width="232" height="110" rx="8" fill="rgba(251,146,60,0.05)" stroke="rgba(251,146,60,0.2)"/>
  <text x="300" y="110" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#fdba74">Competition &amp; Pricing</text>
