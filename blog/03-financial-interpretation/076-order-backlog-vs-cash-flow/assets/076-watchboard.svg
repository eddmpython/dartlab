<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">076 Watchboard</title>
  <desc id="desc">Five checks after a backlog headline</desc>
  <rect width="1280" height="720" fill="#0f1c31"/>
  <text x="84" y="82" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">076 Watchboard</text>
  <text x="84" y="118" font-size="20" font-family="Arial, sans-serif" fill="#ced8e5">Five checks after a backlog headline</text>
  <rect x="90" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="118" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">1. Margin next?</text><text x="118" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">If margin fades, the</text><text x="118" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">backlog was bought cheap.</text>
  <rect x="470" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="498" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">2. Contract assets?</text><text x="498" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Recognized work without</text><text x="498" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">cash is a warning.</text>
  <rect x="850" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="878" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">3. Inventory load?</text><text x="878" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Backlog can eat cash</text><text x="878" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">before shipment happens.</text>
  <rect x="280" y="386" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="308" y="434" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">4. CFO catch-up?</text><text x="308" y="468" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Healthy backlog should</text><text x="308" y="496" font-size="20" font-family="Arial, sans-serif" fill="#36506b">show up in operating cash.</text>
  <rect x="660" y="386" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="688" y="434" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">5. Funding patch?</text><text x="688" y="468" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Factoring or SCF may</text><text x="688" y="496" font-size="20" font-family="Arial, sans-serif" fill="#36506b">be hiding the gap.</text>
</svg>
