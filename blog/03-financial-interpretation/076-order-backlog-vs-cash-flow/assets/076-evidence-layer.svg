<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">076 Evidence Layer</title>
  <desc id="desc">Use five layers before trusting backlog growth</desc>
  <rect width="1280" height="720" fill="#10213a"/>
  <text x="84" y="82" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">076 Evidence Layer</text>
  <text x="84" y="120" font-size="20" font-family="Arial, sans-serif" fill="#cdd9e7">Use five layers before trusting backlog growth</text>
  <rect x="88" y="152" width="1104" height="520" rx="28" fill="#0d1c30" opacity="0.7" stroke="#5dade2" stroke-width="2"/>
  <rect x="112" y="176" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="190" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="221" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Backlog</text><text x="318" y="221" font-size="24" font-family="Arial, sans-serif" fill="#19324d">Definition, quality, cancel risk, and timing</text>
  <rect x="112" y="278" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="292" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="323" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Margin</text><text x="318" y="323" font-size="24" font-family="Arial, sans-serif" fill="#19324d">Low-price bids often arrive before cash stress</text>
  <rect x="112" y="380" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="394" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="425" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Assets</text><text x="318" y="425" font-size="24" font-family="Arial, sans-serif" fill="#19324d">Contract assets, inventory, receivables buildup</text>
  <rect x="112" y="482" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="496" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="527" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Cash</text><text x="318" y="527" font-size="24" font-family="Arial, sans-serif" fill="#19324d">CFO tells you whether backlog becomes money</text>
  <rect x="112" y="584" width="1056" height="76" rx="18" fill="#ffffff" opacity="0.96"/>
  <rect x="128" y="598" width="160" height="48" rx="14" fill="#173558"/><text x="208" y="629" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">Repeat</text><text x="318" y="629" font-size="24" font-family="Arial, sans-serif" fill="#19324d">A repeated gap is usually structural</text>
</svg>
