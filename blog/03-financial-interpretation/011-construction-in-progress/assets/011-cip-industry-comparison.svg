<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg011e" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg011e)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">산업별 건설중인자산 해석 비교</text>
  <text x="600" y="80" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" fill="#64748b">같은 숫자도 산업의 투자 리듬에 따라 전혀 다른 의미를 갖는다</text>

  <!-- Column Headers -->
  <text x="200" y="128" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">산업군</text>
  <text x="520" y="128" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">핵심 관찰 포인트</text>
  <text x="900" y="128" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">건설중인자산 해석</text>
  <line x1="60" y1="142" x2="1140" y2="142" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 1: 반도체·배터리 (보라) -->
  <rect x="60" y="160" width="1080" height="110" rx="10" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.15)"/>
  <circle cx="90" cy="215" r="16" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="90" y="220" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" fill="#a78bfa">1</text>
  <text x="130" y="195" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#a78bfa">반도체 · 배터리 · 소재</text>
  <text x="130" y="220" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">대규모 장치산업</text>
  <text x="130" y="240" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">투자 사이클 3~5년</text>
  <text x="400" y="195" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">대규모 공정 투자, 장비 반입 규모</text>
  <text x="400" y="218" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">완공 지연과 수요 사이클 민감도</text>
  <text x="400" y="241" font-family="JetBrains Mono,monospace" font-size="11" fill="#a78bfa">장기간 대규모 축적 = 정상</text>
  <text x="740" y="195" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">CIP가 수조 원 쌓여도 정상일 수 있음</text>
  <text x="740" y="218" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">수요 사이클 꼭지에서 집중 투자 시</text>
  <text x="740" y="241" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#f87171">→ 과잉설비 위험 가장 큼</text>

  <!-- Row 2: 자동차부품·기계 (파랑) -->
  <rect x="60" y="284" width="1080" height="110" rx="10" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.15)"/>
  <circle cx="90" cy="339" r="16" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="90" y="344" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" fill="#38bdf8">2</text>
  <text x="130" y="319" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#38bdf8">자동차부품 · 기계</text>
  <text x="130" y="344" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">고객 수주 연동형</text>
  <text x="130" y="364" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">투자 사이클 1~3년</text>
  <text x="400" y="319" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">고객사 수주와 연동된 증설 여부</text>
  <text x="400" y="342" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">고객 의존도와 라인 전환 가능성</text>
  <text x="400" y="365" font-family="JetBrains Mono,monospace" font-size="11" fill="#38bdf8">수주 연동 = 합리적 투자</text>
  <text x="740" y="319" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">특정 고객 전용 라인이면 전환 리스크</text>
  <text x="740" y="342" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">수주 없이 선행 투자 시</text>
  <text x="740" y="365" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#fb923c">→ 고객 이탈 시 유휴설비화</text>

  <!-- Row 3: 식품·소비재 (초록) -->
  <rect x="60" y="408" width="1080" height="110" rx="10" fill="rgba(52,211,153,0.04)" stroke="rgba(52,211,153,0.15)"/>
  <circle cx="90" cy="463" r="16" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="468" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" fill="#34d399">3</text>
  <text x="130" y="443" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#34d399">식품 · 소비재 제조</text>
  <text x="130" y="468" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">안정 수요형</text>
  <text x="130" y="488" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">투자 사이클 1~2년</text>
  <text x="400" y="443" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">생산라인 증설과 물류 인프라 확대</text>
  <text x="400" y="466" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">수요 탄력성보다 운영 효율이 관건</text>
  <text x="400" y="489" font-family="JetBrains Mono,monospace" font-size="11" fill="#34d399">짧은 사이클 = 빠른 전환</text>
  <text x="740" y="443" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">CIP 장기 정체 시 지연 신호 가능성 높음</text>
  <text x="740" y="466" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">투자 사이클이 짧아</text>
  <text x="740" y="489" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#34d399">→ 정체 = 문제 신호일 확률 높음</text>

  <!-- Row 4: 자산 경량 산업 (주황) -->
  <rect x="60" y="532" width="1080" height="110" rx="10" fill="rgba(251,146,60,0.04)" stroke="rgba(251,146,60,0.15)"/>
  <circle cx="90" cy="587" r="16" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="90" y="592" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" fill="#fb923c">4</text>
  <text x="130" y="567" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#fb923c">자산 경량 산업</text>
  <text x="130" y="592" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">IT · 서비스 · 플랫폼</text>
  <text x="130" y="612" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">설비 비중 낮음</text>
  <text x="400" y="567" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">CIP 자체보다 무형자산·인건비가 핵심</text>
  <text x="400" y="590" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">같은 프레임을 적용하면 오판 가능</text>
  <text x="400" y="613" font-family="JetBrains Mono,monospace" font-size="11" fill="#fb923c">CIP 중요도 낮음</text>
  <text x="740" y="567" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">CIP가 갑자기 급증하면 사업 모델 전환</text>
  <text x="740" y="590" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#cbd5e1">또는 데이터센터 등 인프라 투자 가능성</text>
  <text x="740" y="613" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#fb923c">→ 맥락 확인 필수</text>

  <!-- Footer -->
  <text x="600" y="694" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>