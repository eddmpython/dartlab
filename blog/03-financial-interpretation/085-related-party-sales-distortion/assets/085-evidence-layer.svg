<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">085 Evidence Layer</title>
  <desc id="desc">Use related-party notes, receivables, and external sales together</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f3b63"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="72" y="80" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">085 Evidence Layer</text>
  <text x="72" y="116" font-size="20" font-family="Arial, sans-serif" fill="#cdd9e7">Use related-party notes, receivables, and external sales together</text>
  <rect x="92" y="180" width="200" height="430" rx="28" fill="#ffffff" opacity="0.96"/>
  <text x="116" y="230" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#10233a">Layer 1</text>
  <text x="116" y="276" font-size="22" font-family="Arial, sans-serif" fill="#35506a">Sales mix</text>
  <text x="116" y="318" font-size="18" font-family="Arial, sans-serif" fill="#55708b">What was first</text>
  <text x="116" y="344" font-size="18" font-family="Arial, sans-serif" fill="#55708b">disclosed?</text>
  <rect x="324" y="180" width="200" height="430" rx="28" fill="#ffffff" opacity="0.96"/>
  <text x="348" y="230" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#10233a">Layer 2</text>
  <text x="348" y="276" font-size="22" font-family="Arial, sans-serif" fill="#35506a">Counterparty note</text>
  <text x="348" y="318" font-size="18" font-family="Arial, sans-serif" fill="#55708b">What detail or</text>
  <text x="348" y="344" font-size="18" font-family="Arial, sans-serif" fill="#55708b">timing changed?</text>
  <rect x="556" y="180" width="200" height="430" rx="28" fill="#ffffff" opacity="0.96"/>
  <text x="580" y="230" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#10233a">Layer 3</text>
  <text x="580" y="276" font-size="22" font-family="Arial, sans-serif" fill="#35506a">Pricing terms</text>
  <text x="580" y="318" font-size="18" font-family="Arial, sans-serif" fill="#55708b">Which note or</text>
  <text x="580" y="344" font-size="18" font-family="Arial, sans-serif" fill="#55708b">number confirms it?</text>
  <rect x="788" y="180" width="200" height="430" rx="28" fill="#ffffff" opacity="0.96"/>
  <text x="812" y="230" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#10233a">Layer 4</text>
  <text x="812" y="276" font-size="22" font-family="Arial, sans-serif" fill="#35506a">Receivable trend</text>
  <text x="812" y="318" font-size="18" font-family="Arial, sans-serif" fill="#55708b">Does audit or</text>
  <text x="812" y="344" font-size="18" font-family="Arial, sans-serif" fill="#55708b">governance react?</text>
  <rect x="1020" y="180" width="168" height="430" rx="28" fill="#ffffff" opacity="0.96"/>
  <text x="1044" y="230" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#10233a">Layer 5</text>
  <text x="1044" y="276" font-size="22" font-family="Arial, sans-serif" fill="#35506a">Next period mix</text>
  <text x="1044" y="318" font-size="18" font-family="Arial, sans-serif" fill="#55708b">What repeats</text>
  <text x="1044" y="344" font-size="18" font-family="Arial, sans-serif" fill="#55708b">next period?</text>
  <text x="72" y="660" font-size="22" font-family="Arial, sans-serif" fill="#d8e3f1">Use all five layers before trusting the headline.</text>
</svg>
