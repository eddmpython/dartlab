<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">재고 평가손실 경고 신호</title>
  <desc id="desc">재고 평가손실이 커지기 전에 나타나는 네 가지 경고 신호를 정리한 카드</desc>
  <rect width="1200" height="720" fill="#fcf1f1"/>
  <rect x="120" y="90" width="960" height="540" rx="30" fill="#fffaf9" stroke="#c96c6c" stroke-width="4"/>
  <text x="600" y="155" font-size="36" font-family="Arial, sans-serif" text-anchor="middle" fill="#a04343" font-weight="700">평가손실 전 경고 신호</text>
  <text x="220" y="255" font-size="26" font-family="Arial, sans-serif" fill="#7d4c4c">1. 재고가 여러 분기 누적된다</text>
  <text x="220" y="335" font-size="26" font-family="Arial, sans-serif" fill="#7d4c4c">2. 회전율이 연속해서 둔화된다</text>
  <text x="220" y="415" font-size="26" font-family="Arial, sans-serif" fill="#7d4c4c">3. 매출총이익률이 함께 약해진다</text>
  <text x="220" y="495" font-size="26" font-family="Arial, sans-serif" fill="#7d4c4c">4. 늦게 큰 손실이 한 번에 반영된다</text>
  <circle cx="180" cy="245" r="16" fill="#c96c6c"/>
  <circle cx="180" cy="325" r="16" fill="#c96c6c"/>
  <circle cx="180" cy="405" r="16" fill="#c96c6c"/>
  <circle cx="180" cy="485" r="16" fill="#c96c6c"/>
  <text x="600" y="585" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#8b4f4f">문제는 손실 자체보다 얼마나 늦게, 얼마나 크게 반영되느냐다</text>
</svg>
