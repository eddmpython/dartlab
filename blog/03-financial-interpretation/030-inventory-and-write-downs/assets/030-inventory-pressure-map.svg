<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <defs><linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient></defs>
  <title id="title">재고 압력 구조도</title>
  <desc id="desc">재고 증가가 좋은 경우와 위험한 경우로 갈라지는 흐름을 보여주는 구조도</desc>
  <rect width="1200" height="720" fill="#050811"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>
  <rect x="420" y="70" width="360" height="110" rx="26" fill="rgba(217,119,6,0.15)" stroke="#c78d39" stroke-width="4"/>
  <text x="600" y="118" font-size="34" font-family="Arial, sans-serif" text-anchor="middle" fill="#fbbf24" font-weight="700">재고 증가</text>
  <text x="600" y="155" font-size="22" font-family="Arial, sans-serif" text-anchor="middle" fill="#fcd34d">좋은 준비일 수도, 위험 신호일 수도 있다</text>
  <rect x="100" y="270" width="430" height="320" rx="28" fill="rgba(22,163,74,0.12)" stroke="#4d8f63" stroke-width="4"/>
  <rect x="670" y="270" width="430" height="320" rx="28" fill="rgba(220,38,38,0.1)" stroke="#c6645e" stroke-width="4"/>
  <text x="315" y="335" font-size="34" font-family="Arial, sans-serif" text-anchor="middle" fill="#86efac" font-weight="700">건강한 증가</text>
  <text x="885" y="335" font-size="34" font-family="Arial, sans-serif" text-anchor="middle" fill="#fca5a5" font-weight="700">위험한 누적</text>
  <text x="150" y="400" font-size="24" font-family="Arial, sans-serif" fill="#86efac">• 계절성 수요 준비</text>
  <text x="150" y="445" font-size="24" font-family="Arial, sans-serif" fill="#86efac">• 신규 제품 출시 전</text>
  <text x="150" y="490" font-size="24" font-family="Arial, sans-serif" fill="#86efac">• 회전율 방어</text>
  <text x="150" y="535" font-size="24" font-family="Arial, sans-serif" fill="#86efac">• 마진 유지</text>
  <text x="720" y="400" font-size="24" font-family="Arial, sans-serif" fill="#fca5a5">• 매출보다 더 빠른 증가</text>
  <text x="720" y="445" font-size="24" font-family="Arial, sans-serif" fill="#fca5a5">• 회전율 둔화</text>
  <text x="720" y="490" font-size="24" font-family="Arial, sans-serif" fill="#fca5a5">• 할인 판매와 마진 하락</text>
  <text x="720" y="535" font-size="24" font-family="Arial, sans-serif" fill="#fca5a5">• 평가손실 가능성</text>
  <path d="M600 180 V235" stroke="#b37a2e" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M600 235 L315 270" stroke="#4d8f63" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M600 235 L885 270" stroke="#c6645e" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
