<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
<rect width="800" height="500" fill="#f3f4f6" rx="12"/>
<text x="400" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">출자전환: 실질 회수인가 손실 위장인가</text>

<!-- Root question -->
<rect x="250" y="50" width="300" height="50" rx="12" fill="#2563eb" stroke="#2563eb" stroke-width="2"/>
<text x="400" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">관계사 채권을 출자전환했다</text>

<!-- Q1 -->
<line x1="400" y1="100" x2="400" y2="125" stroke="#6b7280" stroke-width="1.5"/>
<rect x="220" y="125" width="360" height="40" rx="10" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
<text x="400" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#d97706">전환 전 충당금을 충분히 쌓았는가?</text>

<!-- Q1 Yes -->
<line x1="310" y1="165" x2="200" y2="195" stroke="#059669" stroke-width="1.5"/>
<text x="240" y="183" font-size="11" font-weight="600" fill="#059669">예</text>
<rect x="80" y="195" width="240" height="40" rx="10" fill="#fff" stroke="#059669" stroke-width="1.5"/>
<text x="200" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">전환 비율이 공정가치 기반인가?</text>

<!-- Q1 No -->
<line x1="490" y1="165" x2="600" y2="195" stroke="#dc2626" stroke-width="1.5"/>
<text x="560" y="183" font-size="11" font-weight="600" fill="#dc2626">아니오</text>
<rect x="500" y="195" width="240" height="48" rx="10" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="1.5"/>
<text x="620" y="216" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">손실 인식 우회 가능성</text>
<text x="620" y="234" text-anchor="middle" font-size="11" fill="#6b7280">충당금 없이 형태만 바꾼 것</text>

<!-- Q2 Yes -->
<line x1="140" y1="235" x2="100" y2="265" stroke="#059669" stroke-width="1.5"/>
<text x="108" y="253" font-size="11" font-weight="600" fill="#059669">예</text>
<rect x="20" y="265" width="200" height="40" rx="10" fill="#fff" stroke="#059669" stroke-width="1.5"/>
<text x="120" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">관계사 재무가 안정적인가?</text>

<!-- Q2 No -->
<line x1="260" y1="235" x2="320" y2="265" stroke="#dc2626" stroke-width="1.5"/>
<text x="300" y="253" font-size="11" font-weight="600" fill="#dc2626">아니오</text>
<rect x="250" y="265" width="200" height="48" rx="10" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="1.5"/>
<text x="350" y="286" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">전환가 과대 가능성</text>
<text x="350" y="304" text-anchor="middle" font-size="11" fill="#6b7280">후속 손상 위험 높음</text>

<!-- Q3 Yes -->
<line x1="70" y1="305" x2="50" y2="340" stroke="#059669" stroke-width="1.5"/>
<text x="48" y="326" font-size="11" font-weight="600" fill="#059669">예</text>
<rect x="10" y="340" width="130" height="55" rx="10" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="1.5"/>
<text x="75" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">실질 전환</text>
<text x="75" y="382" text-anchor="middle" font-size="11" fill="#059669">상대적으로 양호</text>

<!-- Q3 No -->
<line x1="170" y1="305" x2="210" y2="340" stroke="#dc2626" stroke-width="1.5"/>
<text x="200" y="326" font-size="11" font-weight="600" fill="#dc2626">아니오</text>
<rect x="160" y="340" width="160" height="55" rx="10" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="1.5"/>
<text x="240" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">손실 이연 구조</text>
<text x="240" y="382" text-anchor="middle" font-size="11" fill="#dc2626">추가 손상 예상</text>

<!-- Summary boxes -->
<rect x="420" y="280" width="350" height="85" rx="12" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
<text x="595" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">판단 핵심 3가지</text>
<text x="440" y="325" font-size="12" fill="#6b7280">1. 전환 전 충당금 → 손실 인식 성실성</text>
<text x="440" y="345" font-size="12" fill="#6b7280">2. 전환 비율 → 공정가치 반영 여부</text>
<text x="440" y="365" font-size="12" fill="#6b7280">3. 관계사 재무 → 후속 손상 확률</text>

<!-- Bottom -->
<rect x="100" y="410" width="600" height="65" rx="12" fill="#d97706" fill-opacity="0.08" stroke="#d97706" stroke-width="1.5"/>
<text x="400" y="435" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">3개 중 2개 이상 부정적이면</text>
<text x="400" y="458" text-anchor="middle" font-size="13" fill="#6b7280">출자전환은 회수가 아니라 손실 정리로 읽는 것이 안전하다</text>
</svg>