<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
<rect width="800" height="500" fill="#f3f4f6" rx="12"/>
<text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">출자전환 전후 장부가 vs 공정가치</text>

<!-- Before conversion -->
<text x="200" y="75" text-anchor="middle" font-size="16" font-weight="700" fill="#6b7280">전환 전 (채권 상태)</text>
<rect x="80" y="90" width="100" height="280" rx="8" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
<text x="130" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">장부가</text>
<text x="130" y="135" text-anchor="middle" font-size="22" font-weight="700" fill="#2563eb">100억</text>
<text x="130" y="158" text-anchor="middle" font-size="11" fill="#6b7280">관계사 대여금</text>
<text x="130" y="175" text-anchor="middle" font-size="11" fill="#6b7280">충당금 미반영</text>

<rect x="220" y="190" width="100" height="180" rx="8" fill="#dc2626" fill-opacity="0.12" stroke="#dc2626" stroke-width="1.5"/>
<text x="270" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">공정가치</text>
<text x="270" y="235" text-anchor="middle" font-size="22" font-weight="700" fill="#dc2626">60억</text>
<text x="270" y="258" text-anchor="middle" font-size="11" fill="#6b7280">관계사 재무상태</text>
<text x="270" y="275" text-anchor="middle" font-size="11" fill="#6b7280">악화 반영 시</text>

<!-- Gap indicator before -->
<line x1="182" y1="130" x2="218" y2="220" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3"/>
<text x="215" y="170" font-size="13" font-weight="700" fill="#d97706">Gap 40억</text>
<text x="215" y="185" font-size="11" fill="#d97706">숨겨진 손실</text>

<!-- Arrow -->
<line x1="340" y1="250" x2="410" y2="250" stroke="#6b7280" stroke-width="2" marker-end="url(#arw2)"/>
<text x="375" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#6b7280">전환</text>

<!-- After conversion -->
<text x="600" y="75" text-anchor="middle" font-size="16" font-weight="700" fill="#6b7280">전환 후 (지분 상태)</text>
<rect x="480" y="90" width="100" height="280" rx="8" fill="#059669" fill-opacity="0.12" stroke="#059669" stroke-width="1.5"/>
<text x="530" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">장부가</text>
<text x="530" y="135" text-anchor="middle" font-size="22" font-weight="700" fill="#059669">100억</text>
<text x="530" y="158" text-anchor="middle" font-size="11" fill="#6b7280">투자주식으로</text>
<text x="530" y="175" text-anchor="middle" font-size="11" fill="#6b7280">그대로 이관</text>

<rect x="620" y="190" width="100" height="180" rx="8" fill="#dc2626" fill-opacity="0.12" stroke="#dc2626" stroke-width="1.5"/>
<text x="670" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">공정가치</text>
<text x="670" y="235" text-anchor="middle" font-size="22" font-weight="700" fill="#dc2626">50억</text>
<text x="670" y="258" text-anchor="middle" font-size="11" fill="#6b7280">관계사 순자산</text>
<text x="670" y="275" text-anchor="middle" font-size="11" fill="#6b7280">지분율 반영</text>

<!-- Gap indicator after -->
<line x1="582" y1="130" x2="618" y2="220" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
<text x="615" y="170" font-size="13" font-weight="700" fill="#dc2626">Gap 50억</text>
<text x="615" y="185" font-size="11" fill="#dc2626">Gap 확대</text>

<!-- Bottom note -->
<rect x="80" y="400" width="640" height="75" rx="12" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
<text x="400" y="425" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">전환 후 Gap이 오히려 커질 수 있다</text>
<text x="400" y="447" text-anchor="middle" font-size="12" fill="#6b7280">채권일 때는 부분 회수 가능성이라도 있었지만</text>
<text x="400" y="465" text-anchor="middle" font-size="12" fill="#6b7280">지분이 되면 관계사 전체 재무상태에 종속된다</text>

<defs>
  <marker id="arw2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
  </marker>
</defs>
</svg>