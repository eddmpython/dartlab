<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgDark)" rx="12"/>
  <rect x="0.5" y="0.5" width="799" height="499" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="bold" fill="#2563eb">진행률 vs 청구율 — 괴리가 벌어지는 과정</text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="720" y2="420" stroke="#6b7280" stroke-width="2"/>
  <line x1="100" y1="420" x2="100" y2="80" stroke="#6b7280" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="90" y="420" text-anchor="end" font-size="12" fill="#94a3b8">0%</text>
  <text x="90" y="335" text-anchor="end" font-size="12" fill="#94a3b8">25%</text>
  <text x="90" y="250" text-anchor="end" font-size="12" fill="#94a3b8">50%</text>
  <text x="90" y="165" text-anchor="end" font-size="12" fill="#94a3b8">75%</text>
  <text x="90" y="80" text-anchor="end" font-size="12" fill="#94a3b8">100%</text>

  <!-- X-axis labels -->
  <text x="162" y="445" text-anchor="middle" font-size="12" fill="#94a3b8">1Q</text>
  <text x="286" y="445" text-anchor="middle" font-size="12" fill="#94a3b8">2Q</text>
  <text x="410" y="445" text-anchor="middle" font-size="12" fill="#94a3b8">3Q</text>
  <text x="534" y="445" text-anchor="middle" font-size="12" fill="#94a3b8">4Q</text>
  <text x="658" y="445" text-anchor="middle" font-size="12" fill="#94a3b8">5Q</text>

  <!-- Grid lines -->
  <line x1="100" y1="335" x2="720" y2="335" stroke="#1e2433" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="250" x2="720" y2="250" stroke="#1e2433" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="165" x2="720" y2="165" stroke="#1e2433" stroke-width="1" stroke-dasharray="4"/>

  <!-- Progress rate line (blue, rising steadily) -->
  <polyline points="162,386 286,318 410,230 534,150 658,105" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="162" cy="386" r="5" fill="#2563eb"/>
  <circle cx="286" cy="318" r="5" fill="#2563eb"/>
  <circle cx="410" cy="230" r="5" fill="#2563eb"/>
  <circle cx="534" cy="150" r="5" fill="#2563eb"/>
  <circle cx="658" cy="105" r="5" fill="#2563eb"/>

  <!-- Billing ratio line (green, slowing) -->
  <polyline points="162,392 286,335 410,280 534,235 658,218" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="162" cy="392" r="5" fill="#059669"/>
  <circle cx="286" cy="335" r="5" fill="#059669"/>
  <circle cx="410" cy="280" r="5" fill="#059669"/>
  <circle cx="534" cy="235" r="5" fill="#059669"/>
  <circle cx="658" cy="218" r="5" fill="#059669"/>

  <!-- Gap area -->
  <polygon points="410,230 534,150 658,105 658,218 534,235 410,280" fill="#dc2626" opacity="0.1"/>

  <!-- Gap annotations -->
  <line x1="534" y1="150" x2="534" y2="235" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="548" y="195" font-size="13" font-weight="bold" fill="#dc2626">괴리</text>
  <line x1="658" y1="105" x2="658" y2="218" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="672" y="165" font-size="13" font-weight="bold" fill="#dc2626">확대</text>

  <!-- Legend -->
  <rect x="180" y="62" width="16" height="4" rx="2" fill="#2563eb"/>
  <text x="202" y="68" font-size="13" fill="#2563eb" font-weight="600">진행률</text>
  <rect x="280" y="62" width="16" height="4" rx="2" fill="#059669"/>
  <text x="302" y="68" font-size="13" fill="#059669" font-weight="600">청구율</text>
  <rect x="380" y="56" width="30" height="16" rx="3" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1"/>
  <text x="416" y="68" font-size="13" fill="#dc2626" font-weight="600">미청구 간극</text>

  <!-- Annotation -->
  <text x="400" y="478" text-anchor="middle" font-size="12" fill="#94a3b8">시간이 지날수록 인식과 청구 사이의 간극이 벌어진다</text>
</svg>