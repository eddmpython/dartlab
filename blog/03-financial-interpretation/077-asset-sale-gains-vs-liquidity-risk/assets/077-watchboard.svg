<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">077 Watchboard</title>
  <desc id="desc">Five follow-up checks after an asset sale headline</desc>
  <rect width="1280" height="720" fill="#0f1c31"/>
  <text x="84" y="82" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">077 Watchboard</text>
  <text x="84" y="118" font-size="20" font-family="Arial, sans-serif" fill="#ced8e5">Five follow-up checks after an asset sale headline</text>
  <rect x="90" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="118" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">1. What was sold?</text><text x="118" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Core assets carry a</text><text x="118" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">much heavier meaning.</text>
  <rect x="470" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="498" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">2. Cash use?</text><text x="498" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">If cash goes right to</text><text x="498" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">debt, relief is shallow.</text>
  <rect x="850" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="878" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">3. Gain fade?</text><text x="878" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Next quarter the gain</text><text x="878" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">is gone but debt stays.</text>
  <rect x="280" y="386" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="308" y="434" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">4. Leaseback next?</text><text x="308" y="468" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Selling then leasing</text><text x="308" y="496" font-size="20" font-family="Arial, sans-serif" fill="#36506b">can move burden, not fix it.</text>
  <rect x="660" y="386" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="688" y="434" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">5. Repeat sale?</text><text x="688" y="468" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Repeated disposals are</text><text x="688" y="496" font-size="20" font-family="Arial, sans-serif" fill="#36506b">a liquidity tell.</text>
</svg>
