<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" fill="none">
  <defs>
    <linearGradient id="bg12a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" rx="12" fill="url(#bg12a)"/>
  <rect x="0.5" y="0.5" width="799" height="429" rx="12" stroke="#1e2433"/>
  <text x="400" y="34" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Depreciation Flow Map</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#64748b">Capex becomes assets first, then reaches margins later through depreciation</text>

  <rect x="34" y="102" width="140" height="96" rx="10" fill="rgba(56,189,248,0.05)" stroke="rgba(56,189,248,0.2)"/>
  <text x="104" y="128" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#7dd3fc">Capex</text>
  <text x="104" y="149" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">Cash goes out</text>
  <text x="104" y="165" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">for growth</text>

  <rect x="196" y="102" width="144" height="96" rx="10" fill="rgba(234,70,71,0.05)" stroke="rgba(234,70,71,0.2)"/>
  <text x="268" y="128" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#f87171">CIP</text>
  <text x="268" y="149" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#fecaca">Project is still</text>
  <text x="268" y="165" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">unfinished</text>

  <rect x="362" y="102" width="152" height="96" rx="10" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.2)"/>
  <text x="438" y="128" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#86efac">Tangible Asset</text>
  <text x="438" y="149" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#dcfce7">Factory, machine,</text>
  <text x="438" y="165" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">operating line</text>

  <rect x="536" y="102" width="112" height="96" rx="10" fill="rgba(251,146,60,0.05)" stroke="rgba(251,146,60,0.2)"/>
  <text x="592" y="128" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#fdba74">Depreciation</text>
  <text x="592" y="149" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#ffedd5">Cost arrives in</text>
  <text x="592" y="165" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">the P&amp;L</text>

  <rect x="670" y="102" width="96" height="96" rx="10" fill="rgba(139,92,246,0.05)" stroke="rgba(139,92,246,0.2)"/>
  <text x="718" y="128" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">Margin</text>
  <text x="718" y="149" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#ddd6fe">Final test</text>
  <text x="718" y="165" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">of the asset</text>

  <path d="M174 150H196" stroke="#334155" stroke-width="2"/>
  <path d="M340 150H362" stroke="#334155" stroke-width="2"/>
  <path d="M514 150H536" stroke="#334155" stroke-width="2"/>
  <path d="M648 150H670" stroke="#334155" stroke-width="2"/>

  <rect x="64" y="248" width="306" height="106" rx="10" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)"/>
  <text x="84" y="274" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Growth Reading</text>
  <text x="84" y="296" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">High utilization, visible asset conversion, and revenue growth</text>
  <text x="84" y="312" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">allow depreciation to land without breaking margins.</text>

  <rect x="430" y="248" width="306" height="106" rx="10" fill="rgba(234,70,71,0.05)" stroke="rgba(234,70,71,0.2)"/>
  <text x="450" y="274" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#f87171">Burden Reading</text>
  <text x="450" y="296" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#fecaca">Weak demand, low utilization, or slow ramp-up means</text>
  <text x="450" y="312" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#fecaca">depreciation arrives before the asset earns enough.</text>
</svg>
