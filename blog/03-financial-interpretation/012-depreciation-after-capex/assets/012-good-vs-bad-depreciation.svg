<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" fill="none">
  <defs>
    <linearGradient id="bg12d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" rx="12" fill="url(#bg12d)"/>
  <rect x="0.5" y="0.5" width="799" height="429" rx="12" stroke="#1e2433"/>
  <text x="400" y="34" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Good vs Bad Depreciation</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#64748b">Depreciation is healthy only when assets earn enough to justify the weight</text>

  <rect x="44" y="90" width="332" height="284" rx="10" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.2)"/>
  <text x="210" y="118" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#86efac">Healthy Increase</text>
  <text x="68" y="156" font-family="JetBrains Mono,monospace" font-size="10" fill="#86efac">[+]</text>
  <text x="102" y="156" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#dcfce7">Asset conversion is visible after prior capex</text>
  <text x="68" y="188" font-family="JetBrains Mono,monospace" font-size="10" fill="#86efac">[+]</text>
  <text x="102" y="188" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#dcfce7">Revenue and utilization also rise</text>
  <text x="68" y="220" font-family="JetBrains Mono,monospace" font-size="10" fill="#86efac">[+]</text>
  <text x="102" y="220" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#dcfce7">Management explains ramp-up and payback logic</text>
  <text x="68" y="252" font-family="JetBrains Mono,monospace" font-size="10" fill="#86efac">[+]</text>
  <text x="102" y="252" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#dcfce7">Margin dip is temporary, not structural</text>
  <text x="68" y="284" font-family="JetBrains Mono,monospace" font-size="10" fill="#86efac">[+]</text>
  <text x="102" y="284" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#dcfce7">Future demand justifies the new fixed-cost base</text>

  <rect x="424" y="90" width="332" height="284" rx="10" fill="rgba(234,70,71,0.05)" stroke="rgba(234,70,71,0.2)"/>
  <text x="590" y="118" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#f87171">Burden Increase</text>
  <text x="448" y="156" font-family="JetBrains Mono,monospace" font-size="10" fill="#f87171">[-]</text>
  <text x="482" y="156" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#fecaca">Low utilization persists after asset conversion</text>
  <text x="448" y="188" font-family="JetBrains Mono,monospace" font-size="10" fill="#f87171">[-]</text>
  <text x="482" y="188" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#fecaca">Revenue does not rise enough to absorb fixed cost</text>
  <text x="448" y="220" font-family="JetBrains Mono,monospace" font-size="10" fill="#f87171">[-]</text>
  <text x="482" y="220" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#fecaca">Asset base grows faster than demand visibility</text>
  <text x="448" y="252" font-family="JetBrains Mono,monospace" font-size="10" fill="#f87171">[-]</text>
  <text x="482" y="252" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#fecaca">Management does not explain how margins recover</text>
  <text x="448" y="284" font-family="JetBrains Mono,monospace" font-size="10" fill="#f87171">[-]</text>
  <text x="482" y="284" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#fecaca">Depreciation is the first visible sign of overbuild risk</text>
</svg>
