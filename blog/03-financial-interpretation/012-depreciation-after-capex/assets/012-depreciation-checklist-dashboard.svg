<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg012f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg012f)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">감가상각 10분 점검 대시보드</text>
  <text x="600" y="80" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" fill="#64748b">세 개 이상 흐리면, 감가상각 증가는 부담의 신호일 가능성이 높다</text>

  <!-- Left Column: 투자 선행 지표 (5 items) -->
  <text x="100" y="128" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#a78bfa">투자 선행 지표</text>
  <line x1="100" y1="140" x2="540" y2="140" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>

  <!-- Item 1 -->
  <rect x="80" y="158" width="480" height="68" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.12)"/>
  <text x="108" y="186" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#a78bfa">01</text>
  <text x="145" y="184" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">감가상각비 전년 대비 증가율</text>
  <text x="145" y="206" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">비용 성격별 분류에서 규모와 추세 확인</text>

  <!-- Item 2 -->
  <rect x="80" y="238" width="480" height="68" rx="8" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.12)"/>
  <text x="108" y="266" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#38bdf8">02</text>
  <text x="145" y="264" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">선행 CAPEX · 건설중인자산 축적</text>
  <text x="145" y="286" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">현재 감가상각의 원인이 되는 과거 투자 흔적</text>

  <!-- Item 3 -->
  <rect x="80" y="318" width="480" height="68" rx="8" fill="rgba(52,211,153,0.04)" stroke="rgba(52,211,153,0.12)"/>
  <text x="108" y="346" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#34d399">03</text>
  <text x="145" y="344" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">유형자산 전환 확인</text>
  <text x="145" y="366" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">건설중인자산 → 기계장치·건물 대체가 실제로 일어났는가</text>

  <!-- Item 4 -->
  <rect x="80" y="398" width="480" height="68" rx="8" fill="rgba(251,146,60,0.04)" stroke="rgba(251,146,60,0.12)"/>
  <text x="108" y="426" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#fb923c">04</text>
  <text x="145" y="424" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">매출 동반 증가 여부</text>
  <text x="145" y="446" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">감가상각 증가와 매출 성장이 같이 나타나는가</text>

  <!-- Item 5 -->
  <rect x="80" y="478" width="480" height="68" rx="8" fill="rgba(248,113,113,0.04)" stroke="rgba(248,113,113,0.12)"/>
  <text x="108" y="506" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#f87171">05</text>
  <text x="145" y="504" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">영업이익률 둔화 성격</text>
  <text x="145" y="526" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">일시적 램프업인가, 구조적 고정비 부담인가</text>

  <!-- Right Column: 수익성 후행 지표 (5 items) -->
  <text x="660" y="128" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#38bdf8">수익성 후행 지표</text>
  <line x1="660" y1="140" x2="1100" y2="140" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>

  <!-- Item 6 -->
  <rect x="640" y="158" width="480" height="68" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.12)"/>
  <text x="668" y="186" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#a78bfa">06</text>
  <text x="705" y="184" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">가동률 수준</text>
  <text x="705" y="206" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">전환된 자산이 충분히 활용되고 있는가</text>

  <!-- Item 7 -->
  <rect x="640" y="238" width="480" height="68" rx="8" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.12)"/>
  <text x="668" y="266" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#38bdf8">07</text>
  <text x="705" y="264" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">가격 권한과 마진 흡수력</text>
  <text x="705" y="286" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">감가상각 부담을 판가에 전가할 수 있는가</text>

  <!-- Item 8 -->
  <rect x="640" y="318" width="480" height="68" rx="8" fill="rgba(52,211,153,0.04)" stroke="rgba(52,211,153,0.12)"/>
  <text x="668" y="346" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#34d399">08</text>
  <text x="705" y="344" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">다음 감가상각 물량 대기</text>
  <text x="705" y="366" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">건설중인자산에 남은 추가 전환 예정 자산 규모</text>

  <!-- Item 9 -->
  <rect x="640" y="398" width="480" height="68" rx="8" fill="rgba(251,146,60,0.04)" stroke="rgba(251,146,60,0.12)"/>
  <text x="668" y="426" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#fb923c">09</text>
  <text x="705" y="424" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">현금흐름 건전성</text>
  <text x="705" y="446" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">비현금 비용에도 불구하고 영업 현금 창출 유지되는가</text>

  <!-- Item 10 -->
  <rect x="640" y="478" width="480" height="68" rx="8" fill="rgba(248,113,113,0.04)" stroke="rgba(248,113,113,0.12)"/>
  <text x="668" y="506" font-family="JetBrains Mono,monospace" font-size="18" font-weight="700" fill="#f87171">10</text>
  <text x="705" y="504" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">경영진 회수 논리</text>
  <text x="705" y="526" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#94a3b8">완공 후 수익성 방어를 구체적으로 설명하는가</text>

  <!-- Bottom summary box -->
  <rect x="80" y="576" width="1040" height="80" rx="10" fill="rgba(248,113,113,0.04)" stroke="rgba(248,113,113,0.15)"/>
  <text x="600" y="610" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#f87171">3개 이상 불확실 → 감가상각 증가가 성장 신호가 아닌 부담 신호일 가능성</text>
  <text x="600" y="636" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#94a3b8">투자 선행 지표는 과거를 검증하고, 수익성 후행 지표는 미래를 점검한다</text>

  <!-- Footer -->
  <text x="600" y="694" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>