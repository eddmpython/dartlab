<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" fill="none">
  <defs><linearGradient id="bg9c" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient></defs>
  <rect width="800" height="430" rx="12" fill="url(#bg9c)"/><rect x="0.5" y="0.5" width="799" height="429" rx="12" stroke="#1e2433"/>
  <text x="400" y="34" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">EDGAR API Stability Guide</text>

  <rect x="40" y="88" width="720" height="56" rx="8" fill="rgba(234,70,71,0.05)" stroke="rgba(234,70,71,0.2)"/>
  <text x="56" y="121" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#fecaca">Set explicit User-Agent and request pacing</text>

