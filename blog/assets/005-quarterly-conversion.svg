<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <linearGradient id="bg5c" x1="0" y1="0" x2="800" y2="320">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" rx="16" fill="url(#bg5c)"/>

  <text x="400" y="32" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="15" font-weight="700">누적 데이터 → 독립 분기 변환</text>

  <!-- Left: Cumulative (what DART gives) -->
  <rect x="30" y="52" width="340" height="240" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="30" y="52" width="340" height="32" rx="12" fill="#f59e0b" opacity="0.12"/>
  <text x="200" y="73" text-anchor="middle" fill="#f59e0b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12" font-weight="700">DART가 주는 데이터 (누적)</text>

  <!-- Bar chart - cumulative -->
  <rect x="70" y="210" width="50" height="60" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="95" y="205" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">400</text>
  <text x="95" y="283" text-anchor="middle" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">Q1</text>

  <rect x="140" y="170" width="50" height="100" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="165" y="165" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">1,000</text>
  <text x="165" y="283" text-anchor="middle" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">반기</text>

  <rect x="210" y="120" width="50" height="150" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="235" y="115" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">2,200</text>
  <text x="235" y="283" text-anchor="middle" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">3분기</text>

  <rect x="280" y="90" width="50" height="180" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="305" y="85" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">3,000</text>
  <text x="305" y="283" text-anchor="middle" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">연간</text>

  <!-- Arrow -->
  <path d="M385 172 L425 172" stroke="#ea4647" stroke-width="2.5" marker-end="url(#arrQ)"/>
  <defs><marker id="arrQ" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8" fill="#ea4647"/></marker></defs>
  <text x="405" y="162" text-anchor="middle" fill="#ea4647" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9" font-weight="700">자동 변환</text>

  <!-- Right: Standalone (what we need) -->
  <rect x="430" y="52" width="340" height="240" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="430" y="52" width="340" height="32" rx="12" fill="#10b981" opacity="0.12"/>
  <text x="600" y="73" text-anchor="middle" fill="#10b981" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12" font-weight="700">실제 필요한 데이터 (독립 분기)</text>

  <!-- Bar chart - standalone -->
  <rect x="470" y="210" width="50" height="60" rx="4" fill="#10b981" opacity="0.7"/>
  <text x="495" y="205" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">400</text>
  <text x="495" y="283" text-anchor="middle" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">Q1</text>

  <rect x="540" y="180" width="50" height="90" rx="4" fill="#10b981" opacity="0.7"/>
  <text x="565" y="175" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">600</text>
  <text x="565" y="283" text-anchor="middle" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">Q2</text>

  <rect x="610" y="90" width="50" height="180" rx="4" fill="#10b981" opacity="0.7"/>
  <text x="635" y="85" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">1,200</text>
  <text x="635" y="283" text-anchor="middle" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">Q3</text>

  <rect x="680" y="150" width="50" height="120" rx="4" fill="#10b981" opacity="0.7"/>
  <text x="705" y="145" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">800</text>
  <text x="705" y="283" text-anchor="middle" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">Q4</text>

  <!-- Bottom note -->
  <text x="400" y="310" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11">손익계산서·현금흐름표: 누적→독립 변환 | 재무상태표: 시점 잔액이므로 그대로</text>
</svg>
