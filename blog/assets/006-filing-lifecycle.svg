<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Filing Lifecycle</title>
  <desc id="d">Lifecycle from event filing to financial reflection in periodic reports.</desc>
  <rect width="1200" height="640" fill="#101a2a"/>
  <text x="60" y="72" fill="#ecf3ff" font-family="Arial, sans-serif" font-size="40" font-weight="700">From Event to Financial Impact</text>
  <text x="60" y="106" fill="#9db1cf" font-family="Arial, sans-serif" font-size="20">Link 8-K/6-K events to 10-Q and 10-K effects</text>

  <rect x="70" y="190" width="230" height="220" rx="18" fill="#3a2626" stroke="#d49595"/>
  <text x="95" y="240" fill="#ffe8e8" font-family="Arial, sans-serif" font-size="28" font-weight="700">Event</text>
  <text x="95" y="280" fill="#f2bdbd" font-family="Arial, sans-serif" font-size="22">8-K / 6-K</text>
  <text x="95" y="330" fill="#e8b0b0" font-family="Arial, sans-serif" font-size="18">Contract, management,</text>
  <text x="95" y="356" fill="#e8b0b0" font-family="Arial, sans-serif" font-size="18">funding, legal events</text>

  <rect x="350" y="190" width="230" height="220" rx="18" fill="#2a3926" stroke="#94ca87"/>
  <text x="375" y="240" fill="#ebffe5" font-family="Arial, sans-serif" font-size="28" font-weight="700">Update</text>
  <text x="375" y="280" fill="#c8e9bf" font-family="Arial, sans-serif" font-size="22">10-Q</text>
  <text x="375" y="330" fill="#b8ddb0" font-family="Arial, sans-serif" font-size="18">Quarterly P/L, CF,</text>
  <text x="375" y="356" fill="#b8ddb0" font-family="Arial, sans-serif" font-size="18">working capital impact</text>

  <rect x="630" y="190" width="230" height="220" rx="18" fill="#24364b" stroke="#76a8da"/>
  <text x="655" y="240" fill="#e3f1ff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Consolidation</text>
  <text x="655" y="280" fill="#bdd8f5" font-family="Arial, sans-serif" font-size="22">10-K / 20-F</text>
  <text x="655" y="330" fill="#aac9ea" font-family="Arial, sans-serif" font-size="18">Policy updates, notes,</text>
  <text x="655" y="356" fill="#aac9ea" font-family="Arial, sans-serif" font-size="18">risk language changes</text>

  <rect x="910" y="190" width="230" height="220" rx="18" fill="#2f273e" stroke="#a28cd3"/>
  <text x="935" y="240" fill="#f0e8ff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Context</text>
  <text x="935" y="280" fill="#d5c6ee" font-family="Arial, sans-serif" font-size="22">13F</text>
  <text x="935" y="330" fill="#c7b6e3" font-family="Arial, sans-serif" font-size="18">Position direction</text>
  <text x="935" y="356" fill="#c7b6e3" font-family="Arial, sans-serif" font-size="18">(delayed signal)</text>

  <path d="M300 300 L350 300" stroke="#d7a0a0" stroke-width="4"/>
  <path d="M580 300 L630 300" stroke="#a8d89f" stroke-width="4"/>
  <path d="M860 300 L910 300" stroke="#9bc4ea" stroke-width="4"/>

  <rect x="70" y="470" width="1070" height="100" rx="12" fill="#1a2436"/>
  <text x="96" y="528" fill="#c9d8ef" font-family="Arial, sans-serif" font-size="24" font-weight="700">Insight rule:</text>
  <text x="260" y="528" fill="#c9d8ef" font-family="Arial, sans-serif" font-size="24">Never interpret a number before tracing its event origin.</text>
</svg>
