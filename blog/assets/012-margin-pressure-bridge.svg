<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" fill="none">
  <defs>
    <linearGradient id="bg12c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" rx="12" fill="url(#bg12c)"/>
  <rect x="0.5" y="0.5" width="799" height="429" rx="12" stroke="#1e2433"/>
  <text x="400" y="34" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Margin Pressure Bridge</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#64748b">Capex and depreciation do not hit the business at the same time</text>

  <path d="M96 290C180 180 256 128 338 128C432 128 488 306 584 306C650 306 698 250 720 208" stroke="#38bdf8" stroke-width="4" fill="none"/>
  <path d="M96 316C180 316 256 292 338 248C414 208 492 152 584 152C644 152 692 180 720 224" stroke="#ea4647" stroke-width="4" fill="none"/>
  <path d="M96 344C176 344 252 336 338 326C420 316 500 306 584 288C646 274 692 260 720 250" stroke="#fbbf24" stroke-width="4" fill="none"/>

  <text x="116" y="368" font-family="JetBrains Mono,monospace" font-size="10" fill="#7dd3fc">Revenue / utilization response</text>
  <text x="116" y="390" font-family="JetBrains Mono,monospace" font-size="10" fill="#f87171">Depreciation arrival</text>
  <text x="116" y="412" font-family="JetBrains Mono,monospace" font-size="10" fill="#fbbf24">Margin pressure path</text>

  <rect x="84" y="90" width="186" height="72" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)"/>
  <text x="104" y="116" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Stage 1</text>
  <text x="104" y="137" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">Capex is spent, but margins may still look fine.</text>

  <rect x="306" y="74" width="186" height="72" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)"/>
  <text x="326" y="100" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Stage 2</text>
  <text x="326" y="121" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">Assets convert and depreciation starts to surface.</text>

  <rect x="540" y="232" width="186" height="72" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)"/>
  <text x="560" y="258" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Stage 3</text>
  <text x="560" y="279" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">The asset must prove it can absorb fixed-cost pressure.</text>
