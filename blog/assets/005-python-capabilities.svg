<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <linearGradient id="bg5b" x1="0" y1="0" x2="800" y2="320">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" rx="16" fill="url(#bg5b)"/>

  <text x="400" y="32" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="15" font-weight="700">파이썬이 할 수 있는 것 vs 할 수 없는 것</text>

  <!-- Can do -->
  <rect x="20" y="52" width="370" height="248" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="20" y="52" width="370" height="34" rx="12" fill="#10b981" opacity="0.12"/>
  <text x="205" y="74" text-anchor="middle" fill="#10b981" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="13" font-weight="700">파이썬이 잘하는 것</text>

  <circle cx="46" cy="108" r="6" fill="#10b981" opacity="0.6"/>
  <text x="60" y="112" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">대규모 데이터 처리</text>
  <text x="60" y="128" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">수백만 행을 몇 초 안에</text>

  <circle cx="46" cy="156" r="6" fill="#10b981" opacity="0.6"/>
  <text x="60" y="160" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">패턴 탐지 / 스크리닝</text>
  <text x="60" y="176" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">전 종목 조건 검색 1초</text>

  <circle cx="46" cy="204" r="6" fill="#10b981" opacity="0.6"/>
  <text x="60" y="208" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">자동화와 재현</text>
  <text x="60" y="224" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">매번 같은 방법으로 분석 반복</text>

  <circle cx="46" cy="252" r="6" fill="#10b981" opacity="0.6"/>
  <text x="60" y="256" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">기업 간 비교</text>
  <text x="60" y="272" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">표준화된 스키마로 동일 기준 비교</text>

  <!-- Cannot do -->
  <rect x="410" y="52" width="370" height="248" rx="12" fill="#1e293b" stroke="#ea4647" stroke-width="1.5"/>
  <rect x="410" y="52" width="370" height="34" rx="12" fill="#ea4647" opacity="0.12"/>
  <text x="595" y="74" text-anchor="middle" fill="#ea4647" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="13" font-weight="700">사람이 해야 하는 것</text>

  <circle cx="436" cy="108" r="6" fill="#ea4647" opacity="0.6"/>
  <text x="450" y="112" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">경영진의 진의 파악</text>
  <text x="450" y="128" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">형식적 문구 vs 진짜 의지</text>

  <circle cx="436" cy="156" r="6" fill="#ea4647" opacity="0.6"/>
  <text x="450" y="160" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">미래 예측</text>
  <text x="450" y="176" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">시나리오는 돌리되, 판단은 사람이</text>

  <circle cx="436" cy="204" r="6" fill="#ea4647" opacity="0.6"/>
  <text x="450" y="208" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">맥락 이해</text>
  <text x="450" y="224" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">건설업 200%와 IT업 200%는 다르다</text>

  <circle cx="436" cy="252" r="6" fill="#ea4647" opacity="0.6"/>
  <text x="450" y="256" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">투자 판단</text>
  <text x="450" y="272" fill="#94a3b8" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">매수/매도 결정은 사람의 몫</text>
</svg>
