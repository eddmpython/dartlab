<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none">
  <defs>
    <linearGradient id="bg2c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="800" height="360" rx="12" fill="url(#bg2c)"/>
  <rect x="0.5" y="0.5" width="799" height="359" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">OpenDART vs SEC EDGAR</text>
  <text x="400" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">Each has strengths the other lacks</text>

  <!-- Headers -->
  <text x="350" y="82" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.06em">CRITERIA</text>
  <text x="500" y="82" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fb923c" letter-spacing="0.06em">OPENDART</text>
  <text x="680" y="82" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" letter-spacing="0.06em">SEC EDGAR</text>

  <line x1="40" y1="92" x2="760" y2="92" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 1: Auth -->
  <text x="350" y="115" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Authentication</text>
  <text x="500" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">API Key Required</text>
  <text x="680" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#34d399">None (User-Agent only)</text>
  <line x1="40" y1="126" x2="760" y2="126" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 2: Rate Limit -->
  <text x="350" y="149" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Rate Limit</text>
  <text x="500" y="149" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f87171">10K~20K / day</text>
  <text x="680" y="149" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#34d399">10 req/sec (860K+/day)</text>
  <line x1="40" y1="160" x2="760" y2="160" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 3: Structured Reports -->
  <text x="350" y="183" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Structured Reports</text>
  <rect x="440" y="172" width="120" height="18" rx="4" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="500" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399">Best-in-class</text>
  <text x="680" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f87171">Must parse from XBRL</text>
  <line x1="40" y1="197" x2="760" y2="197" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 4: Full-text Search -->
  <text x="350" y="220" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Full-text Search</text>
  <text x="500" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f87171">Not available</text>
  <text x="680" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#34d399">20+ years searchable</text>
  <line x1="40" y1="231" x2="760" y2="231" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 5: API Design -->
  <text x="350" y="254" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">API Design</text>
  <text x="500" y="254" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f87171">HTTP 200 for errors</text>
  <text x="680" y="254" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#34d399">Standard HTTP codes</text>
  <line x1="40" y1="265" x2="760" y2="265" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 6: Cost -->
  <text x="350" y="288" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">Cost</text>
  <text x="500" y="288" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#34d399">Free</text>
  <text x="680" y="288" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#34d399">Free</text>

  <!-- Bottom insight -->
  <text x="400" y="336" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">OpenDART wins on structured data. EDGAR wins on infrastructure.</text>
</svg>
