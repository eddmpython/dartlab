<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" fill="none">
  <defs>
    <linearGradient id="bg12e" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" rx="12" fill="url(#bg12e)"/>
  <rect x="0.5" y="0.5" width="799" height="429" rx="12" stroke="#1e2433"/>
  <text x="400" y="34" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Depreciation Timeline</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#64748b">The accounting burden arrives later than the cash burden, and the market often misreads the gap</text>

  <path d="M92 220H710" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
  <circle cx="120" cy="220" r="10" fill="#38bdf8"/>
  <circle cx="250" cy="220" r="10" fill="#ea4647"/>
  <circle cx="380" cy="220" r="10" fill="#86efac"/>
  <circle cx="510" cy="220" r="10" fill="#fdba74"/>
  <circle cx="640" cy="220" r="10" fill="#c4b5fd"/>

  <text x="120" y="188" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#7dd3fc">Capex</text>
  <text x="120" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">cash leaves first</text>

  <text x="250" y="188" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#f87171">CIP</text>
  <text x="250" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">project builds up</text>

  <text x="380" y="188" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#86efac">Asset Start</text>
  <text x="380" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">asset goes live</text>

  <text x="510" y="188" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#fdba74">Depreciation</text>
  <text x="510" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">P&amp;L gets heavier</text>

  <text x="640" y="188" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">Margin Test</text>
  <text x="640" y="256" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#94a3b8">asset must justify itself</text>

  <rect x="104" y="302" width="592" height="66" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)"/>
  <text x="124" y="326" font-family="JetBrains Mono,monospace" font-size="10" fill="#fbbf24">Common mistake:</text>
  <text x="214" y="326" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">reading strong margins too early, before depreciation has fully arrived</text>
  <text x="124" y="348" font-family="JetBrains Mono,monospace" font-size="10" fill="#86efac">Correct read:</text>
  <text x="196" y="348" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">connect current depreciation with prior capex and next-stage utilization</text>
</svg>
