<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="t d">
  <title id="t">EDGAR Structure Map</title>
  <desc id="d">High-level map of EDGAR filing categories and reading order.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#162742"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="74" fill="#e6edf6" font-family="Arial, sans-serif" font-size="44" font-weight="700">EDGAR Filing Map</text>
  <text x="60" y="108" fill="#9fb3cc" font-family="Arial, sans-serif" font-size="20">Think in form roles, not just document pages</text>

  <rect x="60" y="150" width="340" height="220" rx="18" fill="#193450" stroke="#62a4e8"/>
  <text x="84" y="195" fill="#d5e8ff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Annual Baseline</text>
  <text x="84" y="235" fill="#b7d6f6" font-family="Arial, sans-serif" font-size="24">10-K</text>
  <text x="84" y="270" fill="#b7d6f6" font-family="Arial, sans-serif" font-size="24">20-F</text>
  <text x="84" y="325" fill="#9fc2e8" font-family="Arial, sans-serif" font-size="18">Business, risk, accounting baseline</text>

  <rect x="430" y="150" width="340" height="220" rx="18" fill="#2a3a27" stroke="#89cf7f"/>
  <text x="454" y="195" fill="#e3f8de" font-family="Arial, sans-serif" font-size="28" font-weight="700">Quarterly Update</text>
  <text x="454" y="245" fill="#d1f0c9" font-family="Arial, sans-serif" font-size="28">10-Q</text>
  <text x="454" y="325" fill="#b7ddb0" font-family="Arial, sans-serif" font-size="18">Trend check vs annual baseline</text>

  <rect x="800" y="150" width="340" height="220" rx="18" fill="#4a2c2c" stroke="#f09b9b"/>
  <text x="824" y="195" fill="#ffe5e5" font-family="Arial, sans-serif" font-size="28" font-weight="700">Event Feed</text>
  <text x="824" y="235" fill="#ffd5d5" font-family="Arial, sans-serif" font-size="24">8-K</text>
  <text x="824" y="270" fill="#ffd5d5" font-family="Arial, sans-serif" font-size="24">6-K</text>
  <text x="824" y="325" fill="#f3baba" font-family="Arial, sans-serif" font-size="18">Material events between periods</text>

  <rect x="60" y="420" width="1080" height="190" rx="18" fill="#1b1f2a" stroke="#7e8aa5"/>
  <text x="90" y="470" fill="#e1e7f3" font-family="Arial, sans-serif" font-size="30" font-weight="700">Position Signal</text>
  <text x="90" y="510" fill="#cbd5ea" font-family="Arial, sans-serif" font-size="28">13F</text>
  <text x="90" y="555" fill="#aab7d2" font-family="Arial, sans-serif" font-size="20">Use for medium-term positioning context, not real-time trade tracking.</text>

  <path d="M400 260 L430 260" stroke="#8fb9e6" stroke-width="4"/>
  <path d="M770 260 L800 260" stroke="#a8d99f" stroke-width="4"/>
  <path d="M970 370 L970 420" stroke="#f0b1b1" stroke-width="4"/>
  <path d="M230 370 L230 420" stroke="#9da9c4" stroke-width="4"/>
</svg>
