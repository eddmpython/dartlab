  <text x="650" y="382" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#94a3b8">Payoff visibility</text>

  <rect x="168" y="264" width="150" height="70" rx="10" fill="rgba(56,189,248,0.05)" stroke="rgba(56,189,248,0.2)"/>
  <text x="243" y="290" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#7dd3fc">Maintenance</text>
  <text x="243" y="309" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">Defensive spend</text>

  <rect x="338" y="214" width="150" height="70" rx="10" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.2)"/>
  <text x="413" y="240" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#86efac">Efficiency</text>
  <text x="413" y="259" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#dcfce7">Margin support</text>

  <rect x="510" y="156" width="150" height="70" rx="10" fill="rgba(251,146,60,0.05)" stroke="rgba(251,146,60,0.2)"/>
  <text x="585" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#fdba74">Expansion</text>
  <text x="585" y="201" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#ffedd5">Growth response</text>

  <rect x="536" y="78" width="150" height="70" rx="10" fill="rgba(234,70,71,0.05)" stroke="rgba(234,70,71,0.2)"/>
