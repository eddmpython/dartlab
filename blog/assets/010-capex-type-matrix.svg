  <rect x="120" y="84" width="352" height="74" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)"/>
  <text x="140" y="110" font-family="JetBrains Mono,monospace" font-size="10" fill="#7dd3fc">Question 1</text>
  <text x="140" y="129" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">Does this capex preserve the existing business, improve margins,</text>
  <text x="140" y="145" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">expand proven demand, or fund an unproven option?</text>

  <rect x="120" y="172" width="352" height="74" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)"/>
  <text x="140" y="198" font-family="JetBrains Mono,monospace" font-size="10" fill="#86efac">Question 2</text>
  <text x="140" y="217" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">Can you identify schedule, demand evidence, and margin path</text>
  <text x="140" y="233" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#cbd5e1">from the annual report and notes?</text>
