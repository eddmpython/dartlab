<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <linearGradient id="bg1a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="800" height="260" rx="12" fill="url(#bg1a)"/>
  <rect x="0.5" y="0.5" width="799" height="259" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Electronic Disclosure Flow</text>
  <text x="400" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">How corporate information reaches you</text>

  <!-- Box 1: Corporation -->
  <rect x="40" y="90" width="160" height="100" rx="10" fill="rgba(234,70,71,0.06)" stroke="rgba(234,70,71,0.25)" stroke-width="1"/>
  <text x="120" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ea4647" letter-spacing="0.06em">LISTED COMPANY</text>
  <text x="120" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">Annual Report</text>
  <text x="120" y="162" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">Semi-Annual / Quarterly</text>
  <text x="120" y="179" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">Material Events</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="140" x2="275" y2="140" stroke="#ea4647" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="275,136 285,140 275,144" fill="#ea4647"/>
  <text x="248" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Submit</text>

  <!-- Box 2: DART -->
  <rect x="290" y="80" width="220" height="120" rx="10" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.25)" stroke-width="1"/>
  <text x="400" y="108" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fb923c" letter-spacing="0.06em">DART (FSS)</text>
  <text x="400" y="132" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#e2e8f0">dart.fss.or.kr</text>
  <text x="400" y="155" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">Review &amp; Publish</text>
  <text x="400" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">7M+ documents since 1999</text>

  <!-- Arrow 2 -->
  <line x1="520" y1="140" x2="585" y2="140" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="585,136 595,140 585,144" fill="#fb923c"/>
  <text x="553" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Access</text>

  <!-- Box 3: Users -->
  <rect x="600" y="90" width="160" height="100" rx="10" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="680" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" letter-spacing="0.06em">USERS</text>
  <text x="680" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">Investors</text>
  <text x="680" y="162" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">Analysts / Researchers</text>
  <text x="680" y="179" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">Regulators</text>

  <!-- Bottom label -->
  <text x="400" y="236" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155">All listed companies must disclose through DART by law</text>
</svg>
