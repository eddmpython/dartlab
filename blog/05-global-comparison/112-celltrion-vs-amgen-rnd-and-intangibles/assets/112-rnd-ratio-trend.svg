<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <title>R&amp;D/매출 비율 추이 — 셀트리온 vs Amgen</title>
  <desc>2021년부터 2024년까지 양사의 R&amp;D 투자 비율 추이를 비교하는 라인 차트.</desc>
  <defs>
    <linearGradient id="bg112b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="12" fill="url(#bg112b)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="12" stroke="#1e2433"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">R&amp;D / 매출 비율 추이</text>
  <text x="600" y="66" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" fill="#64748b">바이오시밀러 vs 오리지널 바이오제약의 연구개발 투자 강도 비교</text>

  <!-- Legend -->
  <rect x="420" y="84" width="14" height="14" rx="3" fill="#a78bfa"/>
  <text x="440" y="96" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#cbd5e1">셀트리온</text>
  <rect x="540" y="84" width="14" height="14" rx="3" fill="#38bdf8"/>
  <text x="560" y="96" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="12" fill="#cbd5e1">Amgen</text>

  <!-- Chart area -->
  <!-- Y-axis labels -->
  <text x="140" y="145" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="11" fill="#64748b">25%</text>
  <text x="140" y="235" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="11" fill="#64748b">20%</text>
  <text x="140" y="325" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="11" fill="#64748b">15%</text>
  <text x="140" y="415" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="11" fill="#64748b">10%</text>
  <text x="140" y="505" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="11" fill="#64748b">5%</text>

  <!-- Grid lines -->
  <line x1="160" y1="140" x2="1080" y2="140" stroke="#1e2433" stroke-width="1"/>
  <line x1="160" y1="230" x2="1080" y2="230" stroke="#1e2433" stroke-width="1"/>
  <line x1="160" y1="320" x2="1080" y2="320" stroke="#1e2433" stroke-width="1"/>
  <line x1="160" y1="410" x2="1080" y2="410" stroke="#1e2433" stroke-width="1"/>
  <line x1="160" y1="500" x2="1080" y2="500" stroke="#1e2433" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="280" y="540" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="13" fill="#94a3b8">2021</text>
  <text x="500" y="540" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="13" fill="#94a3b8">2022</text>
  <text x="720" y="540" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="13" fill="#94a3b8">2023</text>
  <text x="940" y="540" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="13" fill="#94a3b8">2024</text>

  <!-- Amgen line (higher ~19-22%) -->
  <!-- 2021: 21% -> y=176, 2022: 22% -> y=158, 2023: 20% -> y=212, 2024: 19% -> y=230 -->
  <polyline points="280,176 500,158 720,212 940,230" stroke="#38bdf8" stroke-width="3" fill="none" stroke-linejoin="round"/>
  <circle cx="280" cy="176" r="6" fill="#38bdf8"/>
  <circle cx="500" cy="158" r="6" fill="#38bdf8"/>
  <circle cx="720" cy="212" r="6" fill="#38bdf8"/>
  <circle cx="940" cy="230" r="6" fill="#38bdf8"/>

  <!-- Amgen data labels -->
  <text x="280" y="164" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="600" fill="#38bdf8">21.0%</text>
  <text x="500" y="146" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="600" fill="#38bdf8">22.1%</text>
  <text x="720" y="200" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="600" fill="#38bdf8">19.8%</text>
  <text x="940" y="218" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="600" fill="#38bdf8">19.2%</text>

  <!-- Celltrion line (lower ~10-16%) -->
  <!-- 2021: 16% -> y=302, 2022: 14% -> y=338, 2023: 12% -> y=374, 2024: 10% -> y=410 -->
  <polyline points="280,302 500,338 720,374 940,410" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linejoin="round"/>
  <circle cx="280" cy="302" r="6" fill="#a78bfa"/>
  <circle cx="500" cy="338" r="6" fill="#a78bfa"/>
  <circle cx="720" cy="374" r="6" fill="#a78bfa"/>
  <circle cx="940" cy="410" r="6" fill="#a78bfa"/>

  <!-- Celltrion data labels -->
  <text x="280" y="294" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="600" fill="#a78bfa">16.2%</text>
  <text x="500" y="330" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="600" fill="#a78bfa">14.1%</text>
  <text x="720" y="366" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="600" fill="#a78bfa">11.8%</text>
  <text x="940" y="402" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="600" fill="#a78bfa">10.3%</text>

  <!-- Annotation: gap area -->
  <rect x="990" y="280" width="150" height="60" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)"/>
  <text x="1065" y="300" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#f1f5f9">비율 격차</text>
  <text x="1065" y="318" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" fill="#fb923c">~9%p</text>
  <text x="1065" y="334" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="9" fill="#64748b">2024년 기준</text>

  <!-- Bottom insight boxes -->
  <rect x="80" y="570" width="320" height="96" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.2)"/>
  <text x="240" y="596" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#a78bfa">셀트리온</text>
  <text x="240" y="616" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#cbd5e1">바이오시밀러 중심 = 개발비 자산화 비중 높음</text>
  <text x="240" y="634" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#94a3b8">P&amp;L 비용 비율 실제보다 낮게 보일 수 있음</text>
  <text x="240" y="652" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="#64748b">매출 ~2.9조 / R&amp;D ~3,000억</text>

  <rect x="440" y="570" width="320" height="96" rx="10" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.2)"/>
  <text x="600" y="596" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#38bdf8">Amgen</text>
  <text x="600" y="616" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#cbd5e1">자체 R&amp;D 전액 비용 = 보수적 이익 계상</text>
  <text x="600" y="634" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#94a3b8">실제 투자 규모가 손익에 그대로 반영</text>
  <text x="600" y="652" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="#64748b">매출 ~$33B / R&amp;D ~$6.3B</text>

  <rect x="800" y="570" width="320" height="96" rx="10" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.2)"/>
  <text x="960" y="596" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fb923c">비교 시 주의</text>
  <text x="960" y="616" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#fed7aa">회계 기준 차이로 단순 비교 불가</text>
  <text x="960" y="634" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#94a3b8">셀트리온 자산화 포함 시 비율 상승</text>
  <text x="960" y="652" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#94a3b8">절대 금액은 Amgen이 20배 이상</text>

  <!-- Footer -->
  <text x="600" y="698" text-anchor="middle" font-family="Pretendard,Inter,system-ui,sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>