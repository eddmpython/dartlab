<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">HTML vs TXT vs exhibits decision tree</title>
  <desc id="desc">EDGAR 원문 수집에서 HTML, complete submission text, exhibits를 언제 저장할지 정리한 의사결정 트리</desc>
  <defs>
    <linearGradient id="bg009b" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0f1724"/>
    </linearGradient>
    <marker id="arrow009b" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg009b)"/>
  <rect x="20" y="20" width="1160" height="720" rx="24" stroke="#1e293b" stroke-width="2"/>

  <text x="74" y="84" fill="#f8fafc" font-family="Inter, Pretendard, sans-serif" font-size="34" font-weight="700">어떤 파일을 저장할지는 목적에 따라 달라진다</text>
  <text x="74" y="122" fill="#94a3b8" font-family="Inter, Pretendard, sans-serif" font-size="18">사람이 읽을지, 원본을 보존할지, 첨부 문서까지 추적할지에 따라 HTML, TXT, exhibits의 우선순위가 달라진다.</text>

  <rect x="430" y="174" width="340" height="98" rx="20" fill="#172335" stroke="#e2e8f0" stroke-width="2"/>
  <text x="600" y="216" text-anchor="middle" fill="#f8fafc" font-family="Inter, Pretendard, sans-serif" font-size="28" font-weight="700">지금 필요한 건 무엇인가</text>
  <text x="600" y="248" text-anchor="middle" fill="#94a3b8" font-family="Inter, Pretendard, sans-serif" font-size="18">읽기 / 보존 / 이벤트 추적</text>

  <path d="M600 272V336" stroke="#475569" stroke-width="4" marker-end="url(#arrow009b)"/>
  <path d="M600 336H246" stroke="#475569" stroke-width="4" marker-end="url(#arrow009b)"/>
  <path d="M600 336H600" stroke="#475569" stroke-width="4" marker-end="url(#arrow009b)"/>
  <path d="M600 336H954" stroke="#475569" stroke-width="4" marker-end="url(#arrow009b)"/>

  <rect x="74" y="372" width="344" height="220" rx="22" fill="#132131" stroke="#38bdf8" stroke-width="2"/>
  <text x="108" y="418" fill="#7dd3fc" font-family="Inter, Pretendard, sans-serif" font-size="30" font-weight="700">HTML 우선</text>
  <text x="108" y="458" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">사람이 읽기 좋다</text>
  <text x="108" y="490" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">섹션 구조와 표를 따라가기 쉽다</text>
  <text x="108" y="522" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">10-K, 10-Q, 20-F 본문 읽기에 적합</text>
  <text x="108" y="570" fill="#94a3b8" font-family="Inter, Pretendard, sans-serif" font-size="18">사람 기준 맥락 파악이 목적이면 HTML부터 저장한다.</text>

  <rect x="428" y="372" width="344" height="220" rx="22" fill="#132131" stroke="#22c55e" stroke-width="2"/>
  <text x="462" y="418" fill="#86efac" font-family="Inter, Pretendard, sans-serif" font-size="30" font-weight="700">TXT 우선</text>
  <text x="462" y="458" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">complete submission text를 보존한다</text>
  <text x="462" y="490" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">파서 실패 복구용으로 좋다</text>
  <text x="462" y="522" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">header와 원형 증적을 같이 남길 수 있다</text>
  <text x="462" y="570" fill="#94a3b8" font-family="Inter, Pretendard, sans-serif" font-size="18">재현성과 원형 보존이 중요하면 TXT를 같이 저장한다.</text>

  <rect x="782" y="372" width="344" height="220" rx="22" fill="#132131" stroke="#f97316" stroke-width="2"/>
  <text x="816" y="418" fill="#fdba74" font-family="Inter, Pretendard, sans-serif" font-size="30" font-weight="700">exhibits 우선</text>
  <text x="816" y="458" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">8-K 이벤트 해석이 목적이다</text>
  <text x="816" y="490" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">보도자료, 계약서, 부속 문서가 핵심이다</text>
  <text x="816" y="522" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">index.html에서 문서 목록을 먼저 본다</text>
  <text x="816" y="570" fill="#94a3b8" font-family="Inter, Pretendard, sans-serif" font-size="18">이벤트형 filing은 primary document 하나만으로 부족하다.</text>

  <rect x="74" y="632" width="1052" height="70" rx="18" fill="#101826"/>
  <text x="108" y="676" fill="#f8fafc" font-family="Inter, Pretendard, sans-serif" font-size="24" font-weight="700">실전 기본형: HTML + TXT + index를 저장하고, 8-K는 exhibits 분기를 추가한다.</text>
</svg>
