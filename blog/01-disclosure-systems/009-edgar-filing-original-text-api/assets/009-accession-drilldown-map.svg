<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">EDGAR accession drill-down map</title>
  <desc id="desc">CIK, submissions JSON, accession, primaryDocument가 최종 filing HTML과 raw text 경로로 이어지는 구조도</desc>
  <defs>
    <linearGradient id="bg009a" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#101826"/>
    </linearGradient>
    <marker id="arrow009a" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg009a)"/>
  <rect x="20" y="20" width="1160" height="680" rx="24" stroke="#1e293b" stroke-width="2"/>

  <text x="72" y="82" fill="#0f1219" font-family="Inter, Pretendard, sans-serif" font-size="34" font-weight="700">Raw filing URL은 세 필드로 완성된다</text>
  <text x="72" y="120" fill="#94a3b8" font-family="Inter, Pretendard, sans-serif" font-size="18">CIK, accession, primaryDocument를 잃지 않으면 HTML과 TXT, index 경로를 모두 만들 수 있다.</text>

  <rect x="72" y="176" width="240" height="160" rx="20" fill="#142032" stroke="#38bdf8" stroke-width="2"/>
  <text x="104" y="222" fill="#7dd3fc" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">STEP 1</text>
  <text x="104" y="266" fill="#0f1219" font-family="Inter, Pretendard, sans-serif" font-size="28" font-weight="700">CIK 준비</text>
  <text x="104" y="302" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">submissions 요청은</text>
  <text x="104" y="332" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">10자리 zero-padding</text>

  <rect x="480" y="176" width="240" height="160" rx="20" fill="#142032" stroke="#22c55e" stroke-width="2"/>
  <text x="512" y="222" fill="#86efac" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">STEP 2</text>
  <text x="512" y="266" fill="#0f1219" font-family="Inter, Pretendard, sans-serif" font-size="28" font-weight="700">submissions JSON</text>
  <text x="512" y="302" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">form</text>
  <text x="512" y="332" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">accessionNumber</text>
  <text x="512" y="362" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">primaryDocument</text>

  <rect x="888" y="176" width="240" height="160" rx="20" fill="#142032" stroke="#f97316" stroke-width="2"/>
  <text x="920" y="222" fill="#fdba74" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">STEP 3</text>
  <text x="920" y="266" fill="#0f1219" font-family="Inter, Pretendard, sans-serif" font-size="28" font-weight="700">Archives 경로</text>
  <text x="920" y="302" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">CIK는 정수형</text>
  <text x="920" y="332" fill="#cbd5e1" font-family="Inter, Pretendard, sans-serif" font-size="20">accession은 대시 제거</text>

  <path d="M314 256H470" stroke="#475569" stroke-width="4" marker-end="url(#arrow009a)"/>
  <path d="M722 256H878" stroke="#475569" stroke-width="4" marker-end="url(#arrow009a)"/>

  <rect x="72" y="420" width="1056" height="224" rx="24" fill="#121b29" stroke="#334155" stroke-width="2"/>
  <text x="104" y="468" fill="#0f1219" font-family="Inter, Pretendard, sans-serif" font-size="30" font-weight="700">최종 산출물</text>

  <rect x="104" y="506" width="298" height="92" rx="18" fill="#1d2838" stroke="#38bdf8" stroke-width="2"/>
  <text x="132" y="546" fill="#7dd3fc" font-family="Inter, Pretendard, sans-serif" font-size="24" font-weight="700">Primary HTML</text>
  <text x="132" y="580" fill="#cbd5e1" font-family="JetBrains Mono, monospace" font-size="16">.../{accession-no-dash}/{primaryDocument}</text>

  <rect x="432" y="506" width="298" height="92" rx="18" fill="#1d2838" stroke="#22c55e" stroke-width="2"/>
  <text x="460" y="546" fill="#86efac" font-family="Inter, Pretendard, sans-serif" font-size="24" font-weight="700">Raw TXT</text>
  <text x="460" y="580" fill="#cbd5e1" font-family="JetBrains Mono, monospace" font-size="16">.../{accession}.txt</text>

  <rect x="760" y="506" width="336" height="92" rx="18" fill="#1d2838" stroke="#f97316" stroke-width="2"/>
  <text x="788" y="546" fill="#fdba74" font-family="Inter, Pretendard, sans-serif" font-size="24" font-weight="700">Index / Exhibits</text>
  <text x="788" y="580" fill="#cbd5e1" font-family="JetBrains Mono, monospace" font-size="16">.../{accession}-index.html</text>

  <text x="104" y="626" fill="#94a3b8" font-family="Inter, Pretendard, sans-serif" font-size="18">좋은 수집기는 HTML만 저장하지 않는다. accession을 기준으로 TXT와 index까지 같이 저장한다.</text>
</svg>
