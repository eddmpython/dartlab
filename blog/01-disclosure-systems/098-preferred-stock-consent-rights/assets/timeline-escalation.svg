<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, -apple-system, sans-serif">
<defs><linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#bgDark)" rx="12"/>
  <rect x="0.5" y="0.5" width="799" height="499" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">동의권 무게 증가 타임라인</text>

  <!-- Timeline base -->
  <line x1="60" y1="400" x2="740" y2="400" stroke="#6b7280" stroke-width="2"/>

  <!-- Weight gradient (background) -->
  <defs>
    <linearGradient id="weightGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#d97706" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect x="60" y="60" width="680" height="330" rx="8" fill="url(#weightGrad)"/>

  <!-- Weight curve -->
  <path d="M 80,350 Q 200,340 270,300 Q 340,260 410,200 Q 480,140 550,110 Q 620,85 720,70" fill="none" stroke="#dc2626" stroke-width="3"/>

  <!-- Y axis label -->
  <text x="35" y="60" text-anchor="middle" font-size="11" fill="#dc2626" transform="rotate(-90, 35, 200)">동의권 무게 / 통제 강도</text>

  <!-- Event 1: Issuance -->
  <circle cx="100" cy="400" r="6" fill="#059669"/>
  <line x1="100" y1="394" x2="100" y2="348" stroke="#059669" stroke-width="1.5" stroke-dasharray="3"/>
  <circle cx="100" cy="348" r="4" fill="#059669"/>
  <rect x="40" y="415" width="120" height="45" rx="6" fill="#0f1219" stroke="#059669" stroke-width="1"/>
  <text x="100" y="433" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">발행 시점</text>
  <text x="100" y="450" text-anchor="middle" font-size="10" fill="#94a3b8">기본 동의권 설정</text>

  <!-- Event 2: Dividend miss -->
  <circle cx="250" cy="400" r="6" fill="#d97706"/>
  <line x1="250" y1="394" x2="250" y2="310" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3"/>
  <circle cx="250" cy="310" r="4" fill="#d97706"/>
  <rect x="185" y="415" width="130" height="45" rx="6" fill="#0f1219" stroke="#d97706" stroke-width="1"/>
  <text x="250" y="433" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">배당 미지급</text>
  <text x="250" y="450" text-anchor="middle" font-size="10" fill="#94a3b8">추가 동의권 발동</text>

  <!-- Event 3: Covenant breach -->
  <circle cx="400" cy="400" r="6" fill="#d97706"/>
  <line x1="400" y1="394" x2="400" y2="210" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3"/>
  <circle cx="400" cy="210" r="4" fill="#d97706"/>
  <rect x="335" y="415" width="130" height="45" rx="6" fill="#0f1219" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="433" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">재무약정 위반</text>
  <text x="400" y="450" text-anchor="middle" font-size="10" fill="#94a3b8">거부권 범위 확대</text>

  <!-- Event 4: Redemption due -->
  <circle cx="550" cy="400" r="6" fill="#dc2626"/>
  <line x1="550" y1="394" x2="550" y2="120" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3"/>
  <circle cx="550" cy="120" r="4" fill="#dc2626"/>
  <rect x="480" y="415" width="140" height="45" rx="6" fill="#0f1219" stroke="#dc2626" stroke-width="1"/>
  <text x="550" y="433" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">상환 기일 미이행</text>
  <text x="550" y="450" text-anchor="middle" font-size="10" fill="#94a3b8">전면적 통제 가능</text>

  <!-- Event 5: Full escalation -->
  <circle cx="700" cy="400" r="6" fill="#dc2626"/>
  <line x1="700" y1="394" x2="700" y2="75" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3"/>
  <circle cx="700" cy="75" r="4" fill="#dc2626"/>
  <rect x="630" y="415" width="140" height="45" rx="6" fill="#0f1219" stroke="#dc2626" stroke-width="1"/>
  <text x="700" y="433" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">복합 트리거 중첩</text>
  <text x="700" y="450" text-anchor="middle" font-size="10" fill="#94a3b8">사실상 경영 관여</text>

  <!-- Legend -->
  <text x="400" y="488" text-anchor="middle" font-size="12" fill="#94a3b8">이벤트가 누적될수록 동의권의 실질 무게는 비선형으로 증가한다</text>
</svg>