<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="800" height="500" fill="#f3f4f6" rx="12"/>
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">발행자 vs 투자자 — 협상력 균형</text>

  <!-- Fulcrum -->
  <polygon points="400,420 370,460 430,460" fill="#6b7280"/>
  <line x1="100" y1="420" x2="700" y2="420" stroke="#6b7280" stroke-width="3"/>
  <text x="400" y="490" text-anchor="middle" font-size="12" fill="#6b7280">협상 균형점</text>

  <!-- Issuer side (left) -->
  <text x="200" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#2563eb">발행자 레버리지</text>

  <rect x="80" y="110" width="240" height="38" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="134" text-anchor="middle" font-size="13" fill="#2563eb">높은 성장성 / 좋은 실적</text>

  <rect x="80" y="158" width="240" height="38" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="182" text-anchor="middle" font-size="13" fill="#2563eb">대체 자금조달 경로 확보</text>

  <rect x="80" y="206" width="240" height="38" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="230" text-anchor="middle" font-size="13" fill="#2563eb">조기상환 가능 현금</text>

  <rect x="80" y="254" width="240" height="38" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="278" text-anchor="middle" font-size="13" fill="#2563eb">IPO / Exit 일정 근접</text>

  <rect x="80" y="302" width="240" height="38" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="326" text-anchor="middle" font-size="13" fill="#2563eb">다수 투자자 분산 보유</text>

  <!-- Arrow down to balance -->
  <line x1="200" y1="350" x2="200" y2="415" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Investor side (right) -->
  <text x="600" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#dc2626">투자자 레버리지</text>

  <rect x="480" y="110" width="240" height="38" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="134" text-anchor="middle" font-size="13" fill="#dc2626">광범위한 동의권 보유</text>

  <rect x="480" y="158" width="240" height="38" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="182" text-anchor="middle" font-size="13" fill="#dc2626">누적 미지급 배당 존재</text>

  <rect x="480" y="206" width="240" height="38" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="230" text-anchor="middle" font-size="13" fill="#dc2626">상환 청구권 행사 가능</text>

  <rect x="480" y="254" width="240" height="38" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="278" text-anchor="middle" font-size="13" fill="#dc2626">단독 / 대량 보유</text>

  <rect x="480" y="302" width="240" height="38" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="326" text-anchor="middle" font-size="13" fill="#dc2626">전환 후 지분 희석 위협</text>

  <!-- Arrow down to balance -->
  <line x1="600" y1="350" x2="600" y2="415" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>