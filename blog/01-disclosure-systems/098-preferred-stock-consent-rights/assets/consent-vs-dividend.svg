<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050811"/><stop offset="100%" stop-color="#0f1219"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgDark)" rx="12"/>
  <rect x="0.5" y="0.5" width="799" height="499" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>
  <text x="400" y="45" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">동의권 vs 배당권 — 실질 통제력 비교</text>

  <!-- Left: Dividend rights -->
  <rect x="60" y="80" width="300" height="360" rx="10" fill="#0f1219" stroke="#d97706" stroke-width="2"/>
  <text x="210" y="115" text-anchor="middle" font-size="17" font-weight="600" fill="#d97706">배당권</text>
  <line x1="80" y1="130" x2="340" y2="130" stroke="#d97706" stroke-width="1" opacity="0.4"/>

  <text x="210" y="160" text-anchor="middle" font-size="13" fill="#94a3b8">현금 수취 권리</text>
  <rect x="100" y="175" width="220" height="30" rx="6" fill="rgba(217,119,6,0.1)"/>
  <text x="210" y="195" text-anchor="middle" font-size="12" fill="#d97706">미지급 시 → 누적만 됨</text>

  <text x="210" y="235" text-anchor="middle" font-size="13" fill="#94a3b8">경영 간섭 범위</text>
  <rect x="130" y="250" width="160" height="30" rx="6" fill="rgba(217,119,6,0.1)"/>
  <text x="210" y="270" text-anchor="middle" font-size="12" fill="#d97706">제한적 (간접 압박)</text>

  <text x="210" y="310" text-anchor="middle" font-size="13" fill="#94a3b8">발행자 대응 난이도</text>
  <rect x="110" y="325" width="60" height="20" rx="4" fill="#d97706" opacity="0.3"/>
  <rect x="175" y="325" width="60" height="20" rx="4" fill="#d97706" opacity="0.15"/>
  <rect x="240" y="325" width="60" height="20" rx="4" fill="#d97706" opacity="0.08"/>
  <text x="210" y="370" text-anchor="middle" font-size="11" fill="#94a3b8">낮음~중간</text>

  <text x="210" y="410" text-anchor="middle" font-size="14" font-weight="600" fill="#d97706">통제력: 약함</text>

  <!-- Right: Consent rights -->
  <rect x="440" y="80" width="300" height="360" rx="10" fill="#0f1219" stroke="#dc2626" stroke-width="2"/>
  <text x="590" y="115" text-anchor="middle" font-size="17" font-weight="600" fill="#dc2626">동의권</text>
  <line x1="460" y1="130" x2="720" y2="130" stroke="#dc2626" stroke-width="1" opacity="0.4"/>

  <text x="590" y="160" text-anchor="middle" font-size="13" fill="#94a3b8">경영 의사결정 거부 권리</text>
  <rect x="480" y="175" width="220" height="30" rx="6" fill="rgba(220,38,38,0.1)"/>
  <text x="590" y="195" text-anchor="middle" font-size="12" fill="#dc2626">거부 시 → 진행 불가</text>

  <text x="590" y="235" text-anchor="middle" font-size="13" fill="#94a3b8">경영 간섭 범위</text>
  <rect x="490" y="250" width="200" height="30" rx="6" fill="rgba(220,38,38,0.1)"/>
  <text x="590" y="270" text-anchor="middle" font-size="12" fill="#dc2626">광범위 (직접 차단)</text>

  <text x="590" y="310" text-anchor="middle" font-size="13" fill="#94a3b8">발행자 대응 난이도</text>
  <rect x="490" y="325" width="60" height="20" rx="4" fill="#dc2626" opacity="0.7"/>
  <rect x="555" y="325" width="60" height="20" rx="4" fill="#dc2626" opacity="0.5"/>
  <rect x="620" y="325" width="60" height="20" rx="4" fill="#dc2626" opacity="0.3"/>
  <text x="590" y="370" text-anchor="middle" font-size="11" fill="#94a3b8">높음</text>

  <text x="590" y="410" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">통제력: 강함</text>

  <!-- Arrow -->
  <text x="400" y="475" text-anchor="middle" font-size="13" fill="#94a3b8">배당 미지급은 비용 문제 / 동의권 거부는 실행 차단 → 무게가 다르다</text>
</svg>