<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="800" height="500" fill="#f3f4f6" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">동의권 발동 및 강화 조건 흐름</text>

  <!-- Start -->
  <rect x="300" y="60" width="200" height="40" rx="8" fill="#2563eb"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" fill="white" font-weight="600">우선주 발행 계약</text>

  <!-- Arrow down -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#6b7280" stroke-width="2"/>

  <!-- Normal state -->
  <rect x="280" y="130" width="240" height="36" rx="8" fill="white" stroke="#059669" stroke-width="2"/>
  <text x="400" y="153" text-anchor="middle" font-size="13" fill="#059669">정상 상태: 동의권 대기</text>

  <!-- Branch to triggers -->
  <line x1="400" y1="166" x2="400" y2="190" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="150" y1="190" x2="650" y2="190" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="150" y1="190" x2="150" y2="210" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="320" y1="190" x2="320" y2="210" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="490" y1="190" x2="490" y2="210" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="650" y1="190" x2="650" y2="210" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Trigger 1 -->
  <rect x="65" y="210" width="170" height="50" rx="8" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">배당 미지급</text>
  <text x="150" y="250" text-anchor="middle" font-size="11" fill="#6b7280">누적 2기 이상</text>

  <!-- Trigger 2 -->
  <rect x="235" y="210" width="170" height="50" rx="8" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="320" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">상환 기일 도래</text>
  <text x="320" y="250" text-anchor="middle" font-size="11" fill="#6b7280">미상환 지속</text>

  <!-- Trigger 3 -->
  <rect x="405" y="210" width="170" height="50" rx="8" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="490" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">재무비율 위반</text>
  <text x="490" y="250" text-anchor="middle" font-size="11" fill="#6b7280">부채비율, 이자보상</text>

  <!-- Trigger 4 -->
  <rect x="565" y="210" width="170" height="50" rx="8" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="650" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">IPO 일정 실패</text>
  <text x="650" y="250" text-anchor="middle" font-size="11" fill="#6b7280">약정 기한 초과</text>

  <!-- Arrows down to escalation -->
  <line x1="150" y1="260" x2="150" y2="295" stroke="#d97706" stroke-width="1.5"/>
  <line x1="320" y1="260" x2="320" y2="295" stroke="#d97706" stroke-width="1.5"/>
  <line x1="490" y1="260" x2="490" y2="295" stroke="#d97706" stroke-width="1.5"/>
  <line x1="650" y1="260" x2="650" y2="295" stroke="#d97706" stroke-width="1.5"/>

  <!-- Merge -->
  <line x1="150" y1="295" x2="650" y2="295" stroke="#d97706" stroke-width="1.5"/>
  <line x1="400" y1="295" x2="400" y2="320" stroke="#dc2626" stroke-width="2"/>

  <!-- Escalated state -->
  <rect x="250" y="320" width="300" height="42" rx="8" fill="#dc2626"/>
  <text x="400" y="346" text-anchor="middle" font-size="14" fill="white" font-weight="600">동의권 범위 확대 / 강화</text>

  <!-- Consequences -->
  <line x1="400" y1="362" x2="400" y2="385" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="180" y1="385" x2="620" y2="385" stroke="#dc2626" stroke-width="1.5"/>

  <rect x="80" y="395" width="190" height="42" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="175" y="413" text-anchor="middle" font-size="12" fill="#dc2626">신규 차입 사전동의</text>
  <text x="175" y="429" text-anchor="middle" font-size="11" fill="#6b7280">자금조달 제약</text>

  <rect x="305" y="395" width="190" height="42" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="400" y="413" text-anchor="middle" font-size="12" fill="#dc2626">자산 처분 사전동의</text>
  <text x="400" y="429" text-anchor="middle" font-size="11" fill="#6b7280">구조조정 제한</text>

  <rect x="530" y="395" width="190" height="42" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="625" y="413" text-anchor="middle" font-size="12" fill="#dc2626">경영진 변경 사전동의</text>
  <text x="625" y="429" text-anchor="middle" font-size="11" fill="#6b7280">인사권 제한</text>

  <text x="400" y="475" text-anchor="middle" font-size="12" fill="#6b7280">트리거 → 동의권 확대 → 경영 자유도 축소의 순환</text>
</svg>