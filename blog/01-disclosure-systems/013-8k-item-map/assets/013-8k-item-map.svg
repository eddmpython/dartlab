<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" fill="none">
  <rect width="800" height="430" rx="28" fill="#050811"/>
  <rect x="24" y="24" width="752" height="382" rx="24" fill="#0f1219" stroke="#1e2433"/>
  <text x="48" y="62" fill="#f8fafc" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700">8-K Item Map</text>
  <text x="48" y="86" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12">Read 8-K by item priority, not by headline.</text>
  <rect x="48" y="120" width="150" height="86" rx="16" fill="#111827" stroke="#334155"/>
  <text x="64" y="148" fill="#fda4a4" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700">Item 1</text>
  <text x="64" y="171" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">Business events</text>
  <text x="64" y="191" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">contracts, assets, bankruptcy</text>
  <rect x="230" y="120" width="150" height="86" rx="16" fill="#111827" stroke="#334155"/>
  <text x="246" y="148" fill="#fdba74" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700">Item 2</text>
  <text x="246" y="171" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">Financial triggers</text>
  <text x="246" y="191" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">earnings, funding, operations</text>
  <rect x="412" y="120" width="150" height="86" rx="16" fill="#111827" stroke="#334155"/>
  <text x="428" y="148" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700">Item 4</text>
  <text x="428" y="171" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">Accounting trust</text>
  <text x="428" y="191" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">restatement, controls, audit</text>
  <rect x="594" y="120" width="150" height="86" rx="16" fill="#111827" stroke="#334155"/>
  <text x="610" y="148" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700">Item 5</text>
  <text x="610" y="171" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">Leadership changes</text>
  <text x="610" y="191" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">CEO, CFO, governance</text>
  <rect x="48" y="246" width="696" height="118" rx="18" fill="#0b1220" stroke="#243041"/>
  <text x="70" y="278" fill="#f8fafc" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">Priority rule</text>
  <text x="70" y="304" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="13">High signal: item affects trust, liquidity, core contracts, or management control.</text>
  <text x="70" y="330" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12">Low signal: presentation-only disclosure without structural impact.</text>
