<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" fill="none">
  <rect width="800" height="430" rx="28" fill="#050811"/>
  <rect x="24" y="24" width="752" height="382" rx="24" fill="#0f1219" stroke="#1e2433"/>
  <text x="48" y="62" fill="#f8fafc" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700">Signal Matrix</text>
  <text x="48" y="86" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12">Rank 8-Ks by impact and follow-up depth.</text>
  <rect x="80" y="130" width="280" height="220" rx="18" fill="#101826" stroke="#2b3648"/>
  <text x="108" y="164" fill="#fda4a4" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">High signal</text>
  <text x="108" y="196" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">restatement</text>
  <text x="108" y="220" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">major contract change</text>
  <text x="108" y="244" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">funding and dilution</text>
  <text x="108" y="268" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">CEO/CFO turnover</text>
  <text x="108" y="304" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Always check 10-Q, 10-K, footnotes.</text>
  <rect x="440" y="130" width="280" height="220" rx="18" fill="#101826" stroke="#2b3648"/>
  <text x="468" y="164" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Lower signal</text>
  <text x="468" y="196" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">presentation material</text>
  <text x="468" y="220" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">routine announcements</text>
  <text x="468" y="244" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="12">limited structural change</text>
  <text x="468" y="304" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Useful context, but not always valuation-changing.</text>
</svg>
