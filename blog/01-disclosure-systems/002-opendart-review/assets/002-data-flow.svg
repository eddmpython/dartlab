<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg-df" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="12" fill="url(#bg-df)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">OpenDART 데이터 수집 흐름</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">API키 발급부터 데이터 저장까지 — 5단계 파이프라인</text>

  <!-- Step 1: API Key (purple) -->
  <rect x="60" y="120" width="190" height="200" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <circle cx="155" cy="160" r="24" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="155" y="166" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="18" fill="#a78bfa">1</text>
  <text x="155" y="210" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#a78bfa">API키 발급</text>
  <text x="155" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">opendart.fss.or.kr</text>
  <text x="155" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">회원가입 후 즉시 발급</text>
  <text x="155" y="275" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">무료 / 인증키 필수</text>
  <text x="155" y="300" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">crtfc_key=xxxxxxxxxx</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="220" x2="290" y2="220" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="290,216 300,220 290,224" fill="#a78bfa"/>

  <!-- Step 2: Request (blue) -->
  <rect x="305" y="120" width="190" height="200" rx="10" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <circle cx="400" cy="160" r="24" fill="rgba(56,189,248,0.1)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="400" y="166" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="18" fill="#38bdf8">2</text>
  <text x="400" y="210" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#38bdf8">요청</text>
  <text x="400" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">REST API 호출</text>
  <text x="400" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">GET / POST</text>
  <text x="400" y="275" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">corp_code + bsns_year</text>
  <text x="400" y="295" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">reprt_code + params</text>

  <!-- Arrow 2 -->
  <line x1="505" y1="220" x2="535" y2="220" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="535,216 545,220 535,224" fill="#38bdf8"/>

  <!-- Step 3: Response JSON (green) -->
  <rect x="550" y="120" width="190" height="200" rx="10" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
  <circle cx="645" cy="160" r="24" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="645" y="166" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="18" fill="#34d399">3</text>
  <text x="645" y="210" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#34d399">응답 JSON</text>
  <text x="645" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">HTTP 200 (항상)</text>
  <text x="645" y="255" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">status: "000"</text>
  <text x="645" y="275" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">message: "정상"</text>
  <text x="645" y="295" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">list: [{...}, ...]</text>

  <!-- Arrow 3 -->
  <line x1="750" y1="220" x2="780" y2="220" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="780,216 790,220 780,224" fill="#34d399"/>

  <!-- Step 4: Parsing (orange) -->
  <rect x="795" y="120" width="160" height="200" rx="10" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.25)" stroke-width="1"/>
  <circle cx="875" cy="160" r="24" fill="rgba(251,146,60,0.1)" stroke="rgba(251,146,60,0.3)" stroke-width="1"/>
  <text x="875" y="166" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="18" fill="#fb923c">4</text>
  <text x="875" y="210" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#fb923c">파싱</text>
  <text x="875" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">계정명 정규화</text>
  <text x="875" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">누적값 역산</text>
  <text x="875" y="275" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">정정공시 필터</text>
  <text x="875" y="295" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">기간 수평화</text>

  <!-- Arrow 4 -->
  <line x1="965" y1="220" x2="995" y2="220" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="995,216 1005,220 995,224" fill="#fb923c"/>

  <!-- Step 5: Storage (red) -->
  <rect x="1010" y="120" width="130" height="200" rx="10" fill="rgba(248,113,113,0.06)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
  <circle cx="1075" cy="160" r="24" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
  <text x="1075" y="166" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="18" fill="#f87171">5</text>
  <text x="1075" y="210" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#f87171">저장</text>
  <text x="1075" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Parquet</text>
  <text x="1075" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">종목별 파일</text>
  <text x="1075" y="275" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">시계열 보존</text>

  <!-- Example Endpoints Section -->
  <text x="600" y="380" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">주요 API 엔드포인트</text>
  <text x="600" y="402" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">83개 API — 6개 카테고리</text>

  <!-- Endpoint cards row 1 -->
  <rect x="60" y="425" width="260" height="90" rx="8" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <text x="75" y="448" font-family="Pretendard, sans-serif" font-size="12" font-weight="600" fill="#a78bfa">공시검색</text>
  <text x="75" y="468" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">/api/list.json</text>
  <text x="75" y="488" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">기업별 · 기간별 · 유형별 공시 목록</text>
  <text x="305" y="448" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">4종</text>

  <rect x="340" y="425" width="260" height="90" rx="8" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="355" y="448" font-family="Pretendard, sans-serif" font-size="12" font-weight="600" fill="#38bdf8">재무정보</text>
  <text x="355" y="468" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">/api/fnlttSinglAcntAll.json</text>
  <text x="355" y="488" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">단일/다중 재무제표, XBRL</text>
  <text x="585" y="448" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">7종</text>

  <rect x="620" y="425" width="260" height="90" rx="8" fill="rgba(52,211,153,0.04)" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
  <text x="635" y="448" font-family="Pretendard, sans-serif" font-size="12" font-weight="600" fill="#34d399">정기보고서</text>
  <text x="635" y="468" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">/api/hyslrSttus.json</text>
  <text x="635" y="488" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">배당, 최대주주, 임원, 직원, 감사</text>
  <text x="865" y="448" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">28종</text>

  <rect x="900" y="425" width="240" height="90" rx="8" fill="rgba(251,146,60,0.04)" stroke="rgba(251,146,60,0.15)" stroke-width="1"/>
  <text x="915" y="448" font-family="Pretendard, sans-serif" font-size="12" font-weight="600" fill="#fb923c">주요사항</text>
  <text x="915" y="468" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">/api/piicDecsn.json</text>
  <text x="915" y="488" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">증자, 합병, 전환사채 등</text>
  <text x="1125" y="448" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">36종</text>

  <!-- Limitations bar -->
  <rect x="60" y="545" width="1080" height="100" rx="8" fill="rgba(248,113,113,0.04)" stroke="rgba(248,113,113,0.15)" stroke-width="1"/>
  <text x="600" y="572" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#f87171">API가 제공하지 않는 것 — 직접 파싱 필요</text>

  <text x="170" y="600" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">사업의 내용</text>
  <text x="170" y="618" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">서술형 텍스트</text>

  <text x="370" y="600" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">경영진단의견</text>
  <text x="370" y="618" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">MD&amp;A</text>

  <text x="560" y="600" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">감사보고서</text>
  <text x="560" y="618" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">감사의견 전문</text>

  <text x="740" y="600" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">주석 상세</text>
  <text x="740" y="618" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">유형자산, 차입금 등</text>

  <text x="930" y="600" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">우발부채/소송</text>
  <text x="930" y="618" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">비정형 서술</text>

  <!-- Daily limit note -->
  <text x="600" y="672" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#64748b">일일 호출 제한: 10,000~20,000건 | corp_code 변환 필수 | HTTP 200 에러 패턴</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>