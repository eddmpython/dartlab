<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" fill="none">
  <rect width="800" height="430" rx="28" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">Good vs Risky Offering</text>
  <text x="400" y="64" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12">read the combination, not the headline</text>

  <rect x="56" y="106" width="300" height="258" rx="22" fill="#111827" stroke="#065f46"/>
  <text x="86" y="140" fill="#bbf7d0" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">Relatively better pattern</text>
  <text x="86" y="170" fill="#dcfce7" font-family="Inter, system-ui, sans-serif" font-size="13">facility investment or clear growth purpose</text>
  <text x="86" y="198" fill="#dcfce7" font-family="Inter, system-ui, sans-serif" font-size="13">planned calendar and stable conditions</text>
  <text x="86" y="226" fill="#dcfce7" font-family="Inter, system-ui, sans-serif" font-size="13">holder alignment is visible</text>
  <text x="86" y="254" fill="#dcfce7" font-family="Inter, system-ui, sans-serif" font-size="13">later filings confirm the original plan</text>

  <rect x="444" y="106" width="300" height="258" rx="22" fill="#111827" stroke="#7f1d1d"/>
  <text x="474" y="140" fill="#fecaca" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">Riskier pattern</text>
  <text x="474" y="170" fill="#fee2e2" font-family="Inter, system-ui, sans-serif" font-size="13">urgent operations funding with weak cash flow</text>
  <text x="474" y="198" fill="#fee2e2" font-family="Inter, system-ui, sans-serif" font-size="13">heavy dilution and repeated amendments</text>
  <text x="474" y="226" fill="#fee2e2" font-family="Inter, system-ui, sans-serif" font-size="13">major condition changes after the first filing</text>
  <text x="474" y="254" fill="#fee2e2" font-family="Inter, system-ui, sans-serif" font-size="13">final outcome is materially weaker than the plan</text>
</svg>
