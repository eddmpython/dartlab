<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">078 Watchboard</title>
  <desc id="desc">Five follow-up checks after an RCPS pressure signal</desc>
  <rect width="1280" height="720" fill="#0f1c31"/>
  <text x="84" y="82" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#f8fbff">078 Watchboard</text>
  <text x="84" y="118" font-size="20" font-family="Arial, sans-serif" fill="#ced8e5">Five follow-up checks after an RCPS pressure signal</text>
  <rect x="90" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="118" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">1. Who can demand cash?</text><text x="118" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">The holder right is</text><text x="118" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">the first filter.</text>
  <rect x="470" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="498" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">2. When does it bite?</text><text x="498" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Timing turns a capital</text><text x="498" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">story into liquidity risk.</text>
  <rect x="850" y="170" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="878" y="218" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">3. Class shift?</text><text x="878" y="252" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Reclassification changes</text><text x="878" y="280" font-size="20" font-family="Arial, sans-serif" fill="#36506b">how investors read it.</text>
  <rect x="280" y="386" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="308" y="434" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">4. What funds it?</text><text x="308" y="468" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Cash, sale, or equity</text><text x="308" y="496" font-size="20" font-family="Arial, sans-serif" fill="#36506b">tell very different stories.</text>
  <rect x="660" y="386" width="340" height="146" rx="24" fill="#ffffff" opacity="0.96"/><text x="688" y="434" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#12263e">5. Terms moving?</text><text x="688" y="468" font-size="20" font-family="Arial, sans-serif" fill="#36506b">Extension and refixing</text><text x="688" y="496" font-size="20" font-family="Arial, sans-serif" fill="#36506b">mean the burden is alive.</text>
</svg>
