<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg5d" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="16" fill="url(#bg5d)"/>

  <text x="400" y="32" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="15" font-weight="700">DartLab 엔진 레이어 — 데이터에서 인사이트까지</text>

  <!-- L1: Data Layer -->
  <rect x="40" y="52" width="720" height="95" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="73" fill="#3b82f6" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12" font-weight="700">L1  데이터 소스</text>
  <text x="180" y="73" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">DART 원본 데이터를 구조화</text>

  <!-- L1 boxes -->
  <rect x="60" y="84" width="145" height="52" rx="8" fill="#0d1117" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="132" y="104" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">재무제표 정규화</text>
  <text x="132" y="120" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">34,000+ 매핑 · 시계열</text>

  <rect x="215" y="84" width="145" height="52" rx="8" fill="#0d1117" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="287" y="104" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">공시 문서 파싱</text>
  <text x="287" y="120" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">40개 모듈 · 정형 DataFrame</text>

  <rect x="370" y="84" width="145" height="52" rx="8" fill="#0d1117" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="442" y="104" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">정기보고서 API</text>
  <text x="442" y="120" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">배당 · 주주 · 감사 · 임원</text>

  <rect x="525" y="84" width="145" height="52" rx="8" fill="#0d1117" stroke="#3b82f6" stroke-width="1" opacity="0.5" stroke-dasharray="4,4"/>
  <text x="597" y="104" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">EDGAR (예정)</text>
  <text x="597" y="120" text-anchor="middle" fill="#475569" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">미국 SEC 공시 데이터</text>

  <!-- Arrow L1 → L2 -->
  <path d="M400 152 L400 168" stroke="#475569" stroke-width="1.5" marker-end="url(#arrL)"/>
  <defs><marker id="arrL" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#475569"/></marker></defs>

  <!-- L2: Analysis Layer -->
  <rect x="40" y="172" width="720" height="95" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="60" y="193" fill="#10b981" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12" font-weight="700">L2  분석 엔진</text>
  <text x="160" y="193" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">데이터 소스에 독립적인 분석</text>

  <!-- L2 boxes -->
  <rect x="60" y="204" width="155" height="52" rx="8" fill="#0d1117" stroke="#10b981" stroke-width="1" opacity="0.8"/>
  <text x="137" y="224" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">섹터 분류</text>
  <text x="137" y="240" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">WICS 11개 섹터 자동 분류</text>

  <rect x="225" y="204" width="155" height="52" rx="8" fill="#0d1117" stroke="#10b981" stroke-width="1" opacity="0.8"/>
  <text x="302" y="224" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">인사이트 등급</text>
  <text x="302" y="240" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">7영역 A~F + 이상치 탐지</text>

  <rect x="390" y="204" width="155" height="52" rx="8" fill="#0d1117" stroke="#10b981" stroke-width="1" opacity="0.8"/>
  <text x="467" y="224" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">시장 순위</text>
  <text x="467" y="240" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">매출 · 자산 · 성장률 순위</text>

  <rect x="555" y="204" width="155" height="52" rx="8" fill="#0d1117" stroke="#10b981" stroke-width="1" opacity="0.8"/>
  <text x="632" y="224" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">재무비율</text>
  <text x="632" y="240" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">ROE · 부채비율 · FCF TTM</text>

  <!-- Arrow L2 → L3 -->
  <path d="M400 272 L400 288" stroke="#475569" stroke-width="1.5" marker-end="url(#arrL)"/>

  <!-- L3: AI Layer -->
  <rect x="40" y="292" width="720" height="95" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="60" y="313" fill="#a855f7" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12" font-weight="700">L3  AI 분석</text>
  <text x="140" y="313" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="10">LLM 기반 대화형 분석</text>

  <!-- L3 boxes -->
  <rect x="60" y="324" width="200" height="52" rx="8" fill="#0d1117" stroke="#a855f7" stroke-width="1" opacity="0.8"/>
  <text x="160" y="344" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">Tier 1: 시스템 주도 분석</text>
  <text x="160" y="360" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">질문 분류 → 분석 패키지 → 컨텍스트</text>

  <rect x="270" y="324" width="200" height="52" rx="8" fill="#0d1117" stroke="#a855f7" stroke-width="1" opacity="0.8"/>
  <text x="370" y="344" text-anchor="middle" fill="#f1f5f9" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">Tier 2: LLM 주도 탐색</text>
  <text x="370" y="360" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">원본 데이터 직접 탐색 · 교차 검증</text>

  <rect x="480" y="324" width="200" height="52" rx="8" fill="#0d1117" stroke="#a855f7" stroke-width="1" opacity="0.5" stroke-dasharray="4,4"/>
  <text x="580" y="344" text-anchor="middle" fill="#64748b" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="11" font-weight="600">텍스트 분석 (예정)</text>
  <text x="580" y="360" text-anchor="middle" fill="#475569" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="9">정량 + 정성 교차 검증</text>
</svg>
