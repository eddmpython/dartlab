<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="600" y="48" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">show(topic)의 2단계 구조</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">블록 목차 → 실제 데이터</text>

  <!-- Step 1: show(topic) -->
  <rect x="60" y="110" width="500" height="320" rx="10" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1"/>
  <text x="310" y="140" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="16" font-weight="700" fill="#34d399">1단계: show("businessOverview")</text>

  <rect x="90" y="165" width="440" height="36" rx="6" fill="rgba(148,163,184,0.08)" stroke="#1e2433" stroke-width="1"/>
  <text x="105" y="188" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#64748b">block</text>
  <text x="190" y="188" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#64748b">type</text>
  <text x="280" y="188" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#64748b">source</text>
  <text x="380" y="188" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#64748b">preview</text>

  <text x="113" y="222" font-family="JetBrains Mono, monospace" font-size="12" fill="#f1f5f9">0</text>
  <text x="190" y="222" font-family="JetBrains Mono, monospace" font-size="12" fill="#38bdf8">text</text>
  <text x="280" y="222" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">docs</text>
  <text x="380" y="222" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">당사는 DX부문 / DS부문...</text>

  <rect x="90" y="238" width="440" height="1" fill="#1e2433"/>

  <text x="113" y="260" font-family="JetBrains Mono, monospace" font-size="12" fill="#f1f5f9">1</text>
  <text x="190" y="260" font-family="JetBrains Mono, monospace" font-size="12" fill="#fb923c">table</text>
  <text x="280" y="260" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">docs</text>
  <text x="380" y="260" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">| 부문 | 주요 제품 | 매출...</text>

  <rect x="90" y="276" width="440" height="1" fill="#1e2433"/>

  <text x="113" y="298" font-family="JetBrains Mono, monospace" font-size="12" fill="#f1f5f9">2</text>
  <text x="190" y="298" font-family="JetBrains Mono, monospace" font-size="12" fill="#38bdf8">text</text>
  <text x="280" y="298" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">docs</text>
  <text x="380" y="298" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">반도체 사업은 메모리와...</text>

  <rect x="90" y="314" width="440" height="1" fill="#1e2433"/>

  <text x="113" y="336" font-family="JetBrains Mono, monospace" font-size="12" fill="#f1f5f9">3</text>
  <text x="190" y="336" font-family="JetBrains Mono, monospace" font-size="12" fill="#fb923c">table</text>
  <text x="280" y="336" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">docs</text>
  <text x="380" y="336" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">| 제품 | 생산능력 | 가동...</text>

  <rect x="90" y="352" width="440" height="1" fill="#1e2433"/>

  <text x="113" y="374" font-family="JetBrains Mono, monospace" font-size="12" fill="#f1f5f9">4</text>
  <text x="190" y="374" font-family="JetBrains Mono, monospace" font-size="12" fill="#38bdf8">text</text>
  <text x="280" y="374" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">docs</text>
  <text x="380" y="374" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">디스플레이 패널 사업은...</text>

  <text x="310" y="416" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#64748b">텍스트와 테이블이 원본 순서 그대로 분리된다</text>

  <!-- Arrow -->
  <path d="M570 300 L630 300" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Step 2: show(topic, 1) -->
  <rect x="640" y="110" width="500" height="320" rx="10" fill="rgba(251,146,60,0.06)" stroke="#fb923c" stroke-width="1"/>
  <text x="890" y="140" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="16" font-weight="700" fill="#fb923c">2단계: show("businessOverview", 1)</text>

  <rect x="670" y="165" width="440" height="36" rx="6" fill="rgba(148,163,184,0.08)" stroke="#1e2433" stroke-width="1"/>
  <text x="700" y="188" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#64748b">항목</text>
  <text x="830" y="188" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#64748b">2024</text>
  <text x="940" y="188" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#64748b">2023</text>
  <text x="1050" y="188" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#64748b">2022</text>

  <text x="700" y="222" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">DX부문</text>
  <text x="830" y="222" font-family="JetBrains Mono, monospace" font-size="12" fill="#34d399">72,569,841</text>
  <text x="940" y="222" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">65,404,122</text>
  <text x="1050" y="222" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">67,895,401</text>

  <rect x="670" y="238" width="440" height="1" fill="#1e2433"/>

  <text x="700" y="260" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">DS부문</text>
  <text x="830" y="260" font-family="JetBrains Mono, monospace" font-size="12" fill="#34d399">68,206,024</text>
  <text x="940" y="260" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">54,067,842</text>
  <text x="1050" y="260" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">70,484,013</text>

  <rect x="670" y="276" width="440" height="1" fill="#1e2433"/>

  <text x="700" y="298" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">SDC</text>
  <text x="830" y="298" font-family="JetBrains Mono, monospace" font-size="12" fill="#34d399">32,786,245</text>
  <text x="940" y="298" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">28,946,731</text>
  <text x="1050" y="298" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">31,725,849</text>

  <rect x="670" y="314" width="440" height="1" fill="#1e2433"/>

  <text x="700" y="336" font-family="Pretendard, sans-serif" font-size="12" fill="#f1f5f9">Harman</text>
  <text x="830" y="336" font-family="JetBrains Mono, monospace" font-size="12" fill="#34d399">13,524,678</text>
  <text x="940" y="336" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">12,845,923</text>
  <text x="1050" y="336" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">12,023,456</text>

  <text x="890" y="395" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#64748b">항목 × 기간 매트릭스 — 바로 분석에 쓸 수 있다</text>
  <text x="890" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#475569">block 1 = table → 수평화된 숫자 DataFrame</text>

  <!-- Bottom context -->
  <rect x="60" y="470" width="1080" height="200" rx="10" fill="rgba(148,163,184,0.04)" stroke="#1e2433" stroke-width="1"/>

  <text x="600" y="502" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">왜 2단계인가?</text>

  <circle cx="160" cy="545" r="6" fill="#38bdf8"/>
  <text x="178" y="550" font-family="Pretendard, sans-serif" font-size="13" fill="#f1f5f9">text 블록</text>
  <text x="178" y="570" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">서술형 원문 — 기간별 비교 가능</text>

  <circle cx="460" cy="545" r="6" fill="#fb923c"/>
  <text x="478" y="550" font-family="Pretendard, sans-serif" font-size="13" fill="#f1f5f9">table 블록</text>
  <text x="478" y="570" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">항목 × 기간 수평화 — 숫자 분석용</text>

  <circle cx="760" cy="545" r="6" fill="#a78bfa"/>
  <text x="778" y="550" font-family="Pretendard, sans-serif" font-size="13" fill="#f1f5f9">mixed 블록</text>
  <text x="778" y="570" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">한 topic 안에 text + table이 섞여 있다</text>

  <text x="600" y="620" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#64748b">하나의 DataFrame으로 합치면 텍스트와 숫자가 뒤섞인다</text>
  <text x="600" y="642" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#34d399">→ 블록 목차로 나누고, 번호로 골라서 꺼낸다</text>

  <text x="600" y="690" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>
