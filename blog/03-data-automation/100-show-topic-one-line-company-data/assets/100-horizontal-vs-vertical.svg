<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="12" fill="url(#bg4)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="600" y="48" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">가로 뷰와 세로 뷰 — 같은 데이터, 다른 관점</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">period 파라미터가 문자열이면 가로, 리스트이면 세로</text>

  <!-- Horizontal view -->
  <rect x="60" y="100" width="520" height="380" rx="10" fill="rgba(52,211,153,0.05)" stroke="#34d399" stroke-width="1"/>
  <text x="320" y="132" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="16" font-weight="700" fill="#34d399">가로 뷰 (기본)</text>
  <text x="320" y="156" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">c.show("BS")</text>

  <!-- Table header -->
  <rect x="90" y="175" width="460" height="32" rx="6" fill="rgba(148,163,184,0.08)" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">계정명</text>
  <text x="260" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">2024Q4</text>
  <text x="370" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">2023Q4</text>
  <text x="470" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">2022Q4</text>

  <!-- Rows -->
  <text x="115" y="228" font-family="Pretendard, sans-serif" font-size="11" fill="#f1f5f9">유동자산</text>
  <text x="260" y="228" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">218,474</text>
  <text x="370" y="228" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">196,424</text>
  <text x="470" y="228" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">217,044</text>
  <rect x="90" y="240" width="460" height="1" fill="#1e2433"/>

  <text x="115" y="260" font-family="Pretendard, sans-serif" font-size="11" fill="#f1f5f9">현금</text>
  <text x="260" y="260" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">66,734</text>
  <text x="370" y="260" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">52,898</text>
  <text x="470" y="260" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">49,680</text>
  <rect x="90" y="272" width="460" height="1" fill="#1e2433"/>

  <text x="115" y="292" font-family="Pretendard, sans-serif" font-size="11" fill="#f1f5f9">매출채권</text>
  <text x="260" y="292" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">42,612</text>
  <text x="370" y="292" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">38,240</text>
  <text x="470" y="292" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">43,180</text>
  <rect x="90" y="304" width="460" height="1" fill="#1e2433"/>

  <text x="115" y="324" font-family="Pretendard, sans-serif" font-size="11" fill="#f1f5f9">재고자산</text>
  <text x="260" y="324" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">41,308</text>
  <text x="370" y="324" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">43,785</text>
  <text x="470" y="324" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">52,276</text>
  <rect x="90" y="336" width="460" height="1" fill="#1e2433"/>

  <text x="115" y="356" font-family="Pretendard, sans-serif" font-size="11" fill="#f1f5f9">자산총계</text>
  <text x="260" y="356" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">455,253</text>
  <text x="370" y="356" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">424,269</text>
  <text x="470" y="356" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">433,567</text>

  <text x="320" y="410" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#34d399">한 계정의 시계열을 한눈에</text>
  <text x="320" y="432" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#64748b">→ 유동자산이 3년간 어떻게 변했는가?</text>
  <text x="320" y="452" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#64748b">→ 현금 추세는 상승인가 하락인가?</text>

  <!-- Vertical view -->
  <rect x="620" y="100" width="520" height="380" rx="10" fill="rgba(251,146,60,0.05)" stroke="#fb923c" stroke-width="1"/>
  <text x="880" y="132" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="16" font-weight="700" fill="#fb923c">세로 뷰 (period를 리스트로)</text>
  <text x="880" y="156" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">c.show("BS", period=["2024Q4","2023Q4"])</text>

  <!-- Table header -->
  <rect x="650" y="175" width="460" height="32" rx="6" fill="rgba(148,163,184,0.08)" stroke="#1e2433" stroke-width="1"/>
  <text x="700" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">기간</text>
  <text x="790" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">유동자산</text>
  <text x="890" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">현금</text>
  <text x="970" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">매출채권</text>
  <text x="1060" y="196" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#64748b">자산총계</text>

  <text x="700" y="240" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#fb923c">2024Q4</text>
  <text x="790" y="240" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">218,474</text>
  <text x="890" y="240" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">66,734</text>
  <text x="970" y="240" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">42,612</text>
  <text x="1060" y="240" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399">455,253</text>
  <rect x="650" y="256" width="460" height="1" fill="#1e2433"/>

  <text x="700" y="284" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#94a3b8">2023Q4</text>
  <text x="790" y="284" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">196,424</text>
  <text x="890" y="284" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">52,898</text>
  <text x="970" y="284" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">38,240</text>
  <text x="1060" y="284" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">424,269</text>

  <text x="880" y="360" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#fb923c">한 시점의 전체 구조를 한눈에</text>
  <text x="880" y="382" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#64748b">→ 2024Q4 전체 자산 구성은?</text>
  <text x="880" y="402" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#64748b">→ 현금 비중이 전년 대비 올랐는가?</text>
  <text x="880" y="432" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#64748b">→ 행이 기간, 열이 계정 — 비교 직관적</text>

  <!-- Bottom summary -->
  <rect x="60" y="510" width="1080" height="160" rx="10" fill="rgba(148,163,184,0.04)" stroke="#1e2433" stroke-width="1"/>

  <text x="600" y="542" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">언제 어떤 뷰를 쓰는가</text>

  <rect x="110" y="565" width="450" height="75" rx="8" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="0.5"/>
  <text x="335" y="590" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#34d399">가로 뷰 (기본)</text>
  <text x="335" y="612" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">특정 계정의 시간 흐름을 추적할 때</text>
  <text x="335" y="630" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">show("BS") / show("BS", period="2024")</text>

  <rect x="640" y="565" width="450" height="75" rx="8" fill="rgba(251,146,60,0.06)" stroke="#fb923c" stroke-width="0.5"/>
  <text x="865" y="590" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#fb923c">세로 뷰 (리스트)</text>
  <text x="865" y="612" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">여러 시점의 구조를 나란히 비교할 때</text>
  <text x="865" y="630" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">show("BS", period=["2024Q4","2023Q4"])</text>

  <text x="600" y="695" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>
