<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="12" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="600" y="48" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">블록 타입별 데이터 흐름</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">show()는 source에 따라 다른 엔진에서 데이터를 가져온다</text>

  <!-- Input: show(topic) -->
  <rect x="440" y="100" width="320" height="50" rx="8" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700" fill="#34d399">c.show(topic, block)</text>

  <!-- Arrows from input -->
  <path d="M500 150 L500 190 L200 190 L200 230" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
  <path d="M600 150 L600 230" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
  <path d="M700 150 L700 190 L1000 190 L1000 230" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>

  <!-- Branch labels -->
  <text x="340" y="186" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">type=text</text>
  <text x="600" y="186" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">type=table</text>
  <text x="860" y="186" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">source 분기</text>

  <!-- Text block -->
  <rect x="60" y="230" width="280" height="200" rx="10" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-width="1"/>
  <text x="200" y="258" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="15" font-weight="700" fill="#38bdf8">text 블록</text>
  <text x="200" y="285" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">서술형 원문 텍스트</text>

  <rect x="85" y="305" width="230" height="28" rx="4" fill="rgba(148,163,184,0.06)" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="324" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">2024</text>
  <text x="170" y="324" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">2023</text>
  <text x="240" y="324" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">2022</text>

  <text x="100" y="352" font-family="Pretendard, sans-serif" font-size="10" fill="#94a3b8">당사는...</text>
  <text x="170" y="352" font-family="Pretendard, sans-serif" font-size="10" fill="#94a3b8">당사는...</text>
  <text x="240" y="352" font-family="Pretendard, sans-serif" font-size="10" fill="#94a3b8">당사는...</text>

  <text x="200" y="400" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#475569">기간별 원문 비교 · diff 감지용</text>
  <text x="200" y="418" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#475569">source = docs</text>

  <!-- Table block -->
  <rect x="460" y="230" width="280" height="200" rx="10" fill="rgba(251,146,60,0.06)" stroke="#fb923c" stroke-width="1"/>
  <text x="600" y="258" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="15" font-weight="700" fill="#fb923c">table 블록</text>
  <text x="600" y="285" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#94a3b8">항목 × 기간 수평화 매트릭스</text>

  <rect x="485" y="305" width="230" height="28" rx="4" fill="rgba(148,163,184,0.06)" stroke="#1e2433" stroke-width="1"/>
  <text x="500" y="324" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">항목</text>
  <text x="570" y="324" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">2024</text>
  <text x="640" y="324" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">2023</text>

  <text x="500" y="352" font-family="Pretendard, sans-serif" font-size="10" fill="#f1f5f9">DX부문</text>
  <text x="570" y="352" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">72.5T</text>
  <text x="640" y="352" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">65.4T</text>

  <text x="500" y="372" font-family="Pretendard, sans-serif" font-size="10" fill="#f1f5f9">DS부문</text>
  <text x="570" y="372" font-family="JetBrains Mono, monospace" font-size="10" fill="#34d399">68.2T</text>
  <text x="640" y="372" font-family="JetBrains Mono, monospace" font-size="10" fill="#94a3b8">54.1T</text>

  <text x="600" y="400" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#475569">숫자 분석 · 트렌드 추적용</text>
  <text x="600" y="418" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#475569">source = docs (수평화)</text>

  <!-- Source routing -->
  <rect x="860" y="230" width="280" height="200" rx="10" fill="rgba(167,139,250,0.06)" stroke="#a78bfa" stroke-width="1"/>
  <text x="1000" y="258" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="15" font-weight="700" fill="#a78bfa">source 라우팅</text>

  <rect x="885" y="285" width="230" height="36" rx="6" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="1000" y="308" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a78bfa">finance → BS, IS, CF, ratios</text>

  <rect x="885" y="330" width="230" height="36" rx="6" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="0.5"/>
  <text x="1000" y="353" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fb923c">report → dividend, employee</text>

  <rect x="885" y="375" width="230" height="36" rx="6" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="0.5"/>
  <text x="1000" y="398" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#38bdf8">docs → 나머지 전부</text>

  <!-- Bottom: Pipeline -->
  <rect x="60" y="470" width="1080" height="200" rx="10" fill="rgba(148,163,184,0.04)" stroke="#1e2433" stroke-width="1"/>

  <text x="600" y="502" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">데이터 흐름 전체 경로</text>

  <!-- Pipeline boxes -->
  <rect x="90" y="530" width="180" height="60" rx="8" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="1"/>
  <text x="180" y="555" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">사업보고서 원문</text>
  <text x="180" y="575" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">수백 페이지 × N기간</text>

  <path d="M270 560 L340 560" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="340" y="530" width="180" height="60" rx="8" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1"/>
  <text x="430" y="555" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">sections 수평화</text>
  <text x="430" y="575" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">topic × period 매트릭스</text>

  <path d="M520 560 L590 560" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="590" y="530" width="180" height="60" rx="8" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="1"/>
  <text x="680" y="555" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#34d399">show(topic)</text>
  <text x="680" y="575" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">블록 분리 + 기간 필터</text>

  <path d="M770 560 L840 560" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="840" y="530" width="280" height="60" rx="8" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="1"/>
  <text x="980" y="555" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#fb923c">DataFrame</text>
  <text x="980" y="575" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="11" fill="#94a3b8">바로 분석에 쓸 수 있는 결과</text>

  <text x="600" y="640" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#64748b">finance/report topic은 sections를 거치지 않고 직접 정규화 엔진에서 가져온다</text>

  <text x="600" y="690" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>
