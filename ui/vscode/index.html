<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DartLab Dev</title>
  <style>
    :root {
      --vscode-foreground: #ccc;
      --vscode-editor-foreground: #ccc;
      --vscode-editor-background: #1e1e1e;
      --vscode-input-background: #2d2d2d;
      --vscode-input-foreground: #ccc;
      --vscode-input-border: #3e3e3e;
      --vscode-inlineChatInput-border: #3e3e3e;
      --vscode-input-placeholderForeground: #666;
      --vscode-panel-border: #3e3e3e;
      --vscode-descriptionForeground: #888;
      --vscode-badge-background: #333;
      --vscode-badge-foreground: #ccc;
      --vscode-textCodeBlock-background: #252526;
      --vscode-list-hoverBackground: #2a2d2e;
      --vscode-list-activeSelectionBackground: #094771;
      --vscode-list-activeSelectionForeground: #fff;
      --vscode-editorWidget-background: #252526;
      --vscode-editorGroupHeader-tabsBackground: #252526;
      --vscode-focusBorder: #007acc;
      --vscode-toolbar-hoverBackground: #383838;
      --vscode-textLink-foreground: #3794ff;
      --vscode-menu-background: #2d2d2d;
      --vscode-menu-border: #3e3e3e;
      --vscode-scrollbarSlider-background: rgba(79,79,79,.4);
      --vscode-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --vscode-font-size: 13px;
      --vscode-editor-font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      --vscode-editor-font-size: 13px;
      --vscode-chat-font-size: 13px;
      --vscode-chat-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --vscode-errorForeground: #f48771;
    }
    body {
      background: var(--vscode-editor-background);
      color: var(--vscode-foreground);
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
