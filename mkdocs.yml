site_name: DartLab
site_url: https://eddmpython.github.io/dartlab/docs/
site_description: DART 공시 문서를 완벽하게 분석하는 Python 라이브러리
site_author: eddmpython
repo_url: https://github.com/eddmpython/dartlab
repo_name: eddmpython/dartlab

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 라이트 모드
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 다크 모드
  font:
    text: Inter
    code: JetBrains Mono
  favicon: stylesheets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

extra_css:
  - stylesheets/theme.css

nav:
  - Home: index.md
  - 시작하기:
    - 설치: getting-started/installation.md
    - 빠른 시작: getting-started/quickstart.md
  - 사용 가이드:
    - Bridge Matching: user-guide/bridge-matching.md
  - API Reference:
    - Finance Summary: api/finance-summary.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

plugins:
  - search
